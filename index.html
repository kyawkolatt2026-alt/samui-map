<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v4.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --danger: #ff4757; --accent: #1e90ff; --glass: rgba(18, 18, 18, 0.9); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; justify-content: space-between; }
        .status-pill { background: var(--glass); backdrop-filter: blur(15px); color: white; padding: 12px 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }

        /* Sidebar Update - Scrollable */
        .sidebar {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px); z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border);
            color: white; display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .sidebar-content { padding: 25px; overflow-y: auto; flex-grow: 1; height: 100vh; }
        
        .sidebar-toggle { width: 48px; height: 48px; border-radius: 14px; background: var(--glass); color: white; border: 1px solid var(--border); }

        /* Alert List & Settings */
        .card { background: rgba(255,255,255,0.06); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .alert-item { border-left: 4px solid var(--danger); padding-left: 12px; margin-bottom: 12px; }
        .switch { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        /* Report FAB */
        .report-wrap { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center; }
        .report-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--danger); border: none; color: white; font-size: 26px; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.5); position: relative; }
        .prog-ring { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); }

        .p-marker { width: 25px; height: 25px; background: var(--danger); border: 3px solid white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div class="status-pill"><div style="width:8px; height:8px; background:#2ecc71; border-radius:50%"></div> <span id="count">0</span> ALERTS NEARBY</div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-cog"></i></button>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <h2 style="margin:0">Control Center</h2>
            <i class="fas fa-times" onclick="toggleSidebar()" style="font-size:24px"></i>
        </div>

        <div class="card">
            <label style="color:#888; font-size:11px; letter-spacing:1px">ALERTS SETTINGS</label>
            <div class="switch" style="margin-top:15px">
                <span>Distance Alert (500m)</span>
                <input type="checkbox" id="distAlert" checked>
            </div>
            <button onclick="switchMap()" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--accent); color:white; margin-top:10px">
                <i class="fas fa-layer-group"></i> Switch Map View
            </button>
        </div>

        <label style="color:#888; font-size:11px; letter-spacing:1px">LIVE LOGS</label>
        <div id="alertList" style="margin-top:15px"></div>
    </div>
</div>

<div id="map"></div>

<div class="report-wrap">
    <div style="color:white; font-size:10px; margin-bottom:5px">HOLD TO REPORT</div>
    <button class="report-btn" id="reportBtn">
        <svg width="85" height="85" class="prog-ring"><circle cx="42" cy="42" r="38" stroke="white" stroke-width="4" fill="transparent" stroke-dasharray="240" stroke-dashoffset="240" id="progRing"/></svg>
        <i class="fas fa-bullhorn"></i>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const street = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    let isSat = true, isFollow = true, userLoc = null;

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
    window.switchMap = () => { if(isSat) { map.removeLayer(sat); street.addTo(map); } else { map.removeLayer(street); sat.addTo(map); } isSat = !isSat; };

    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        userLoc = e.latlng;
        if (isFollow) map.setView(e.latlng, 17);
        checkDistance(e.latlng);
    });

    // Distance Alert Logic
    function checkDistance(currentLoc) {
        if(!document.getElementById('distAlert').checked) return;
        Object.values(markers).forEach(m => {
            const dist = currentLoc.distanceTo(m.getLatLng());
            if(dist < 500) { 
                if(window.navigator.vibrate) navigator.vibrate(500);
            }
        });
    }

    // Long Press Report
    const btn = document.getElementById('reportBtn'), ring = document.getElementById('progRing');
    let timer, offset = 240;
    function start() { timer = setInterval(() => { offset -= 8; ring.style.strokeDashoffset = offset; if(offset<=0) { clearInterval(timer); doReport(); reset(); } }, 100); }
    function reset() { clearInterval(timer); offset = 240; ring.style.strokeDashoffset = 240; }
    btn.onmousedown = btn.ontouchstart = start; btn.onmouseup = btn.ontouchend = reset;

    async function doReport() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("Police alert reported!");
        });
    }

    // Live Sync
    let markers = {};
    const q = query(spotsRef, where("time", ">", new Date(Date.now() - 2 * 60 * 60 * 1000)), orderBy("time", "desc"));
    onSnapshot(q, (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        const list = document.getElementById('alertList');
        list.innerHTML = "";
        snaps.forEach(doc => {
            const data = doc.data();
            const timeStr = data.time ? new Date(data.time.toDate()).toLocaleTimeString() : "Just now";
            list.innerHTML += `<div class="alert-item"><b>Police Spotted</b><br><small>${timeStr}</small></div>`;
            if(!markers[doc.id]) markers[doc.id] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map);
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
