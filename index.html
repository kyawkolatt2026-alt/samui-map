<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0a0f1d; 
            color: white; 
            overflow: hidden;
        }
        
        #map { 
            height: 100vh; 
            width: 100vw; 
            z-index: 1; 
            background: #121212;
        }
        
        /* Auth Screen */
        .auth-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0f1d 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        
        .auth-screen.hidden {
            display: none;
        }
        
        .auth-card {
            background: rgba(30, 41, 59, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .auth-card h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: rgba(15, 23, 42, 0.8);
            color: #94a3b8;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .auth-tab.active {
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        .form-group input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 16px;
        }
        
        .password-wrapper input {
            padding-right: 40px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
            transition: 0.3s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.3);
        }
        
        .hidden-form {
            display: none;
        }
        
        /* Map UI */
        .map-ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
        }
        
        .user-info {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            font-size: 14px;
            pointer-events: all;
        }
        
        .user-info .username {
            color: #00d2ff;
            font-weight: 700;
        }
        
        .top-buttons {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }
        
        .circle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(0, 210, 255, 0.2);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        
        .circle-btn:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: #00d2ff;
        }
        
        .circle-btn.logout {
            color: #ff4757;
        }
        
        .circle-btn.active {
            border-color: #00d2ff;
            color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 20px 20px 0 0;
            padding: 15px;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateY(85%);
            transition: 0.3s;
            pointer-events: all;
            border-top: 1px solid rgba(0, 210, 255, 0.2);
        }
        
        .bottom-panel.active {
            transform: translateY(0);
        }
        
        .panel-handle {
            width: 50px;
            height: 4px;
            background: #475569;
            border-radius: 2px;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        
        .alert-button {
            width: 100%;
            padding: 16px;
            background: rgba(255, 71, 87, 0.2);
            border: 2px solid #ff4757;
            color: white;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .alert-button .progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #ff4757;
            z-index: -1;
            transition: width 0.1s linear;
        }
        
        .radius-control {
            margin-bottom: 15px;
        }
        
        .radius-control label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        
        .radius-control input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            margin-bottom: 15px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #64748b;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }
        
        .tab.active {
            color: #00d2ff;
            border-bottom-color: #00d2ff;
        }
        
        .tab-content {
            display: none;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .alert-item {
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .alert-item:hover {
            background: rgba(0, 210, 255, 0.1);
        }
        
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px;
            border-radius: 8px;
        }
        
        .chat-message {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 6px;
            font-size: 13px;
        }
        
        .chat-message strong {
            color: #00d2ff;
        }
        
        .chat-input-group {
            display: flex;
            gap: 8px;
        }
        
        .chat-input-group input {
            flex: 1;
            padding: 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.2);
            color: white;
            border-radius: 8px;
            outline: none;
        }
        
        .chat-input-group button {
            padding: 10px 15px;
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h1>SAMUI SAFE RIDE</h1>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="အသုံးပြုမည့်အမည်" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="လျှို့ဝှက်နံပါတ်" required>
                        <i class="fas fa-eye toggle-pass" onclick="togglePassword('loginPassword')"></i>
                    </div>
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">အကောင့်ဝင်ခြင်းကို မှတ်ထားရန်</label>
                </div>
                
                <button type="submit" class="btn-submit">အကောင့်ဝင်ရန်</button>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="hidden-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="အသုံးပြုမည့်အမည်" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="လျှို့ဝှက်နံပါတ်" required>
                        <i class="fas fa-eye toggle-pass" onclick="togglePassword('regPassword')"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirm" placeholder="လျှို့ဝှက်နံပါတ် ထပ်မံရိုက်ပါ" required>
                        <i class="fas fa-eye toggle-pass" onclick="togglePassword('regConfirm')"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">အကောင့်အသစ်ဆောက်မည်</button>
            </form>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>
    
    <!-- Map UI -->
    <div class="map-ui" id="mapUI" style="display: none;">
        <div class="user-info">
            <span>Welcome, <span class="username" id="displayUsername">User</span></span>
        </div>
        
        <div class="top-buttons">
            <button class="circle-btn logout" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            <button class="circle-btn" onclick="toggleMapLayer()" title="Map Layer"><i class="fas fa-layer-group"></i></button>
            <button class="circle-btn active" id="followBtn" onclick="toggleFollow()" title="Follow Location"><i class="fas fa-location-arrow"></i></button>
            <button class="circle-btn" id="bellBtn" onclick="toggleBell()" title="Notifications"><i class="fas fa-bell"></i></button>
        </div>
        
        <div class="bottom-panel" id="bottomPanel">
            <div class="panel-handle" onclick="togglePanel()"></div>
            
            <button class="alert-button" id="alertBtn" onmousedown="startHold()" onmouseup="stopHold()" ontouchstart="startHold()" ontouchend="stopHold()">
                <div class="progress" id="alertProgress"></div>
                👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)
            </button>
            
            <div class="radius-control">
                <label>အကွာအဝေး: <span id="radiusValue">200</span>m</label>
                <input type="range" min="100" max="2000" step="100" value="200" oninput="changeRadius(this.value)">
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchPanelTab('alerts')">စာရင်း</div>
                <div class="tab" onclick="switchPanelTab('chat')">Chat</div>
            </div>
            
            <div id="alertsTab" class="tab-content active">
                <div id="alertsList"></div>
            </div>
            
            <div id="chatTab" class="tab-content">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-group">
                    <input type="text" id="chatInput" placeholder="စာရေးရန်...">
                    <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, userMarker, userCircle;
        let currentUser = null;
        let userLat = 8.7245, userLng = 100.5933;
        let radius = 200;
        let isFollowing = true;
        let bellEnabled = true;
        let holdStartTime = 0;
        let isHolding = false;
        let mapLayerIndex = 0;
        const mapLayers = [
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
        ];

        window.addEventListener('load', () => {
            checkSession();
        });

        function checkSession() {
            const savedUser = localStorage.getItem('activeUser');
            const savedSession = localStorage.getItem('isLoggedIn');
            
            if (savedSession === 'true' && savedUser) {
                currentUser = savedUser;
                showMap();
            } else {
                showAuth();
                const remUser = localStorage.getItem('rememberUser');
                const remPass = localStorage.getItem('rememberPass');
                if (remUser && remPass) {
                    document.getElementById('loginUsername').value = remUser;
                    document.getElementById('loginPassword').value = remPass;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden-form');
                registerForm.classList.add('hidden-form');
            } else {
                loginForm.classList.add('hidden-form');
                registerForm.classList.remove('hidden-form');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = event.target;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash toggle-pass';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye toggle-pass';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                alert('Username နှင့် Password ကို ဖြည့်သွင်းပါ');
                return;
            }
            
            db.ref('users/' + username.toLowerCase()).once('value', snap => {
                const userData = snap.val();
                if (userData && userData.password === password) {
                    currentUser = username;
                    localStorage.setItem('activeUser', username);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    if (document.getElementById('rememberMe').checked) {
                        localStorage.setItem('rememberUser', username);
                        localStorage.setItem('rememberPass', password);
                    } else {
                        localStorage.removeItem('rememberUser');
                        localStorage.removeItem('rememberPass');
                    }
                    
                    showMap();
                } else {
                    alert('Username သို့မဟုတ် Password မှားယွင်းနေပါသည်');
                }
            });
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !password || !confirm) {
                alert('အချက်အလက်အားလုံးကို ဖြည့်သွင်းပါ');
                return;
            }
            
            if (password !== confirm) {
                alert('Password နှစ်ခု တူညီမှု မရှိပါ');
                return;
            }
            
            db.ref('users/' + username.toLowerCase()).once('value', snap => {
                if (snap.exists()) {
                    alert('ဤအမည်ဖြင့် အကောင့်ရှိပြီးသားဖြစ်ပါသည်');
                } else {
                    db.ref('users/' + username.toLowerCase()).set({
                        username: username,
                        password: password
                    }).then(() => {
                        alert('အကောင့်သစ် ဖွင့်လှစ်ခြင်း အောင်မြင်ပါသည်');
                        document.getElementById('registerForm').reset();
                        document.querySelector('.auth-tab').click();
                    });
                }
            });
        }

        function showAuth() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mapUI').style.display = 'none';
            if (map) map.remove();
        }

        function showMap() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mapUI').style.display = 'block';
            document.getElementById('displayUsername').textContent = currentUser;
            
            if (!map) {
                initMap();
            }
        }

        function initMap() {
            map = L.map('map').setView([userLat, userLng], 13);
            L.tileLayer(mapLayers[0], { maxZoom: 19 }).addTo(map);

            userMarker = L.marker([userLat, userLng], {
                icon: L.divIcon({
                    html: '<div style="width:24px;height:24px;background:#00d2ff;border:3px solid white;border-radius:50%;box-shadow:0 0 10px #00d2ff;"></div>',
                    iconSize: [24, 24]
                })
            }).addTo(map);

            userCircle = L.circle([userLat, userLng], {
                radius: radius,
                color: '#00d2ff',
                fillOpacity: 0.1,
                weight: 2
            }).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    userMarker.setLatLng([userLat, userLng]);
                    userCircle.setLatLng([userLat, userLng]);
                    if (isFollowing) map.setView([userLat, userLng]);
                });
            }

            loadAlerts();
            loadChats();
        }

        function logout() {
            if (confirm('အကောင့်မှ ထွက်မည်လား?')) {
                localStorage.removeItem('activeUser');
                localStorage.removeItem('isLoggedIn');
                currentUser = null;
                showAuth();
            }
        }

        function togglePanel() {
            document.getElementById('bottomPanel').classList.toggle('active');
        }

        function switchPanelTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function changeRadius(value) {
            radius = parseInt(value);
            document.getElementById('radiusValue').textContent = radius;
            if (userCircle) userCircle.setRadius(radius);
        }

        function toggleMapLayer() {
            mapLayerIndex = (mapLayerIndex + 1) % mapLayers.length;
            map.eachLayer(layer => {
                if (layer instanceof L.TileLayer) map.removeLayer(layer);
            });
            L.tileLayer(mapLayers[mapLayerIndex], { maxZoom: 19 }).addTo(map);
        }

        function toggleFollow() {
            isFollowing = !isFollowing;
            document.getElementById('followBtn').classList.toggle('active');
            if (isFollowing) map.setView([userLat, userLng]);
        }

        function toggleBell() {
            bellEnabled = !bellEnabled;
            document.getElementById('bellBtn').style.opacity = bellEnabled ? '1' : '0.5';
        }

        function startHold() {
            isHolding = true;
            holdStartTime = Date.now();
            const progress = document.getElementById('alertProgress');
            
            const interval = setInterval(() => {
                if (!isHolding) {
                    clearInterval(interval);
                    progress.style.width = '0%';
                    return;
                }
                
                const elapsed = Date.now() - holdStartTime;
                const percent = Math.min((elapsed / 3000) * 100, 100);
                progress.style.width = percent + '%';
                
                if (elapsed >= 3000) {
                    clearInterval(interval);
                    triggerAlert();
                    isHolding = false;
                    progress.style.width = '0%';
                }
            }, 50);
        }

        function stopHold() {
            isHolding = false;
        }

        function triggerAlert() {
            if (!currentUser || !userLat || !userLng) return;
            
            const alertId = Date.now();
            db.ref('alerts/' + alertId).set({
                user: currentUser,
                lat: userLat,
                lng: userLng,
                radius: radius,
                timestamp: new Date().toISOString()
            });
            
            playAlarm();
        }

        function playAlarm() {
            const audio = document.getElementById('alarmSound');
            audio.play();
            setTimeout(() => audio.pause(), 2000);
        }

        function loadAlerts() {
            db.ref('alerts').on('value', snap => {
                const data = snap.val() || {};
                let html = '';
                
                Object.keys(data).forEach(key => {
                    const alert = data[key];
                    const dist = Math.sqrt(Math.pow(alert.lat - userLat, 2) + Math.pow(alert.lng - userLng, 2)) * 111;
                    
                    if (dist <= radius) {
                        html += `<div class="alert-item" onclick="map.setView([${alert.lat}, ${alert.lng}], 15)">
                            <span>${alert.user}</span>
                            <span>${dist.toFixed(2)}km</span>
                        </div>`;
                    }
                });
                
                document.getElementById('alertsList').innerHTML = html || '<div style="padding:12px;color:#94a3b8;">အလုံးအရင်းမရှိသေးပါ</div>';
            });
        }

        function loadChats() {
            db.ref('chats').on('value', snap => {
                const data = snap.val() || {};
                let html = '';
                
                Object.keys(data).forEach(key => {
                    const chat = data[key];
                    html += `<div class="chat-message"><strong>${chat.user}:</strong> ${chat.msg}</div>`;
                });
                
                const chatDiv = document.getElementById('chatMessages');
                chatDiv.innerHTML = html;
                chatDiv.scrollTop = chatDiv.scrollHeight;
            });
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            
            if (!msg || !currentUser) return;
            
            db.ref('chats/' + Date.now()).set({
                user: currentUser,
                msg: msg
            });
            
            input.value = '';
        }
    </script>
</body>
</html>
