<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v10.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 10px; border-radius: 15px; flex: 1; text-align: center; font-size: 11px; backdrop-filter: blur(10px); font-weight: bold; }

        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 110px)); transition: 0.4s; padding: 20px; border-top: 1px solid var(--border); backdrop-filter: blur(20px); max-height: 85vh; display: flex; flex-direction: column; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; flex-shrink: 0; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .set-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .set-card label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }
        select, input[type="range"] { width: 100%; background: transparent; color: white; border: none; font-size: 12px; outline: none; }

        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; border-radius: 15px; background: rgba(0,0,0,0.3); height: 150px; margin-bottom: 10px; }
        .msg { background: rgba(255,255,255,0.08); padding: 8px; border-radius: 10px; width: fit-content; max-width: 85%; }
        .msg b { color: var(--accent); font-size: 10px; display: block; }
        
        .report-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 24px; margin: 10px auto; display: block; box-shadow: 0 5px 20px rgba(255,71,87,0.4); flex-shrink: 0; }
        .report-btn:active { transform: scale(0.9); }

        .u-marker { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; }
        .p-marker { width: 22px; height: 22px; background: var(--main); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--main); }
    </style>
</head>
<body>

<div class="header">
    <div class="chip">Police: <span id="count" style="color:var(--main)">0</span></div>
    <div class="chip">Scan: <span id="radius-val" style="color:var(--accent)">10</span>km</div>
    <div class="chip" onclick="document.getElementById('sheet').classList.toggle('active')">SETTINGS / CHAT</div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="document.getElementById('sheet').classList.toggle('active')"></div>
    
    <div id="logged-in-ui" style="display:none; flex-direction: column;">
        <div class="settings-grid">
            <div class="set-card">
                <label><i class="fas fa-layer-group"></i> MAP TYPE</label>
                <select id="mapLayer" onchange="changeMap(this.value)">
                    <option value="m">Roadmap</option>
                    <option value="s">Satellite</option>
                    <option value="y">Hybrid</option>
                </select>
            </div>
            <div class="set-card">
                <label><i class="fas fa-bell"></i> ALERT</label>
                <select id="alertSet">
                    <option value="both">Sound + Vibrate</option>
                    <option value="off">Mute</option>
                </select>
            </div>
            <div class="set-card" style="grid-column: span 2;">
                <label><i class="fas fa-route"></i> SCAN RADIUS: <span id="range-ui">10</span> km</label>
                <input type="range" min="1" max="50" value="10" oninput="updateRadius(this.value)">
            </div>
        </div>

        <button class="report-btn" id="holdBtn"><i class="fas fa-bullhorn"></i></button>
        <p id="timer-hint" style="text-align:center; font-size:10px; color:#666; margin-bottom: 10px;">၃ စက္ကန့် ဖိထားပြီး သတင်းပို့ပါ</p>

        <div id="chat-messages"></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="chatInput" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:10px; border-radius:10px; color:white;" placeholder="စာရေးရန်...">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:10px; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
        <button onclick="auth.signOut()" style="background:none; color:#444; border:none; margin-top:10px; font-size:10px; align-self:center;">LOGOUT</button>
    </div>

    <div id="login-prompter" style="display: flex; flex-direction: column; gap: 10px;">
        <h3 style="text-align:center;">Login</h3>
        <input type="email" id="email" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:14px; border-radius:15px; color:white;" placeholder="Email">
        <input type="password" id="pass" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:14px; border-radius:15px; color:white;" placeholder="Password">
        <button onclick="handleAuth()" style="background:var(--accent); border:none; padding:14px; border-radius:15px; color:white; font-weight:bold;">LOGIN / REGISTER</button>
    </div>
</div>

<audio id="alertSound" src="https://cdn.pixabay.com/audio/2022/03/24/audio_730626388e.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk", 
        authDomain: "samui-alert.firebaseapp.com", 
        projectId: "samui-alert", 
        storageBucket: "samui-alert.firebasestorage.app", 
        messagingSenderId: "713193724813", 
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.handleAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('login-prompter').style.display = user ? 'none' : 'flex';
        document.getElementById('logged-in-ui').style.display = user ? 'flex' : 'none';
        if(user) { loadMap(); loadChat(); }
    });

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.512, 100.013], 15);
    let currentLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    window.changeMap = (type) => {
        map.removeLayer(currentLayer);
        currentLayer = L.tileLayer(`https://{s}.google.com/vt/lyrs=${type}&x={x}&y={y}&z={z}`, { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    };

    window.updateRadius = (v) => { document.getElementById('range-ui').innerText = v; document.getElementById('radius-val').innerText = v; };

    let uMark = null, pMarkers = {}, firstLoad = true;
    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if(!uMark) { uMark = L.marker(e.latlng, {icon: L.divIcon({className:'u-marker'})}).addTo(map); map.setView(e.latlng, 17); }
        else uMark.setLatLng(e.latlng);
    });

    function loadMap() {
        const twentyMins = new Date(Date.now() - 20 * 60 * 1000);
        onSnapshot(query(collection(db, "police_spots"), where("time", ">", twentyMins)), (sn) => {
            document.getElementById('count').innerText = sn.size;
            sn.docChanges().forEach(change => {
                if (change.type === "added") {
                    const d = change.doc.data();
                    pMarkers[change.doc.id] = L.marker([d.lat, d.lng], {icon: L.divIcon({className:'p-marker'})}).addTo(map);
                    // App စဖွင့်ဖွင့်ချင်း အကုန်မြည်မနေအောင် firstLoad နဲ့ စစ်ထားပါတယ်
                    if(!firstLoad) triggerAlert();
                }
            });
            firstLoad = false;
        });
    }

    function triggerAlert() {
        const mode = document.getElementById('alertSet').value;
        if(mode === 'both') {
            const sound = document.getElementById('alertSound');
            sound.play().catch(e => console.log("Interaction required for sound"));
            if(navigator.vibrate) navigator.vibrate([300, 100, 300]);
        }
    }

    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: input.value, user: auth.currentUser.email.split('@')[0], time: serverTimestamp() });
        input.value = "";
    };

    function loadChat() {
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(30)), (sn) => {
            const box = document.getElementById('chat-messages'); box.innerHTML = "";
            sn.forEach(d => { box.innerHTML += `<div class="msg"><b>${d.data().user}</b>${d.data().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    const hBtn = document.getElementById('holdBtn');
    let hTimer, hCount = 0;
    const startH = (e) => { e.preventDefault(); hTimer = setInterval(() => { hCount++; if(hCount >= 30){ clearInterval(hTimer); fire(); hCount = 0; } }, 100); };
    const stopH = () => { clearInterval(hTimer); hCount = 0; };
    hBtn.addEventListener('touchstart', startH); hBtn.addEventListener('touchend', stopH);
    hBtn.addEventListener('mousedown', startH); hBtn.addEventListener('mouseup', stopH);

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(collection(db, "police_spots"), { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp(), user: auth.currentUser.email });
        });
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
