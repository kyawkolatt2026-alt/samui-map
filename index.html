<!DOCTYPE html><html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samui Safe Ride - Final</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>
body { margin:0; background:#121212; color:#fff; font-family:sans-serif; }
#map { height:100vh; }

.bottom-panel { position:absolute; bottom:0; width:100%; background:#1e1e1e; padding:10px; }
button { padding:10px; border:none; border-radius:10px; background:#00d2ff; color:#fff; }
</style></head><body onclick="unlockAudio()"><div id="map"></div><div class="bottom-panel">
<button onclick="toggleBell()">🔔 Toggle Alarm</button>
</div><!-- 🔊 NEW LOUD ALARM --><audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto" loop></audio>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script><script>
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, uLat, uLng, rad = 200;
let markers = {};
let bell = true;
let isAlerting = false;
let audioUnlocked = false;

function unlockAudio(){
if(audioUnlocked) return;
const s = document.getElementById("alarm-sound");
s.play().then(()=>{ s.pause(); s.currentTime=0; audioUnlocked=true; }).catch(()=>{});
}

// 🗺️ INIT MAP
map = L.map('map').setView([9.53,99.93], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📍 LOCATION
navigator.geolocation.watchPosition(pos=>{
uLat = pos.coords.latitude;
uLng = pos.coords.longitude;
}, null, {enableHighAccuracy:true});

// ============================
// ⏱ HOLD SYSTEM
// ============================

let hold1, hold2;

map.on('mousedown touchstart', (e)=>{
unlockAudio();

const lat = e.latlng.lat;
const lng = e.latlng.lng;

// 2 sec = normal
hold1 = setTimeout(()=>{
postPin(lat,lng,false);
navigator.vibrate && navigator.vibrate(200);
alert("📍 Normal Pin");
},2000);

// 3 sec = alarm
hold2 = setTimeout(()=>{
postPin(lat,lng,true);
navigator.vibrate && navigator.vibrate([300,100,300]);
startAlert();
alert("🚨 ALARM PIN!");
},3000);

});

map.on('mouseup touchend mousemove touchmove', ()=>{
clearTimeout(hold1);
clearTimeout(hold2);
});

// ============================
// 📌 POST PIN
// ============================

function postPin(lat,lng,alarm=false){
const id = Date.now();
db.ref("pins/"+id).set({
lat,lng,
alarm,
time:id,
expires:id+(20*60*1000)
});
}

// ============================
// 🔄 SYNC DATA
// ============================

db.ref("pins").on("value", snap=>{
const data = snap.val();
for(let k in markers){ map.removeLayer(markers[k]); }
markers = {};

for(let id in data){
const p = data[id];

if(Date.now() > p.expires){
db.ref("pins/"+id).remove();
continue;
}

markers[id] = L.marker([p.lat,p.lng],{
icon: L.divIcon({
html: p.alarm ? "🚨" : "👮",
className:"",
iconSize:[30,30]
})
}).addTo(map);
}

checkDist();
});

// ============================
// 📏 DISTANCE CHECK
// ============================

function checkDist(){
if(!uLat || !bell) return stopAlert();

db.ref("pins").once("value", snap=>{
const pins = snap.val();
let near = false;

for(let id in pins){
let d = map.distance([uLat,uLng],[pins[id].lat,pins[id].lng]);

if(d < rad){
near = true;

if(pins[id].alarm){
startAlert();
return;
}
}
}

if(near) startAlert();
else stopAlert();
});
}

// ============================
// 🔊 ALERT SYSTEM
// ============================

function startAlert(){
if(isAlerting) return;
isAlerting = true;

const s = document.getElementById("alarm-sound");
s.volume = 1;

s.play().catch(()=>{ isAlerting=false; });

navigator.vibrate && navigator.vibrate([800,200,800,200,800]);
}

function stopAlert(){
isAlerting = false;
const s = document.getElementById("alarm-sound");
s.pause();
s.currentTime = 0;
}

// ============================
// 🔔 TOGGLE
// ============================

function toggleBell(){
bell = !bell;
if(!bell) stopAlert();
}

</script></body>
</html>
