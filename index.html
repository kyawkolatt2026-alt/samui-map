<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Pro UI</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        /* Auth UI */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        .input-box { width: 100%; padding: 15px; padding-right: 45px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; user-select: text !important; outline: none; }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; cursor: pointer; pointer-events: all; }
        
        /* Checkbox Style */
        .remember-me { display: flex; align-items: center; gap: 10px; margin: 15px 5px; font-size: 14px; color: #ccc; cursor: pointer; pointer-events: all; }
        .remember-me input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 5px; cursor: pointer; pointer-events: all; }
        .toggle-auth { margin-top: 15px; font-size: 14px; color: #aaa; pointer-events: all; cursor: pointer; }
        .toggle-auth span { color: var(--primary); font-weight: bold; }

        /* App UI */
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        .top-left-bar { position: absolute; top: 45px; left: 15px; display: flex; flex-direction: column; gap: 15px; }
        .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 18px; cursor: pointer; }
        .active-follow { color: var(--primary); border: 2px solid var(--primary); }

        /* User Marker */
        .user-loc-container { position: relative; width: 24px; height: 24px; transition: transform 0.1s linear; }
        .user-dot { width: 16px; height: 16px; background: #00d2ff; border: 2.5px solid white; border-radius: 50%; position: absolute; top: 4px; left: 4px; z-index: 2; box-shadow: 0 0 10px var(--primary); }
        .user-arrow { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 15px solid #00d2ff; z-index: 1; }

        /* Bottom Panel */
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(80%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; }
        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }
        .hold-btn-wrapper.success-bg { background: var(--success) !important; transition: 0.5s; }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }
        
        #chat-msgs { height: 180px; overflow-y: auto; background: #151515; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; }
        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .hidden { display: none !important; }
        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title" style="color:var(--primary); margin-bottom: 20px;">SAMUI SAFE RIDE</h2>
            <div class="input-group">
                <input type="email" id="email" class="input-box" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="password" class="input-box" placeholder="Password">
                <i class="fas fa-eye eye-icon" onclick="togglePass('password')"></i>
            </div>
            <div id="confirm-pass-group" class="input-group hidden">
                <input type="password" id="confirm-password" class="input-box" placeholder="Confirm Password">
                <i class="fas fa-eye eye-icon" onclick="togglePass('confirm-password')"></i>
            </div>

            <label class="remember-me">
                <input type="checkbox" id="remember-checkbox" checked> အကောင့်မှတ်ထားရန်
            </label>

            <button id="auth-btn" class="pointer-all btn-auth" onclick="handleAuth()">အကောင့်ဝင်ရန်</button>
            <div class="toggle-auth" onclick="switchAuthMode()">
                <span id="toggle-text">အကောင့်အသစ်ဖွင့်ရန် Sign Up</span>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-left-bar">
                <button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="top-right-bar">
                <button class="pointer-all circle-btn" onclick="nextMap()"><i class="fas fa-layer-group"></i></button>
                <button id="follow-btn" class="pointer-all circle-btn active-follow" onclick="recenter()"><i class="fas fa-location-arrow"></i></button>
                <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
            </div>
            
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                <div class="hold-btn-wrapper" id="hold-trigger">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="main-btn-text" class="btn-main">👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)</button>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="font-size:12px;">အကွာအဝေး: <span id="rad-txt">200</span>m</label>
                    <input type="range" min="100" max="2000" step="100" value="200" oninput="changeRadius(this.value)" style="width:100%;">
                </div>
                
                <div class="tab-nav">
                    <div class="tab-item active" id="tab-l" onclick="showTab('list')">စာရင်း</div>
                    <div class="tab-item" id="tab-c" onclick="showTab('chat')">Chat Box</div>
                </div>
                <div id="list-tab"><div id="pin-list" style="max-height:180px; overflow-y:auto;"></div></div>
                <div id="chat-tab" class="hidden">
                    <div id="chat-msgs"></div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="chat-input" class="input-box" style="margin:0;">
                        <button onclick="sendChat()" style="background:var(--primary); border:none; width:60px; color:white; border-radius:12px;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isLoginMode = true;
        let map, uMarker, uCircle, rad = 200, bell = true;
        let markers = {}, pressTimer, progInterval, alertLoop = null;
        let sIdx = 0, isFollowing = true, uLat, uLng, currentHeading = 0;
        const styles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];

        // --- Auto Login State Observer ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                initApp();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        });

        // --- Auth Functions ---
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "SAMUI SAFE RIDE" : "CREATE ACCOUNT";
            document.getElementById('auth-btn').innerText = isLoginMode ? "အကောင့်ဝင်ရန်" : "အကောင့်ဖွင့်မည်";
            document.getElementById('toggle-text').innerHTML = isLoginMode ? "အကောင့်အသစ်ဖွင့်ရန် <span>Sign Up</span>" : "အကောင့်ရှိပြီးသားလား? <span>Login</span>";
            document.getElementById('confirm-pass-group').classList.toggle('hidden', isLoginMode);
            // Sign Up Mode မှာ Checkbox ကို ခေတ္တဖျောက်ထားချင်ရင် ဒီမှာ ထည့်နိုင်ပါတယ် (Optional)
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const cp = document.getElementById('confirm-password').value;
            const isRemember = document.getElementById('remember-checkbox').checked;

            if(!e || !p) return alert("ကျေးဇူးပြု၍ အချက်အလက်ဖြည့်ပါ");

            try {
                // Checkbox အခြေအနေအရ Login သိမ်းမသိမ်း သတ်မှတ်ခြင်း
                const persistence = isRemember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
                await auth.setPersistence(persistence);

                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(e, p);
                } else {
                    if (p !== cp) return alert("Password မတူညီပါ");
                    await auth.createUserWithEmailAndPassword(e, p);
                    alert("အကောင့်ဖွင့်ခြင်း အောင်မြင်သည်");
                }
            } catch (err) { alert(err.message); }
        }

        // --- Map Logic ---
        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            if(map) return;

            map = L.map('map', { zoomControl: false, attributionControl: false, rotate: true, touchRotate: true }).setView([9.5334, 99.9352], 16);
            L.tileLayer(styles[0]).addTo(map);

            map.on('contextmenu', (e) => {
                const lat = e.latlng.lat; const lng = e.latlng.lng;
                if(confirm("ဤနေရာတွင် Pin ထောက်မည်လား?")) {
                    postPin(lat, lng);
                    if(navigator.vibrate) navigator.vibrate(200);
                }
            });

            const userIcon = L.divIcon({ html: `<div id="user-icon-rotate" class="user-loc-container"><div class="user-arrow"></div><div class="user-dot"></div></div>`, className: '', iconSize: [24, 24], iconAnchor: [12, 12] });
            map.on('dragstart', () => { isFollowing = false; document.getElementById('follow-btn').classList.remove('active-follow'); });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (e) => {
                    if (e.alpha !== null) currentHeading = 360 - e.alpha;
                    updateMarkerRotation();
                }, true);
            }

            navigator.geolocation.watchPosition(pos => {
                uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                if(isFollowing) map.setView([uLat, uLng], map.getZoom(), { animate: true });
                if(!uMarker) {
                    uMarker = L.marker([uLat, uLng], { icon: userIcon }).addTo(map);
                    uCircle = L.circle([uLat, uLng], { radius: rad, color: '#00d2ff', weight: 1.5, fillOpacity: 0.1 }).addTo(map);
                } else { uMarker.setLatLng([uLat, uLng]); uCircle.setLatLng([uLat, uLng]); }
                updateMarkerRotation(); checkDist(uLat, uLng);
            }, err => {}, { enableHighAccuracy: true });

            setupActions(); syncAll();
        }

        function updateMarkerRotation() {
            const el = document.getElementById('user-icon-rotate');
            if(el && map) { const mapRot = map.getBearing ? map.getBearing() : 0; el.style.transform = `rotate(${currentHeading - mapRot}deg)`; }
        }

        function recenter() {
            isFollowing = true; document.getElementById('follow-btn').classList.add('active-follow');
            if(uLat) map.setView([uLat, uLng], 17, { animate: true });
            if(map.setBearing) map.setBearing(0); 
        }

        function setupActions() {
            const btnWrapper = document.getElementById('hold-trigger');
            const prog = document.getElementById('hold-progress');
            const btnTxt = document.getElementById('main-btn-text');
            const startH = (e) => {
                e.preventDefault(); let startT = Date.now();
                progInterval = setInterval(() => { let p = ((Date.now() - startT) / 3000) * 100; prog.style.width = Math.min(100, p) + '%'; }, 50);
                pressTimer = setTimeout(() => {
                    postPin(uLat, uLng); if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    btnWrapper.classList.add('success-bg'); btnTxt.innerText = "✅ သတိပေးချက် တင်ပြီးပါပြီ";
                    setTimeout(() => { btnWrapper.classList.remove('success-bg'); btnTxt.innerText = "👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)"; }, 2000);
                    clearInterval(progInterval); prog.style.width = '0%';
                }, 3000);
            };
            btnWrapper.addEventListener('touchstart', startH);
            btnWrapper.addEventListener('touchend', () => { clearInterval(progInterval); clearTimeout(pressTimer); prog.style.width = '0%'; });
        }

        function postPin(lat, lng) {
            const id = Date.now();
            const user = auth.currentUser ? auth.currentUser.email.split('@')[0] : "Guest";
            db.ref('pins/' + id).set({ lat, lng, time: id, expires: id + (20 * 60 * 1000), user: user });
        }

        function syncAll() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(); const list = document.getElementById('pin-list'); list.innerHTML = "";
                const now = Date.now();
                for(let k in markers) map.removeLayer(markers[k]); markers = {};
                for(let id in data) {
                    const p = data[id];
                    if(now > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], { icon: L.divIcon({ html: '👮', className: 'p-icon', iconSize: [30, 30] }) }).addTo(map);
                    const t = new Date(p.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    list.innerHTML += `<div class="list-item" onclick="map.setView([${p.lat}, ${p.lng}], 17); isFollowing=false; document.getElementById('follow-btn').classList.remove('active-follow');"><span><b>${p.user}</b></span><span style="color:var(--danger); font-weight:bold;">${t}</span></div>`;
                }
            });
            db.ref('chats').on('value', snap => {
                const c = snap.val(); const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                for(let id in c) { box.innerHTML += `<div><b>${c[id].user}:</b> ${c[id].txt}</div>`; }
                box.scrollTop = box.scrollHeight;
            });
        }

        function checkDist(lt, lg) {
            if(!bell) { stopAlert(); return; }
            db.ref('pins').once('value', snap => {
                const pins = snap.val(); let nearby = false;
                for(let id in pins) { if(map.distance([lt, lg], [pins[id].lat, pins[id].lng]) < rad) { nearby = true; break; } }
                if(nearby) startAlert(); else stopAlert();
            });
        }

        function startAlert() { if(alertLoop) return; document.getElementById('alarm-sound').play().catch(()=>{}); alertLoop = setInterval(() => { document.getElementById('alarm-sound').play().catch(()=>{}); if(navigator.vibrate) navigator.vibrate([500, 300, 500]); }, 3000); }
        function stopAlert() { clearInterval(alertLoop); alertLoop = null; document.getElementById('alarm-sound').pause(); }
        function sendChat() { const i = document.getElementById('chat-input'); if(!i.value) return; const user = auth.currentUser ? auth.currentUser.email.split('@')[0] : "Guest"; db.ref('chats').push({ user: user, txt: i.value, expires: Date.now() + (24 * 60 * 60 * 1000) }); i.value = ""; }
        function showTab(t) { document.getElementById('list-tab').classList.toggle('hidden', t !== 'list'); document.getElementById('chat-tab').classList.toggle('hidden', t !== 'chat'); document.getElementById('tab-l').classList.toggle('active', t === 'list'); document.getElementById('tab-c').classList.toggle('active', t === 'chat'); }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell ? 'fas fa-bell' : 'fas fa-bell-slash'; if(!bell) stopAlert(); }
        function changeRadius(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; if(uCircle) uCircle.setRadius(rad); }
        function nextMap() { sIdx = (sIdx + 1) % styles.length; L.tileLayer(styles[sIdx]).addTo(map); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
