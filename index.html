<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samui Safety Map Premium</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #ff4757; --glass: rgba(255, 255, 255, 0.2); }
        body { margin: 0; padding: 0; background: #1e1e1e; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; filter: saturate(1.2); }
        
        /* Floating Header */
        .header {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 14px; font-weight: bold; border: 1px solid var(--glass);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; width: 80%;
        }

        /* Modern Glass Button */
        .report-btn { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--primary); color: white; border: none; 
            padding: 18px 35px; border-radius: 50px; font-weight: 900; font-size: 16px;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.5); cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .report-btn:active { transform: translateX(-50%) scale(0.9); }
        
        /* Custom Notification */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #2ed573; color: white; padding: 12px 25px; border-radius: 10px;
            z-index: 2000; transition: 0.5s; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Pulsing Marker for Police */
        .police-icon {
            background: var(--primary); border-radius: 50%;
            border: 2px solid white; box-shadow: 0 0 15px var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body>

<div id="toast">တင်ပြီးပါပြီ ✅</div>
<div class="header">SAMUI SAFETY MAP (ALPHA)</div>

<div id="map"></div>
<button id="mainBtn" class="report-btn" onclick="reportNow()">
    <span>🚨 ဒီနေရာမှာ ဖမ်းနေတယ်</span>
</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
    authDomain: "samui-alert.firebaseapp.com",
    projectId: "samui-alert",
    storageBucket: "samui-alert.firebasestorage.app",
    messagingSenderId: "713193724813",
    appId: "1:713193724813:web:85831c39e3560eb310bbc4",
    measurementId: "G-DG7PRMKLN1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const spotsRef = collection(db, "police_spots");

  // Google Maps Hybrid View (Satellite + Road)
  var map = L.map('map', {zoomControl: false}).setView([9.5120, 100.0137], 13);
  L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      subdomains:['mt0','mt1','mt2','mt3']
  }).addTo(map);

  let markers = {};
  let userMarker = null;

  // Real-time Update
  const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
  const q = query(spotsRef, where("time", ">", twoHoursAgo));

  onSnapshot(q, (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      const data = change.doc.data();
      const id = change.doc.id;
      if (change.type === "added") {
        const m = L.circleMarker([data.lat, data.lng], {
            className: 'police-icon', radius: 10, color: 'white', fillColor: '#ff4757', fillOpacity: 1
        }).addTo(map).bindPopup("🚨 <b>ရဲဖမ်းနေသည်</b><br>တင်သည့်အချိန်: " + new Date(data.time?.toDate()).toLocaleTimeString());
        markers[id] = m;
      }
      if (change.type === "removed") {
        map.removeLayer(markers[id]);
        delete markers[id];
      }
    });
  });

  // Track User Location
  map.locate({setView: true, watch: true, maxZoom: 16});
  map.on('locationfound', (e) => {
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circle(e.latlng, {radius: 15, color: '#1e90ff', fillColor: '#1e90ff', fillOpacity: 0.5}).addTo(map);
  });

  window.reportNow = async function() {
    const btn = document.getElementById('mainBtn');
    const toast = document.getElementById('toast');
    
    btn.disabled = true;
    btn.style.opacity = "0.7";
    btn.innerText = "တင်နေသည်...";

    navigator.geolocation.getCurrentPosition(async (pos) => {
      await addDoc(spotsRef, {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        time: serverTimestamp()
      });

      // Show Toast Notification
      toast.style.top = "25px";
      setTimeout(() => { toast.style.top = "-100px"; }, 3000);

      btn.disabled = false;
      btn.style.opacity = "1";
      btn.innerText = "🚨 ဒီနေရာမှာ ဖမ်းနေတယ်";
    });
  };
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
