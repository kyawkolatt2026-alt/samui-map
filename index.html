<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v10.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Headers */
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 15px; flex: 1; text-align: center; font-size: 11px; backdrop-filter: blur(10px); font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* Bottom Sheet */
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 110px)); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); padding: 20px; border-top: 1px solid var(--border); backdrop-filter: blur(25px); max-height: 85vh; display: flex; flex-direction: column; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; flex-shrink: 0; }

        /* Settings Grid */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .set-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .set-card label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; background: transparent; color: white; border: none; font-size: 12px; outline: none; cursor: pointer; }

        /* Chat */
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; border-radius: 15px; background: rgba(0,0,0,0.3); height: 130px; margin-bottom: 10px; border: 1px solid var(--border); }
        .msg { background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 12px; width: fit-content; max-width: 85%; }
        .msg b { color: var(--accent); font-size: 10px; display: block; margin-bottom: 2px; }

        /* Inputs & Buttons */
        .login-box { display: flex; flex-direction: column; gap: 12px; }
        .input-group { position: relative; width: 100%; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 14px; border-radius: 15px; color: white; width: 100%; box-sizing: border-box; outline: none; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; }
        
        .report-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 26px; margin: 5px auto; display: block; box-shadow: 0 8px 25px rgba(255,71,87,0.4); flex-shrink: 0; transition: 0.2s; }
        .report-btn:active { transform: scale(0.9); background: #ff6b81; }

        /* Markers */
        .u-marker { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .p-marker { width: 24px; height: 24px; background: var(--main); border: 4px solid white; border-radius: 50%; box-shadow: 0 0 20px var(--main); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body onclick="enableAudioContext()">

<div class="header">
    <div class="chip">POLICE: <span id="count" style="color:var(--main)">0</span></div>
    <div class="chip">ALERT: <span id="radius-val" style="color:var(--accent)">10</span>km</div>
    <div class="chip" onclick="document.getElementById('sheet').classList.toggle('active')">DASHBOARD</div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="document.getElementById('sheet').classList.toggle('active')"></div>
    
    <div id="logged-in-ui" style="display:none; flex-direction: column;">
        <div class="settings-grid">
            <div class="set-card">
                <label>Map View</label>
                <select id="mapLayer" onchange="changeMap(this.value)">
                    <option value="m">Roadmap</option>
                    <option value="s">Satellite</option>
                    <option value="y">Hybrid</option>
                </select>
            </div>
            <div class="set-card">
                <label>Notification</label>
                <select id="alertSet">
                    <option value="both">Sound + Vibrate</option>
                    <option value="off">Mute</option>
                </select>
            </div>
            <div class="set-card" style="grid-column: span 2;">
                <label>Alert Distance: <span id="range-ui">10</span> km</label>
                <input type="range" id="radiusRange" min="1" max="50" value="10" oninput="updateRadius(this.value)">
            </div>
        </div>

        <button class="report-btn" id="holdBtn"><i class="fas fa-bullhorn"></i></button>
        <p id="timer-hint" style="text-align:center; font-size:10px; color:#666; margin-bottom: 10px;"> Hold 3s to Report</p>

        <div id="chat-messages"></div>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="chatInput" placeholder="Send message..." style="flex:1; border-radius:12px;">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; padding:10px 15px; border-radius:12px; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
        
        <button id="logoutBtn" style="background:none; color:var(--main); border:1px solid var(--border); padding:8px; border-radius:10px; font-size:10px; align-self:center; cursor:pointer; width: 100px;">LOGOUT</button>
    </div>

    <div id="login-prompter" class="login-box">
        <h2 style="text-align:center; margin:0 0 10px 0;">Samui Rider Pro</h2>
        <input type="email" id="email" placeholder="Email Address">
        
        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
            <i class="fas fa-eye toggle-pass" onclick="toggleView('pass')"></i>
        </div>

        <div id="reg-fields" style="display:none; flex-direction:column; gap:12px;">
            <div class="input-group">
                <input type="password" id="confirm_pass" placeholder="Confirm Password">
                <i class="fas fa-eye toggle-pass" onclick="toggleView('confirm_pass')"></i>
            </div>
        </div>

        <button class="report-btn" id="authBtn" onclick="handleAuth()" style="width:100%; border-radius:15px; font-size:16px; background:var(--accent); margin:10px 0;">LOGIN</button>
        <p id="switchMode" onclick="toggleRegMode()" style="text-align:center; font-size:12px; color:var(--accent); cursor:pointer;">No account? Register here</p>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk", 
        authDomain: "samui-alert.firebaseapp.com", 
        projectId: "samui-alert", 
        storageBucket: "samui-alert.firebasestorage.app", 
        messagingSenderId: "713193724813", 
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- Audio Fix ---
    let audioAllowed = false;
    window.enableAudioContext = () => {
        if(!audioAllowed) {
            const sound = document.getElementById('alertSound');
            sound.play().then(() => { sound.pause(); audioAllowed = true; });
        }
    };

    // --- Auth Logic ---
    let isReg = false;
    window.toggleRegMode = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'flex' : 'none';
        document.getElementById('authBtn').innerText = isReg ? 'REGISTER' : 'LOGIN';
        document.getElementById('switchMode').innerText = isReg ? 'Already have an account? Login' : 'No account? Register here';
    };

    window.toggleView = (id) => {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    };

    window.handleAuth = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || pass.length < 6) return alert("Please check your email and password (min 6 chars)");

        if(isReg) {
            if(pass !== document.getElementById('confirm_pass').value) return alert("Passwords do not match");
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        } else {
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Login Error: " + e.message));
        }
    };

    // Logout Fixed
    document.getElementById('logoutBtn').onclick = () => {
        signOut(auth).then(() => { location.reload(); }).catch(e => alert(e.message));
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('login-prompter').style.display = user ? 'none' : 'flex';
        document.getElementById('logged-in-ui').style.display = user ? 'flex' : 'none';
        if(user) { initApp(); }
    });

    // --- Map & Core Logic ---
    let map, uMark, pMarkers = {}, scanRadius = 10, isFirst = true;
    
    function initApp() {
        if(map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.512, 100.013], 15);
        L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

        map.locate({ watch: true, enableHighAccuracy: true });
        map.on('locationfound', (e) => {
            if(!uMark) { uMark = L.marker(e.latlng, {icon: L.divIcon({className:'u-marker'})}).addTo(map); map.setView(e.latlng, 17); }
            else uMark.setLatLng(e.latlng);
        });

        loadPoliceData();
        loadChat();
    }

    window.changeMap = (type) => {
        L.tileLayer(`https://{s}.google.com/vt/lyrs=${type}&x={x}&y={y}&z={z}`, { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    };

    window.updateRadius = (v) => {
        scanRadius = v;
        document.getElementById('range-ui').innerText = v;
        document.getElementById('radius-val').innerText = v;
    };

    function loadPoliceData() {
        const timeLimit = new Date(Date.now() - 30 * 60 * 1000); // 30 mins
        onSnapshot(query(collection(db, "police_spots"), where("time", ">", timeLimit)), (sn) => {
            document.getElementById('count').innerText = sn.size;
            sn.docChanges().forEach(change => {
                if (change.type === "added") {
                    const d = change.doc.data();
                    pMarkers[change.doc.id] = L.marker([d.lat, d.lng], {icon: L.divIcon({className:'p-marker'})}).addTo(map);
                    
                    if(!isFirst && uMark) {
                        const dist = map.distance(uMark.getLatLng(), [d.lat, d.lng]) / 1000;
                        if(dist <= scanRadius) playAlert();
                    }
                }
            });
            isFirst = false;
        });
    }

    function playAlert() {
        if(document.getElementById('alertSet').value === 'off') return;
        const sound = document.getElementById('alertSound');
        sound.currentTime = 0;
        sound.play().catch(e => console.log("Sound blocked"));
        if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
    }

    // --- Chat & Report ---
    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: input.value, user: auth.currentUser.email.split('@')[0], time: serverTimestamp() });
        input.value = "";
    };

    function loadChat() {
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(40)), (sn) => {
            const box = document.getElementById('chat-messages'); box.innerHTML = "";
            sn.forEach(d => { box.innerHTML += `<div class="msg"><b>${d.data().user}</b>${d.data().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    // Report Button Fixed
    const hBtn = document.getElementById('holdBtn');
    let hTimer, hCount = 0;
    const startH = (e) => { e.preventDefault(); hCount = 0; hTimer = setInterval(() => { hCount++; if(hCount >= 30){ clearInterval(hTimer); fireReport(); hCount = 0; alert("Report Sent!"); } }, 100); };
    const stopH = () => { clearInterval(hTimer); hCount = 0; };
    hBtn.addEventListener('touchstart', startH); hBtn.addEventListener('touchend', stopH);
    hBtn.addEventListener('mousedown', startH); hBtn.addEventListener('mouseup', stopH);

    async function fireReport() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(collection(db, "police_spots"), { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp(), user: auth.currentUser.email });
        });
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
