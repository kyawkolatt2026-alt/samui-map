<!DOCTYPE html>  <html lang="my">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Samui Safe Ride - Easy Access</title>  
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">  
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>  
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>  

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>  

<style>  
    :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }  
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }  
    body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; user-select: none; }  
    #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }  
    .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }  
    .auth-card { background: var(--card); padding: 30px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }  
    .input-group { position: relative; margin-bottom: 15px; text-align: left; }
    .input-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; outline: none; font-size: 16px; width: 100%; user-select: text !important; }  
    .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; cursor: pointer; z-index: 10; }
    .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }  
    .auth-switch { margin-top: 15px; font-size: 13px; color: #aaa; cursor: pointer; }
    .auth-switch b { color: var(--primary); }
    .remember-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 13px; color: #ccc; }
    .forgot-link { color: var(--danger); cursor: pointer; }
    .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }  
    .pointer-all { pointer-events: all; }  
    .top-left-bar { position: absolute; top: 45px; left: 15px; display: flex; flex-direction: column; gap: 15px; }  
    .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }  
    .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 18px; cursor: pointer; }  
    .active-follow { color: var(--primary); border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }  
    .user-loc-container { position: relative; width: 24px; height: 24px; }  
    .user-dot { width: 16px; height: 16px; background: #00d2ff; border: 2.5px solid white; border-radius: 50%; position: absolute; top: 4px; left: 4px; z-index: 2; box-shadow: 0 0 10px var(--primary); }  
    .user-arrow { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 15px solid #00d2ff; z-index: 1; }  
    .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(80%); transition: 0.3s; }  
    .bottom-panel.active { transform: translateY(0); }  
    .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; cursor: pointer; }  
    .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }  
    .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); }  
    .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }  
    #chat-msgs { height: 180px; overflow-y: auto; background: #151515; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; text-align: left; }  
    .tab-nav { display: flex; border-bottom: 1px solid #333; margin-bottom: 10px; }  
    .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; cursor: pointer; }  
    .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }  
    .hidden { display: none !important; }  
    .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }  
</style>
</head>  
<body>  

<div id="pin-modal" class="auth-overlay hidden" style="background:rgba(0,0,0,0.6);">  
    <div class="auth-card" style="max-width:300px;">  
        <p>ဤနေရာတွင် Pin ထောက်မည်လား?</p>  
        <div style="display:flex; gap:10px;">  
            <button class="pointer-all btn-auth" style="background:#444;" onclick="closePinModal()">Cancel</button>  
            <button class="pointer-all btn-auth" id="modal-confirm-btn">OK</button>  
        </div>  
    </div>  
</div>  

<div id="auth-section" class="auth-overlay hidden">  
    <div class="auth-card">  
        <h2 style="color:var(--primary); margin-bottom: 25px;">SAMUI SAFE RIDE</h2>  
        
        <div id="login-form">
            <div class="input-group"><input type="email" id="login-email" class="input-box" placeholder="Email Address"></div>
            <div class="input-group">
                <input type="password" id="login-pass" class="input-box" placeholder="Password">
                <i class="fas fa-eye password-toggle" onclick="togglePassView('login-pass')"></i>
            </div>
            <div class="remember-box">
                <div><input type="checkbox" id="remember-me" checked><label for="remember-me" style="margin-left:5px;">မှတ်ထားမည်</label></div>
                <span class="forgot-link" onclick="switchAuth('reset')">မေ့နေသလား?</span>
            </div>
            <button class="btn-auth" onclick="handleLogin()">အကောင့်ဝင်ရန်</button>
            <div class="auth-switch" onclick="switchAuth('reg')">အကောင့်မရှိသေးဘူးလား? <b>အသစ်ဖွင့်ရန်</b></div>
        </div>

        <div id="register-form" class="hidden">
            <div class="input-group"><input type="text" id="reg-user" class="input-box" placeholder="အမည် (Username)"></div>
