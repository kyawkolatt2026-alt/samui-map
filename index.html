<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samui Safe Ride</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #1a1a1a; color: white; }
        #map { height: 55vh; width: 100%; border-bottom: 2px solid #444; }
        .container { padding: 15px; }
        .hidden { display: none; }
        
        /* UI Styling */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #00c851; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-red { background: #ff4444; }
        .btn-blue { background: #33b5e5; }
        
        .list-container { background: #222; border-radius: 10px; padding: 10px; margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .pin-item { border-bottom: 1px solid #333; padding: 8px 0; font-size: 13px; display: flex; justify-content: space-between; }
        
        .controls { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 1000; }
        .status-bar { font-size: 12px; color: #aaa; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h2 id="auth-title">Samui Safe Ride</h2>
        <p>Email/Password နဲ့ အကောင့်ဝင်ပါ</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <div id="register-fields" class="hidden">
            <input type="password" id="confirm-password" placeholder="Confirm Password">
        </div>
        <label style="font-size: 14px;"><input type="checkbox" onclick="togglePass()" style="width: auto;"> Password ပြရန်</label>
        
        <button id="main-btn" onclick="handleAuth()">အကောင့်ဝင်ရန်</button>
        <button onclick="toggleAuthMode()" style="background:none; color:#33b5e5;">Register လုပ်ရန်</button>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        
        <div class="controls">
            <div class="status-bar" id="gps-status">GPS ရှာဖွေနေသည်...</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="reportPolice()" class="btn-red">👮 ဖမ်းနေသည်</button>
                <button onclick="logout()" class="btn-blue" style="width: 40%;">Logout</button>
            </div>
            
            <div style="margin-top: 10px;">
                <label style="font-size: 12px;">သတိပေးမည့်အကွာအဝေး: <span id="dist-text">500</span>m</label>
                <input type="range" min="100" max="2000" step="100" value="500" oninput="updateRadius(this.value)">
            </div>

            <div class="list-container" id="pin-list">
                <div style="color: #666; text-align: center;">အနီးနားရှိ ဖမ်းဆီးမှုများ</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // သင်ပေးထားတဲ့ Config ကို ဒီမှာ ထည့်ထားပါတယ်
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4",
            measurementId: "G-DG7PRMKLN1"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, userMarker, userCircle, alertRadius = 500;
        let isRegister = false;
        let activeMarkers = {};

        // --- Auth Logic ---
        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? "အကောင့်ဖွင့်ရန်" : "Samui Safe Ride";
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('main-btn').innerText = isRegister ? "Register" : "အကောင့်ဝင်ရန်";
        }

        function togglePass() {
            let p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isRegister) {
                    const cp = document.getElementById('confirm-password').value;
                    if (pass !== cp) return alert("Password မတူပါ");
                    await auth.createUserWithEmailAndPassword(email, pass);
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                initApp();
            } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // --- Map Logic ---
        function initApp() {
            // Samui location initialization
            map = L.map('map').setView([9.5334, 99.9352], 13);
            
            // Standard Street Map (Free)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    const latlng = [latitude, longitude];
                    
                    document.getElementById('gps-status').innerText = `GPS Active: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;

                    if (!userMarker) {
                        userMarker = L.marker(latlng).addTo(map).bindPopup("သင်ရှိနေသည့်နေရာ").openPopup();
                        userCircle = L.circle(latlng, { radius: alertRadius, color: '#33b5e5', fillOpacity: 0.1 }).addTo(map);
                        map.setView(latlng, 15);
                    } else {
                        userMarker.setLatLng(latlng);
                        userCircle.setLatLng(latlng);
                    }
                    checkProximity(latitude, longitude);
                }, err => { alert("GPS ဖွင့်ပေးရန် လိုအပ်ပါသည်"); }, { enableHighAccuracy: true });
            }
            listenToPins();
        }

        function updateRadius(val) {
            alertRadius = parseInt(val);
            document.getElementById('dist-text').innerText = val;
            if (userCircle) userCircle.setRadius(alertRadius);
        }

        // --- Database Logic ---
        function reportPolice() {
            navigator.geolocation.getCurrentPosition(pos => {
                const id = Date.now();
                db.ref('pins/' + id).set({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    time: id,
                    expires: id + (20 * 60 * 1000)
                });
                alert("တင်ပြီးပါပြီ။ ၂၀ မိနစ်ကြာရင် အလိုအလျောက် ပျက်ပါမယ်။");
            });
        }

        function listenToPins() {
            db.ref('pins').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('pin-list');
                list.innerHTML = "";
                
                // လက်ရှိရှိနေတဲ့ marker တွေကို ရှင်းမယ်
                for (let key in activeMarkers) map.removeLayer(activeMarkers[key]);
                activeMarkers = {};

                for (let id in data) {
                    const pin = data[id];
                    if (Date.now() > pin.expires) {
                        db.ref('pins/' + id).remove();
                        continue;
                    }

                    // Map ပေါ်မှာ Pin ထည့်မယ်
                    const marker = L.marker([pin.lat, pin.lng], {
                        icon: L.divIcon({ html: '👮', className: 'police-icon', iconSize: [30, 30] })
                    }).addTo(map);
                    activeMarkers[id] = marker;

                    // List ထဲထည့်မယ်
                    const date = new Date(pin.time);
                    list.innerHTML += `<div class="pin-item">
                        <span>📍 Samui Traffic Checkpoint</span>
                        <span style="color:#ff4444;">${date.getHours()}:${date.getMinutes()}</span>
                    </div>`;
                }
            });
        }

        function checkProximity(uLat, uLng) {
            db.ref('pins').once('value', snap => {
                const data = snap.val();
                for (let id in data) {
                    const pin = data[id];
                    const dist = getDistance(uLat, uLng, pin.lat, pin.lng);
                    if (dist < alertRadius) {
                        playAlarm();
                        break;
                    }
                }
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // meters
            const d1 = lat1 * Math.PI/180;
            const d2 = lat2 * Math.PI/180;
            const dd = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dd/2) * Math.sin(dd/2) + Math.cos(d1) * Math.cos(d2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function playAlarm() {
            const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            audio.play().catch(e => console.log("Audio play blocked"));
        }
    </script>
</body>
</html>
