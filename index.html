<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samui Safety Map v2.1</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4757; --dark: #121212; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; }

        /* Menu Button */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1500;
            background: var(--dark); color: white; border: 1px solid var(--glass);
            width: 45px; height: 45px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: rgba(18, 18, 18, 0.98); backdrop-filter: blur(20px);
            z-index: 2000; transition: 0.4s ease; color: white; padding: 80px 20px 20px;
            border-right: 1px solid var(--glass);
        }
        .sidebar.active { left: 0; }
        
        .menu-item { margin-bottom: 20px; }
        .menu-item label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .menu-item select {
            width: 100%; background: #222; border: 1px solid #444;
            color: white; padding: 12px; border-radius: 10px;
        }

        /* Police Icon Styling */
        .police-marker {
            background: #ff4757; border: 3px solid white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px;
            box-shadow: 0 0 20px #ff4757;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* Report Button */
        .report-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--primary); color: white; border: none; 
            padding: 18px 35px; border-radius: 50px; font-weight: bold; font-size: 16px;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.5); display: flex; align-items: center; gap: 10px;
        }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1600; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-cog"></i></div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <h2 style="color: var(--primary)">Samui Pro Settings</h2>
    <div class="menu-item">
        <label>Map View</label>
        <select id="mapStyle" onchange="changeMapStyle(this.value)">
            <option value="y">Satellite Hybrid (Google)</option>
            <option value="m">Standard Road (Google)</option>
        </select>
    </div>
    <div class="menu-item">
        <label>Voice Alert</label>
        <select id="voiceSetting">
            <option value="on">On (အော်မည်)</option>
            <option value="off">Off (ပိတ်ထားမည်)</option>
        </select>
    </div>
</div>

<div id="map"></div>
<button class="report-btn" id="reportBtn" onclick="reportNow()">
    <i class="fas fa-shield-alt"></i> 🚨 ဒီနေရာမှာ ဖမ်းနေတယ်
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4",
        measurementId: "G-DG7PRMKLN1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false }).setView([9.5120, 100.0137], 13);
    let tileLayer = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    window.changeMapStyle = (type) => {
        map.removeLayer(tileLayer);
        tileLayer = L.tileLayer('http://{s}.google.com/vt/lyrs='+type+'&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);
    };

    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    };

    let activeMarkers = {};

    onSnapshot(query(spotsRef, where("time", ">", new Date(Date.now() - 2 * 60 * 60 * 1000))), (snaps) => {
        snaps.docChanges().forEach(change => {
            const data = change.doc.data();
            const id = change.doc.id;
            if (change.type === "added") {
                const icon = L.divIcon({
                    className: 'police-marker',
                    html: '<i class="fas fa-taxi"></i>', // ရဲကားပုံစံ Icon
                    iconSize: [30, 30]
                });
                activeMarkers[id] = L.marker([data.lat, data.lng], {icon: icon}).addTo(map);
            }
            if (change.type === "removed") {
                map.removeLayer(activeMarkers[id]);
                delete activeMarkers[id];
            }
        });
    });

    window.reportNow = async () => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("တင်ပြီးပါပြီ!");
        });
    };

    map.locate({setView: true, watch: true, maxZoom: 16});
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
