<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Pyidaungsu', sans-serif; margin: 0; background: var(--dark); color: var(--text); overflow: hidden; }
        
        /* Auth Styles */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .pass-toggle { position: absolute; right: 10px; top: 12px; color: #888; }
        
        /* Map & Layout */
        #map { height: 100vh; width: 100vw; }
        .overlay-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }

        /* Floating Controls */
        .top-bar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; }
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.95); border-top-radius: 20px; padding: 15px; border-radius: 20px 20px 0 0; transform: translateY(70%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 40px; height: 5px; background: #555; margin: 0 auto 10px; border-radius: 10px; }

        /* Components */
        .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; width: 100%; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Chat Box */
        #chat-section { height: 200px; display: flex; flex-direction: column; margin-top: 10px; }
        #chat-msgs { flex: 1; overflow-y: auto; background: #151515; padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 5px; }
        .msg { margin-bottom: 5px; } .msg b { color: var(--primary); }

        .pin-list-item { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <h2 style="text-align:center; color:var(--primary);">SAMUI ALERT</h2>
            <div id="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password">
                    <i class="fas fa-eye pass-toggle" onclick="togglePass('password')"></i>
                </div>
                <div id="register-only" class="hidden">
                    <div class="input-group">
                        <input type="password" id="confirm-password" placeholder="Confirm Password">
                        <i class="fas fa-eye pass-toggle" onclick="togglePass('confirm-password')"></i>
                    </div>
                </div>
                <button class="btn btn-main" id="auth-btn" onclick="handleAuth()">အကောင့်ဝင်ရန်</button>
                <p style="text-align:center; font-size:13px; margin-top:15px;" onclick="toggleAuthMode()" id="toggle-text">
                    အကောင့်မရှိသေးပါက <span style="color:var(--primary)">Register လုပ်ရန်</span>
                </p>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div class="overlay-ui">
            <div class="top-bar">
                <div class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
                <div style="display:flex; gap:10px;">
                    <div class="pointer-all circle-btn" onclick="changeMapStyle()"><i class="fas fa-layer-group"></i></div>
                    <div class="pointer-all circle-btn" onclick="toggleAlarm()"><i id="alarm-icon" class="fas fa-bell"></i></div>
                </div>
            </div>

            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-main" style="background:#ff4757;" onclick="dropPin()">👮 ဖမ်းနေသည် (Pin ထောက်)</button>
                </div>

                <div style="margin: 15px 0;">
                    <label style="font-size:12px;">သတိပေးအကွာအဝေး: <span id="radius-val">500</span> မီတာ</label>
                    <input type="range" min="200" max="2000" step="100" value="500" oninput="updateRadius(this.value)">
                </div>

                <div style="display:flex; border-bottom:1px solid #333; margin-bottom:10px;">
                    <div onclick="showTab('list')" style="padding:10px; cursor:pointer; flex:1; text-align:center;">စာရင်း</div>
                    <div onclick="showTab('chat')" style="padding:10px; cursor:pointer; flex:1; text-align:center;">စကားပြောခန်း</div>
                </div>

                <div id="list-tab">
                    <div id="pin-list" style="max-height:150px; overflow-y:auto;"></div>
                </div>

                <div id="chat-tab" class="hidden">
                    <div id="chat-section">
                        <div id="chat-msgs"></div>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="chat-input" placeholder="တစ်ခုခုရေးပါ..." style="margin:0;">
                            <button class="btn btn-main" style="width:70px;" onclick="sendMsg()">ပို့</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, userMarker, userCircle, alertRadius = 500, isAlarmOn = true;
        let isRegister = false;
        let markers = {};
        let mapStyles = [
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
        ];
        let currentStyle = 0;

        // --- UI & Auth Logic ---
        function togglePass(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('register-only').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isRegister ? 'Register လုပ်ရန်' : 'အကောင့်ဝင်ရန်';
            document.getElementById('toggle-text').innerHTML = isRegister ? 'အကောင့်ရှိပြီးသားလား? <span style="color:var(--primary)">Login ဝင်ရန်</span>' : 'အကောင့်မရှိသေးပါက <span style="color:var(--primary)">Register လုပ်ရန်</span>';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isRegister) {
                    const confirmPass = document.getElementById('confirm-password').value;
                    if (pass !== confirmPass) throw new Error("Password မတူပါ");
                    await auth.createUserWithEmailAndPassword(email, pass);
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                initApp();
            } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // --- Map & GPS Logic ---
        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');

            map = L.map('map', { zoomControl: false }).setView([9.5334, 99.9352], 13);
            L.tileLayer(mapStyles[0]).addTo(map);

            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                const latlng = [latitude, longitude];

                if (!userMarker) {
                    userMarker = L.marker(latlng).addTo(map);
                    userCircle = L.circle(latlng, { radius: alertRadius, color: '#00d2ff', fillOpacity: 0.1 }).addTo(map);
                    map.setView(latlng, 15);
                } else {
                    userMarker.setLatLng(latlng);
                    userCircle.setLatLng(latlng);
                }
                checkAlarm(latitude, longitude);
            }, null, { enableHighAccuracy: true });

            loadData();
        }

        function changeMapStyle() {
            currentStyle = (currentStyle + 1) % mapStyles.length;
            L.tileLayer(mapStyles[currentStyle]).addTo(map);
        }

        function updateRadius(val) {
            alertRadius = parseInt(val);
            document.getElementById('radius-val').innerText = val;
            if (userCircle) userCircle.setRadius(alertRadius);
        }

        function toggleAlarm() {
            isAlarmOn = !isAlarmOn;
            document.getElementById('alarm-icon').className = isAlarmOn ? 'fas fa-bell' : 'fas fa-bell-slash';
            alert(isAlarmOn ? "Alarm ဖွင့်လိုက်ပါပြီ" : "Alarm ပိတ်လိုက်ပါပြီ");
        }

        // --- Data Logic ---
        function dropPin() {
            navigator.geolocation.getCurrentPosition(pos => {
                const id = Date.now();
                db.ref('pins/' + id).set({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    time: id,
                    expires: id + (20 * 60 * 1000),
                    user: auth.currentUser.email.split('@')[0]
                });
            });
        }

        function loadData() {
            // Load Pins
            db.ref('pins').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('pin-list');
                list.innerHTML = "";
                for (let key in markers) map.removeLayer(markers[key]);

                for (let id in data) {
                    const p = data[id];
                    if (Date.now() > p.expires) { db.ref('pins/' + id).remove(); continue; }

                    markers[id] = L.marker([p.lat, p.lng], {
                        icon: L.divIcon({ html: '<div style="font-size:25px;">👮</div>', className: 'p-icon' })
                    }).addTo(map);

                    const timeStr = new Date(p.time).toLocaleTimeString();
                    list.innerHTML += `<div class="pin-list-item">
                        <span><b>${p.user}</b> <br><small>${timeStr}</small></span>
                        <button class="btn" style="background:#333; color:white;" onclick="map.setView([${p.lat}, ${p.lng}], 17)">ကြည့်ရန်</button>
                    </div>`;
                }
            });

            // Load Chat
            db.ref('chats').limitToLast(20).on('value', snap => {
                const msgs = snap.val();
                const container = document.getElementById('chat-msgs');
                container.innerHTML = "";
                for (let id in msgs) {
                    container.innerHTML += `<div class="msg"><b>${msgs[id].user}:</b> ${msgs[id].text}</div>`;
                }
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendMsg() {
            const text = document.getElementById('chat-input').value;
            if (!text) return;
            db.ref('chats').push({
                user: auth.currentUser.email.split('@')[0],
                text: text,
                time: Date.now()
            });
            document.getElementById('chat-input').value = "";
        }

        function checkAlarm(uLat, uLng) {
            if (!isAlarmOn) return;
            db.ref('pins').once('value', snap => {
                const pins = snap.val();
                for (let id in pins) {
                    const p = pins[id];
                    const dist = map.distance([uLat, uLng], [p.lat, p.lng]);
                    if (dist < alertRadius) {
                        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                        audio.play();
                        break;
                    }
                }
            });
        }

        function showTab(tab) {
            document.getElementById('list-tab').classList.toggle('hidden', tab !== 'list');
            document.getElementById('chat-tab').classList.toggle('hidden', tab !== 'chat');
        }
    </script>
</body>
</html>
