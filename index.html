<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v10.4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 15px; flex: 1; text-align: center; font-size: 11px; backdrop-filter: blur(10px); font-weight: bold; }

        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 110px)); transition: 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1); padding: 20px; border-top: 1px solid var(--border); backdrop-filter: blur(25px); max-height: 85vh; display: flex; flex-direction: column; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .set-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .set-card label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        #status-indicator { font-size: 12px; text-align: center; padding: 8px; border-radius: 12px; margin-bottom: 10px; font-weight: bold; }
        .safe { background: rgba(46, 213, 115, 0.15); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3); }
        .danger { background: rgba(255, 71, 87, 0.15); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); animation: pulse-bg 1.5s infinite; }
        @keyframes pulse-bg { 50% { background: rgba(255, 71, 87, 0.3); } }

        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; border-radius: 15px; background: rgba(0,0,0,0.3); height: 120px; margin-bottom: 10px; }
        .msg { background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 12px; width: fit-content; max-width: 85%; }
        
        .report-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 24px; margin: 5px auto; display: block; box-shadow: 0 8px 25px rgba(255,71,87,0.4); }
        
        .u-marker { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .p-marker { width: 22px; height: 22px; background: var(--main); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--main); animation: p-pulse 1.5s infinite; }
        @keyframes p-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        /* Popup Styling */
        .leaflet-popup-content-wrapper { background: var(--glass); color: white; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .leaflet-popup-tip { background: var(--glass); }
    </style>
</head>
<body onclick="enableSound()">

<div class="header">
    <div class="chip">NEARBY: <span id="near-count" style="color:var(--main)">0</span></div>
    <div class="chip">RADIUS: <span id="radius-val" style="color:var(--accent)">5</span>km</div>
    <div class="chip" onclick="document.getElementById('sheet').classList.toggle('active')">MENU</div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="document.getElementById('sheet').classList.toggle('active')"></div>
    
    <div id="logged-in-ui" style="display:none; flex-direction: column;">
        <div id="status-indicator" class="safe">SCANNING: ALL CLEAR</div>

        <div class="settings-grid">
            <div class="set-card">
                <label>View</label>
                <select onchange="changeMap(this.value)">
                    <option value="m">Roadmap</option>
                    <option value="s">Satellite</option>
                    <option value="y">Hybrid</option>
                </select>
            </div>
            <div class="set-card">
                <label>Alert</label>
                <select id="alertSet">
                    <option value="both">On (Sound+Vib)</option>
                    <option value="off">Mute</option>
                </select>
            </div>
            <div class="set-card" style="grid-column: span 2;">
                <label>Alarm Distance: <span id="range-ui">5</span> km</label>
                <input type="range" min="1" max="20" value="5" oninput="updateRadius(this.value)">
            </div>
        </div>

        <button class="report-btn" id="holdBtn"><i class="fas fa-bullhorn"></i></button>
        <p style="text-align:center; font-size:10px; color:#888; margin-bottom: 10px;">Hold 3s to report police location</p>

        <div id="chat-messages"></div>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="chatInput" placeholder="Chat..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:10px; border-radius:10px; color:white;">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; padding:10px 15px; border-radius:12px; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
        
        <button onclick="auth.signOut().then(()=>location.reload())" style="background:none; color:var(--main); border:1px solid var(--border); padding:8px; border-radius:10px; font-size:10px; align-self:center; width: 100px;">LOGOUT</button>
    </div>

    <div id="login-prompter" style="display: flex; flex-direction: column; gap: 10px;">
        <h2 style="text-align:center;">Samui Rider v10.4</h2>
        <input type="email" id="email" style="padding:14px; border-radius:15px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white;" placeholder="Email">
        <input type="password" id="pass" style="padding:14px; border-radius:15px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white;" placeholder="Password">
        <button onclick="handleAuth()" style="padding:14px; border-radius:15px; background:var(--accent); border:none; color:white; font-weight:bold;">LOGIN / REGISTER</button>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk", 
        authDomain: "samui-alert.firebaseapp.com", 
        projectId: "samui-alert", 
        storageBucket: "samui-alert.firebasestorage.app", 
        messagingSenderId: "713193724813", 
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let soundReady = false;
    window.enableSound = () => { if(!soundReady) { const s = document.getElementById('alertSound'); s.play(); s.pause(); soundReady = true; } };

    window.handleAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('login-prompter').style.display = user ? 'none' : 'flex';
        document.getElementById('logged-in-ui').style.display = user ? 'flex' : 'none';
        if(user) initSystem();
    });

    let map, uMark, pMarkers = {}, scanRadius = 5, policeData = [];

    function initSystem() {
        if(map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.512, 100.013], 15);
        L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

        map.locate({ watch: true, enableHighAccuracy: true });
        map.on('locationfound', (e) => {
            if(!uMark) { uMark = L.marker(e.latlng, {icon: L.divIcon({className:'u-marker'})}).addTo(map); map.setView(e.latlng, 17); }
            else uMark.setLatLng(e.latlng);
            checkDanger();
        });

        loadRealtimeData();
        loadChat();
    }

    window.changeMap = (t) => { L.tileLayer(`https://{s}.google.com/vt/lyrs=${t}&x={x}&y={y}&z={z}`, { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map); };
    window.updateRadius = (v) => { scanRadius = v; document.getElementById('range-ui').innerText = v; document.getElementById('radius-val').innerText = v; checkDanger(); };

    function loadRealtimeData() {
        // ၂၀ မိနစ်ထက်ကျော်တာတွေကို filter လုပ်တဲ့ Query
        const twentyMinsAgo = new Date(Date.now() - 20 * 60 * 1000);
        onSnapshot(query(collection(db, "police_spots"), where("time", ">", twentyMinsAgo)), (sn) => {
            policeData = [];
            
            // Marker အဟောင်းတွေကို ရှင်းထုတ်
            Object.keys(pMarkers).forEach(id => {
                let exists = false;
                sn.forEach(doc => { if(doc.id === id) exists = true; });
                if(!exists) { map.removeLayer(pMarkers[id]); delete pMarkers[id]; }
            });

            sn.forEach(doc => {
                const d = doc.data();
                const postedTime = d.time ? d.time.toDate() : new Date();
                const timeDiff = Math.floor((new Date() - postedTime) / 60000); // မိနစ်တွက်ချက်မှု
                
                policeData.push({lat: d.lat, lng: d.lng});

                if(!pMarkers[doc.id]) {
                    const m = L.marker([d.lat, d.lng], {icon: L.divIcon({className:'p-marker'})}).addTo(map);
                    m.bindPopup(`<b>Police Spot</b><br>Posted: ${timeDiff} mins ago`);
                    pMarkers[doc.id] = m;
                } else {
                    pMarkers[doc.id].getPopup().setContent(`<b>Police Spot</b><br>Posted: ${timeDiff} mins ago`);
                }
            });
            checkDanger();
        });
    }

    function checkDanger() {
        if(!uMark || policeData.length === 0) { resetAlert(); return; }
        let near = 0;
        policeData.forEach(p => {
            if(map.distance(uMark.getLatLng(), [p.lat, p.lng]) / 1000 <= scanRadius) near++;
        });

        document.getElementById('near-count').innerText = near;
        const status = document.getElementById('status-indicator');
        const sound = document.getElementById('alertSound');

        if(near > 0) {
            status.innerText = `WARNING: ${near} POLICE NEARBY!`;
            status.className = "danger";
            if(document.getElementById('alertSet').value !== 'off') {
                sound.play().catch(() => {});
                if(navigator.vibrate) navigator.vibrate([500, 500]);
            }
        } else {
            resetAlert();
        }
    }

    function resetAlert() {
        const status = document.getElementById('status-indicator');
        status.innerText = "SCANNING: ALL CLEAR";
        status.className = "safe";
        const sound = document.getElementById('alertSound');
        sound.pause(); sound.currentTime = 0;
        document.getElementById('near-count').innerText = "0";
    }

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: i.value, user: auth.currentUser.email.split('@')[0], time: serverTimestamp() });
        i.value = "";
    };

    function loadChat() {
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(30)), (sn) => {
            const b = document.getElementById('chat-messages'); b.innerHTML = "";
            sn.forEach(d => { b.innerHTML += `<div class="msg"><b>${d.data().user}</b>${d.data().text}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }

    const hBtn = document.getElementById('holdBtn');
    let hTimer, hCount = 0;
    const sH = (e) => { e.preventDefault(); hTimer = setInterval(() => { hCount++; if(hCount >= 30){ clearInterval(hTimer); fire(); hCount = 0; } }, 100); };
    const eH = () => { clearInterval(hTimer); hCount = 0; };
    hBtn.addEventListener('touchstart', sH); hBtn.addEventListener('touchend', eH);
    hBtn.addEventListener('mousedown', sH); hBtn.addEventListener('mouseup', eH);

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (p) => {
            await addDoc(collection(db, "police_spots"), { lat: p.coords.latitude, lng: p.coords.longitude, time: serverTimestamp(), user: auth.currentUser.email });
        });
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
