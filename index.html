<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samui Safe Route Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .report-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: #ff4757; color: white; border: none; 
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="map"></div>
<button class="report-btn" onclick="reportNow()">🚨 ဒီနေရာမှာ ဖမ်းနေတယ်</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
    authDomain: "samui-alert.firebaseapp.com",
    projectId: "samui-alert",
    storageBucket: "samui-alert.firebasestorage.app",
    messagingSenderId: "713193724813",
    appId: "1:713193724813:web:85831c39e3560eb310bbc4",
    measurementId: "G-DG7PRMKLN1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const spotsRef = collection(db, "police_spots");

  var map = L.map('map').setView([9.5120, 100.0137], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  let activeMarkers = {};

  // ၂ နာရီအတွင်းက Pin တွေကိုပဲ ပြမယ်
  function updateView() {
    const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
    const q = query(spotsRef, where("time", ">", twoHoursAgo));

    onSnapshot(q, (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        const data = change.doc.data();
        const id = change.doc.id;

        if (change.type === "added") {
          const marker = L.marker([data.lat, data.lng]).addTo(map).bindPopup("🚨 ရဲဖမ်းနေသည်");
          activeMarkers[id] = marker;
          checkDistance(data.lat, data.lng);
        }
        if (change.type === "removed") {
          if (activeMarkers[id]) {
            map.removeLayer(activeMarkers[id]);
            delete activeMarkers[id];
          }
        }
      });
    });
  }

  // အကွာအဝေးစစ်ပြီး အသံနဲ့ သတိပေးခြင်း
  function checkDistance(lat, lng) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, lat, lng);
        if (dist < 0.5) { // ၅၀၀ မီတာအတွင်း
          const msg = new SpeechSynthesisUtterance("သတိပြုရန် ရှေ့တွင် ရဲဖမ်းနေပါသည်");
          msg.lang = 'my-MM';
          window.speechSynthesis.speak(msg);
        }
      });
    }
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI / 180;
    const dLon = (lon2-lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  window.reportNow = function() {
    navigator.geolocation.getCurrentPosition(async (pos) => {
      await addDoc(spotsRef, {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        time: serverTimestamp()
      });
      alert("တင်ပြီးပါပြီ!");
    });
  };

  updateView();
  map.locate({setView: true, watch: true, maxZoom: 16});
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
