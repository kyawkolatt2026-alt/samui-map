<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Full System Restored</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; -webkit-touch-callout: none !important; -webkit-user-select: none; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        
        .top-left-bar { position: absolute; top: 45px; left: 15px; }
        .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 20px; }
        .active-follow { color: var(--primary); border: 2px solid var(--primary); }

        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; user-select: text !important; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 10px; }

        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(85%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; }

        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); transition: width 0.1s linear; }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }

        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .hidden { display: none !important; }
        
        #chat-msgs { height: 150px; overflow-y: auto; background: #151515; padding: 10px; border-radius: 10px; font-size: 14px; text-align: left; margin-bottom: 10px; }
    </style>
</head>
<body oncontextmenu="return false;" onclick="activateAudio()"> <div id="auth-section" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 style="color:var(--primary);">SAMUI SAFE RIDE</h2>
            <div class="tab-nav">
                <div class="tab-item active" id="tab-login" onclick="setAuthMode('login')">LOGIN</div>
                <div class="tab-item" id="tab-reg" onclick="setAuthMode('reg')">REGISTER</div>
            </div>
            <input type="email" id="email" class="input-box" placeholder="Email Address">
            <input type="password" id="password" class="input-box" placeholder="Password">
            <button class="pointer-all btn-auth" onclick="handleAuth()" id="auth-submit">ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-left-bar"><button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
            <div class="top-right-bar">
                <button class="pointer-all circle-btn" onclick="toggleMap()"><i class="fas fa-layer-group"></i></button>
                <button id="follow-btn" class="pointer-all circle-btn active-follow" onclick="recenter()"><i class="fas fa-location-arrow"></i></button>
                <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
            </div>
            
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                
                <div class="hold-btn-wrapper">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="hold-btn" class="btn-main">👮 ၃ စက္ကန့်ဖိ၍ လက်ရှိနေရာတွင် Pin ချပါ</button>
                </div>
                
                <div style="margin-bottom: 10px; text-align: left;">
                    <label style="font-size:12px;">အချက်ပေးအကွာအဝေး: <span id="rad-txt">200</span>m</label>
                    <input type="range" min="100" max="1500" step="50" value="200" oninput="updateRadius(this.value)" style="width:100%;">
                </div>

                <div class="tab-nav">
                    <div class="tab-item active" id="t-list" onclick="switchTab('list')">စာရင်း</div>
                    <div class="tab-item" id="t-chat" onclick="switchTab('chat')">Chat Box</div>
                </div>
                
                <div id="list-section">
                    <div id="pin-list" style="max-height: 150px; overflow-y: auto;"></div>
                </div>
                
                <div id="chat-section" class="hidden">
                    <div id="chat-msgs"></div>
                    <div style="display:flex; gap:8px;"><input type="text" id="chat-input" class="input-box" style="margin:0;"><button onclick="sendChat()" style="background:var(--primary); border:none; width:60px; color:white; border-radius:12px;"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, uMarker, uCircle, rad = 200, bell = true, markers = {}, alertOn = false;
        let isFollowing = true, uLat, uLng, authMode = 'login', audioInit = false;
        const styles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];
        let sIdx = 0;

        function activateAudio() {
            if(!audioInit) {
                const s = document.getElementById('alarm-sound');
                s.play().then(() => { s.pause(); audioInit = true; }).catch(e => {});
            }
        }

        function setAuthMode(m) {
            authMode = m;
            document.getElementById('tab-login').classList.toggle('active', m==='login');
            document.getElementById('tab-reg').classList.toggle('active', m==='reg');
            document.getElementById('auth-submit').innerText = m==='login' ? 'ဝင်ရောက်ရန်' : 'အကောင့်သစ်ဖွင့်ရန်';
        }

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            if(!e || !p) return alert("ဖြည့်ပါ");
            try {
                if(authMode==='login') await auth.signInWithEmailAndPassword(e, p);
                else { await auth.createUserWithEmailAndPassword(e, p); alert("အောင်မြင်ပါသည်"); }
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); initApp(); }
            else { document.getElementById('auth-section').classList.remove('hidden'); }
        });

        function initApp() {
            if(map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false, tap: false }).setView([9.53, 99.93], 15);
            L.tileLayer(styles[0]).addTo(map);

            // --- MAP LONG PRESS RESTORED & TABLET FIXED ---
            let mapTimer;
            map.on('mousedown touchstart', (e) => {
                mapTimer = setTimeout(() => {
                    postPin(e.latlng.lat, e.latlng.lng);
                    if(navigator.vibrate) navigator.vibrate(100);
                    alert("📍 နေရာအသစ်တွင် Pin ချပြီးပါပြီ");
                }, 3000);
            });
            map.on('mouseup touchend move', () => clearTimeout(mapTimer));

            navigator.geolocation.watchPosition(pos => {
                uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                if(isFollowing) map.setView([uLat, uLng]);
                if(!uMarker) {
                    uMarker = L.marker([uLat, uLng], {icon: L.divIcon({html:'<div style="background:#00d2ff;width:18px;height:18px;border:3px solid white;border-radius:50%;box-shadow:0 0 10px #00d2ff;"></div>', className:''})}).addTo(map);
                    uCircle = L.circle([uLat, uLng], {radius: rad, color:'#00d2ff', fillOpacity:0.1}).addTo(map);
                } else {
                    uMarker.setLatLng([uLat, uLng]);
                    uCircle.setLatLng([uLat, uLng]);
                }
                checkDistance();
            }, null, {enableHighAccuracy:true});

            setupHoldButton();
            syncData();
        }

        function setupHoldButton() {
            const btn = document.getElementById('hold-btn'), prog = document.getElementById('hold-progress');
            let t, int, st;
            const start = (e) => {
                e.preventDefault(); st = Date.now();
                int = setInterval(() => { prog.style.width = Math.min(100, ((Date.now()-st)/3000)*100)+'%'; }, 50);
                t = setTimeout(() => { postPin(uLat, uLng); stop(); alert("လက်ရှိနေရာတွင် Pin ချပြီးပါပြီ"); }, 3000);
            };
            const stop = () => { clearInterval(int); clearTimeout(t); prog.style.width = '0%'; };
            btn.onmousedown = btn.ontouchstart = start;
            btn.onmouseup = btn.ontouchend = stop;
        }

        function postPin(lat, lng) {
            const id = Date.now();
            db.ref('pins/'+id).set({lat, lng, time: id, expires: id+(20*60*1000), user: auth.currentUser.email.split('@')[0]});
        }

        function syncData() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(), list = document.getElementById('pin-list');
                list.innerHTML = ""; const now = Date.now();
                for(let k in markers) map.removeLayer(markers[k]); markers = {};
                for(let id in data) {
                    const p = data[id];
                    if(now > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], {icon: L.divIcon({html:'👮', className:'', iconSize:[25,25]})}).addTo(map);
                    list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;"><span><b>${p.user}</b></span><span>${new Date(p.time).toLocaleTimeString()}</span></div>`;
                }
            });
            db.ref('chats').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                snap.forEach(c => { box.innerHTML += `<div><b>${c.val().user}:</b> ${c.val().txt}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        function checkDistance() {
            if(!bell || !uLat) return;
            db.ref('pins').once('value', snap => {
                const pins = snap.val(); let near = false;
                for(let id in pins) { if(map.distance([uLat, uLng], [pins[id].lat, pins[id].lng]) < rad) { near = true; break; } }
                if(near) startSiren(); else stopSiren();
            });
        }

        function startSiren() {
            if(alertOn) return; alertOn = true;
            const s = document.getElementById('alarm-sound');
            const play = () => { s.play().catch(()=>{}); if(navigator.vibrate) navigator.vibrate([500,200,500]); };
            play(); window.sInt = setInterval(play, 4000);
        }

        function stopSiren() { alertOn = false; clearInterval(window.sInt); document.getElementById('alarm-sound').pause(); }

        function switchTab(t) {
            document.getElementById('list-section').classList.toggle('hidden', t!=='list');
            document.getElementById('chat-section').classList.toggle('hidden', t!=='chat');
            document.getElementById('t-list').classList.toggle('active', t==='list');
            document.getElementById('t-chat').classList.toggle('active', t==='chat');
        }

        function sendChat() {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            db.ref('chats').push({user: auth.currentUser.email.split('@')[0], txt: i.value});
            i.value = "";
        }

        function updateRadius(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; if(uCircle) uCircle.setRadius(rad); }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell?'fas fa-bell':'fas fa-bell-slash'; if(!bell) stopSiren(); }
        function toggleMap() { sIdx = (sIdx+1)%styles.length; L.tileLayer(styles[sIdx]).addTo(map); }
        function recenter() { isFollowing = true; map.setView([uLat, uLng], 17); }
        function logout() { auth.signOut().then(()=>location.reload()); }
    </script>
</body>
</html>
