<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Police Alert</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Auth UI */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        
        /* Overlay UI */
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.95); padding: 15px; border-radius: 20px 20px 0 0; transform: translateY(75%); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 10px; border-radius: 10px; }

        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; margin-bottom: 10px; }
        
        /* List Items */
        .list-item { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--danger); align-items: center; }
        .time-badge { color: var(--danger); font-weight: bold; font-size: 14px; }
        .hidden { display: none !important; }
        
        /* Long Press Animation */
        .hold-progress { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border: 6px solid var(--primary); border-top: 6px solid transparent; border-radius: 50%; animation: spin 3s linear; z-index: 2000; display: none; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="hold-ui" class="hold-progress"></div>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-top:0;">SAMUI SAFE RIDE</h2>
            <p style="font-size:13px; color:#888;">Email/Password ဖြင့် အကောင့်ဝင်ပါ</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()">အကောင့်ဝင်ရန် / Register</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-bar">
                <div class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
                <div style="display:flex; gap:10px;">
                    <div class="pointer-all circle-btn" onclick="toggleAlarm()"><i id="alarm-icon" class="fas fa-bell"></i></div>
                </div>
            </div>

            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="togglePanel()"></div>
                <button class="btn-main" style="background:var(--danger);" onclick="dropAtCurrent()">👮 လက်ရှိနေရာမှာ ဖမ်းနေသည်</button>
                
                <div style="margin: 15px 0;">
                    <label style="font-size:12px; color:#aaa;">သတိပေးမည့်အကွာအဝေး: <span id="radius-val" style="color:var(--primary); font-weight:bold;">500</span>m</label>
                    <input type="range" min="200" max="2000" step="100" value="500" oninput="updateRadius(this.value)" style="width:100%; accent-color:var(--primary);">
                </div>

                <div id="pin-list" style="max-height:280px; overflow-y:auto; padding-bottom:20px;">
                    <p style="text-align:center; color:#555; font-size:12px;">အနီးနားရှိ ဖမ်းဆီးမှုစာရင်းများ</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration (သင့် Database URL ကို ထည့်သွင်းထားသည်)
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, userMarker, userCircle, alertRadius = 500, isAlarmOn = true;
        let activeMarkers = {}, pressTimer;

        // --- Auth Logic ---
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Email နှင့် Password ဖြည့်ပါ");
            try {
                // Login ဝင်ကြည့်မယ်၊ မရှိရင် Register လုပ်မယ်
                await auth.signInWithEmailAndPassword(email, pass).catch(() => auth.createUserWithEmailAndPassword(email, pass));
                initApp();
            } catch (e) { alert("Error: " + e.message); }
        }
        function logout() { auth.signOut().then(() => location.reload()); }

        // --- Map & Long Press Logic ---
        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');

            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5334, 99.9352], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // ၃ စက္ကန့်ဖိထားမှ Pin ကျမည့်စနစ်
            map.on('mousedown touchstart', (e) => {
                document.getElementById('hold-ui').style.display = 'block';
                pressTimer = window.setTimeout(() => {
                    savePin(e.latlng.lat, e.latlng.lng);
                    document.getElementById('hold-ui').style.display = 'none';
                    if(navigator.vibrate) navigator.vibrate(200); // ဖုန်းတုန်ခါမှု
                }, 3000);
            });

            map.on('mouseup touchend mousemove touchmove', () => {
                clearTimeout(pressTimer);
                document.getElementById('hold-ui').style.display = 'none';
            });

            // GPS Location Tracking
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (!userMarker) {
                    userMarker = L.circleMarker([latitude, longitude], { radius: 8, color: '#fff', fillColor: '#00d2ff', fillOpacity: 1 }).addTo(map);
                    userCircle = L.circle([latitude, longitude], { radius: alertRadius, color: '#00d2ff', weight: 1, fillOpacity: 0.1 }).addTo(map);
                    map.setView([latitude, longitude], 15);
                } else {
                    userMarker.setLatLng([latitude, longitude]);
                    userCircle.setLatLng([latitude, longitude]);
                }
                checkProximity(latitude, longitude);
            }, null, { enableHighAccuracy: true });

            startSync();
        }

        // --- Database & Pin Management ---
        function savePin(lat, lng) {
            const id = Date.now();
            db.ref('pins/' + id).set({
                lat, lng, 
                time: id, 
                expires: id + (20 * 60 * 1000), // မိနစ် ၂၀ ကြာရင် ပျက်မယ်
                user: auth.currentUser.email.split('@')[0]
            }).then(() => {
                alert("သတိပေးချက် တင်ပြီးပါပြီ (၂၀ မိနစ်ကြာရင် အလိုအလျောက် ပျက်ပါမယ်)");
            }).catch(e => alert("Database Error: " + e.message));
        }

        function dropAtCurrent() {
            navigator.geolocation.getCurrentPosition(pos => savePin(pos.coords.latitude, pos.coords.longitude));
        }

        function startSync() {
            db.ref('pins').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('pin-list');
                list.innerHTML = "";
                
                // Old Marker များကို အရင်ရှင်းမည်
                for (let k in activeMarkers) map.removeLayer(activeMarkers[k]);
                activeMarkers = {};

                for (let id in data) {
                    const p = data[id];
                    // အချိန်ကုန်သွားရင် Database ကနေပါ ဖျက်မယ်
                    if (Date.now() > p.expires) { db.ref('pins/' + id).remove(); continue; }

                    // မြေပုံပေါ် Pin ထည့်မည်
                    activeMarkers[id] = L.marker([p.lat, p.lng], {
                        icon: L.divIcon({ html: '<div style="font-size:26px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">👮</div>', className: 'p-icon' })
                    }).addTo(map).bindPopup(`တင်သူ: ${p.user}`);

                    // စာရင်းထဲသို့ အချိန်နှင့်တကွ ထည့်မည်
                    const timeStr = new Date(p.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    list.innerHTML += `
                        <div class="list-item" onclick="focusPin(${p.lat}, ${p.lng})">
                            <span><b>${p.user}</b> <br> <small style="color:#888;">ရဲဖမ်းနေသည်</small></span>
                            <span class="time-badge">${timeStr}</span>
                        </div>`;
                }
            });
        }

        // --- Alarm & Proximity ---
        function checkProximity(uLat, uLng) {
            if (!isAlarmOn) return;
            db.ref('pins').once('value', snap => {
                const pins = snap.val();
                for (let id in pins) {
                    const dist = map.distance([uLat, uLng], [pins[id].lat, pins[id].lng]);
                    if (dist < alertRadius) {
                        triggerAlert();
                        break;
                    }
                }
            });
        }

        function triggerAlert() {
            // Alarm Sound (User က မြေပုံကို တစ်ချက်နှိပ်ပြီးမှ အသံထွက်ပါမယ် - Browser Policy အရ)
            const alarm = document.getElementById('alarm-sound');
            alarm.play().catch(() => {});
            
            // Vibrate (Android)
            if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
        }

        function toggleAlarm() {
            isAlarmOn = !isAlarmOn;
            document.getElementById('alarm-icon').className = isAlarmOn ? 'fas fa-bell' : 'fas fa-bell-slash';
            alert(isAlarmOn ? "အချက်ပေးစနစ် ဖွင့်ပါပြီ" : "အချက်ပေးစနစ် ပိတ်ပါပြီ");
        }

        function updateRadius(val) {
            alertRadius = parseInt(val);
            document.getElementById('radius-val').innerText = val;
            if (userCircle) userCircle.setRadius(alertRadius);
        }

        function togglePanel() { document.getElementById('main-panel').classList.toggle('active'); }
        function focusPin(lat, lng) { map.setView([lat, lng], 17); togglePanel(); }
    </script>
</body>
</html>
