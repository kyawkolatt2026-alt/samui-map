<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v10.8</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 15px; flex: 1; text-align: center; font-size: 11px; backdrop-filter: blur(10px); font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 110px)); transition: 0.4s; padding: 20px; border-top: 1px solid var(--border); backdrop-filter: blur(25px); max-height: 85vh; display: flex; flex-direction: column; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; cursor: pointer; }

        /* Status & Alert Toggle */
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 15px; margin-bottom: 15px; transition: 0.3s; }
        .safe { background: rgba(46, 213, 115, 0.1); border: 1px solid #2ed573; color: #2ed573; }
        .danger { background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; color: #ff4757; }
        
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--main); }
        input:checked + .slider:before { transform: translateX(21px); }

        .list-container { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); max-height: 180px; }
        .report-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .set-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .set-card label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }
        
        select { width: 100%; background: transparent; color: white; border: none; outline: none; font-size: 13px; }

        .report-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 26px; margin: 5px auto; display: block; box-shadow: 0 10px 25px rgba(255,71,87,0.4); }
        
        /* Auth Form Styles */
        .auth-container { display: flex; flex-direction: column; gap: 12px; }
        .auth-input { padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; outline: none; }
        .auth-btn { padding: 15px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; }
        
        .u-marker { width: 20px; height: 20px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        .p-marker { width: 22px; height: 22px; background: var(--main); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--main); animation: p-pulse 1.5s infinite; }
        @keyframes p-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body onclick="initAudio()">

<div class="header">
    <div class="chip">NEARBY: <span id="near-count" style="color:var(--main)">0</span></div>
    <div class="chip">RADIUS: <span id="radius-val" style="color:var(--accent)">5</span>km</div>
    <div class="chip" onclick="document.getElementById('sheet').classList.toggle('active')">DASHBOARD</div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="document.getElementById('sheet').classList.toggle('active')"></div>
    
    <div id="logged-in-ui" style="display:none; flex-direction: column;">
        <div id="status-bar" class="safe status-bar">
            <span id="status-text">GPS: CONNECTED</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:10px;">ALERT</span>
                <label class="switch">
                    <input type="checkbox" id="alertToggle" checked onchange="toggleAlert(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="list-container">
            <div style="font-size: 10px; color: #555; margin-bottom: 5px;">RECENT LOGS (20M)</div>
            <div id="report-list"></div>
        </div>

        <div class="settings-grid">
            <div class="set-card">
                <label>Distance: <span id="range-ui">5</span> km</label>
                <input type="range" min="1" max="20" value="5" oninput="updateRadius(this.value)" style="width:100%">
            </div>
            <div class="set-card">
                <label>Map Style</label>
                <select id="mapTypeSelector" onchange="changeMap(this.value)">
                    <option value="m">Normal</option>
                    <option value="s">Satellite</option>
                    <option value="y">Hybrid</option>
                </select>
            </div>
            <div class="set-card" style="grid-column: span 2;">
                <label>GPS Focus</label>
                <select id="gpsMode">
                    <option value="follow">Auto-Follow (Ride Mode)</option>
                    <option value="manual">Manual Map View</option>
                </select>
            </div>
        </div>

        <button class="report-btn" id="holdBtn"><i class="fas fa-bullhorn"></i></button>
        <button onclick="handleLogout()" style="background:none; color:var(--main); border:1px solid var(--border); margin-top:15px; padding:8px; border-radius:10px; font-size:11px; align-self:center; width:120px;">LOGOUT</button>
    </div>

    <div id="auth-ui" class="auth-container">
        <h2 style="text-align:center; margin:0 0 10px 0;">Samui Rider Pro</h2>
        <input type="email" id="email" class="auth-input" placeholder="Enter Email">
        <input type="password" id="pass" class="auth-input" placeholder="Enter Password">
        <div style="display:flex; gap:10px;">
            <button onclick="handleLogin()" class="auth-btn" style="background:var(--accent); flex:1;">LOGIN</button>
            <button onclick="handleRegister()" class="auth-btn" style="background:var(--main); flex:1;">REGISTER</button>
        </div>
        <p style="font-size:10px; color:#555; text-align:center;">Email မရှိသေးရင် Register နှိပ်ပြီး ဖွင့်နိုင်ပါတယ်။</p>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk", 
        authDomain: "samui-alert.firebaseapp.com", 
        projectId: "samui-alert", 
        storageBucket: "samui-alert.firebasestorage.app", 
        messagingSenderId: "713193724813", 
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Audio Init
    let audioReady = false;
    window.initAudio = () => { if(!audioReady) { const a = document.getElementById('alertSound'); a.play().then(()=>a.pause()); audioReady = true; } };

    // Auth Functions
    window.handleLogin = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Email နှင့် Password ဖြည့်ပါ");
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("အကောင့်မရှိပါ သို့မဟုတ် မှားယွင်းနေပါသည်"));
    };

    window.handleRegister = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || p.length < 6) return alert("Email မှန်အောင်ဖြည့်ပြီး Password အနည်းဆုံး ၆ လုံးထားပါ");
        createUserWithEmailAndPassword(auth, e, p).then(() => alert("အကောင့်ဖွင့်ပြီးပါပြီ")).catch(err => alert(err.message));
    };

    window.handleLogout = () => { signOut(auth).then(() => location.reload()); };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('auth-ui').style.display = user ? 'none' : 'flex';
        document.getElementById('logged-in-ui').style.display = user ? 'flex' : 'none';
        if(user) initSystem();
    });

    let map, uMark, pMarkers = {}, scanRadius = 5, polData = [], isAlertOn = true, tileLayer;

    function initSystem() {
        if(map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.512, 100.013], 15);
        tileLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

        map.locate({ watch: true, enableHighAccuracy: true });
        map.on('locationfound', (e) => {
            if(!uMark) { uMark = L.marker(e.latlng, {icon: L.divIcon({className:'u-marker'})}).addTo(map); map.setView(e.latlng, 17); }
            else {
                uMark.setLatLng(e.latlng);
                if(document.getElementById('gpsMode').value === 'follow') map.panTo(e.latlng);
            }
            checkDanger();
        });
        syncData();
    }

    window.changeMap = (type) => {
        if(tileLayer) map.removeLayer(tileLayer);
        tileLayer = L.tileLayer(`https://{s}.google.com/vt/lyrs=${type}&x={x}&y={y}&z={z}`, { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    };

    window.updateRadius = (v) => { scanRadius = v; document.getElementById('range-ui').innerText = v; document.getElementById('radius-val').innerText = v; checkDanger(); };
    window.toggleAlert = (v) => { isAlertOn = v; if(!v) stopSiren(); else checkDanger(); };

    function syncData() {
        const cutoff = new Date(Date.now() - 20 * 60 * 1000);
        onSnapshot(query(collection(db, "police_spots"), where("time", ">", cutoff), orderBy("time", "desc")), (sn) => {
            polData = [];
            const list = document.getElementById('report-list');
            list.innerHTML = "";
            
            Object.keys(pMarkers).forEach(id => { if(!sn.docs.find(d => d.id === id)) { map.removeLayer(pMarkers[id]); delete pMarkers[id]; } });

            sn.forEach(doc => {
                const d = doc.data();
                const time = d.time ? d.time.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Just now';
                polData.push({lat: d.lat, lng: d.lng});
                list.innerHTML += `<div class="report-item">Report Point <span>${time}</span></div>`;
                if(!pMarkers[doc.id]) pMarkers[doc.id] = L.marker([d.lat, d.lng], {icon: L.divIcon({className:'p-marker'})}).addTo(map);
            });
            checkDanger();
        });
    }

    function checkDanger() {
        if(!uMark || polData.length === 0) { stopSiren(); return; }
        let count = 0;
        polData.forEach(p => { if(map.distance(uMark.getLatLng(), [p.lat, p.lng]) / 1000 <= scanRadius) count++; });
        document.getElementById('near-count').innerText = count;

        const bar = document.getElementById('status-bar');
        const txt = document.getElementById('status-text');

        if(count > 0) {
            bar.className = "status-bar danger";
            txt.innerText = "POLICE DETECTED!";
            if(isAlertOn) startSiren(); else stopSiren();
        } else {
            bar.className = "status-bar safe";
            txt.innerText = "GPS: CONNECTED";
            stopSiren();
        }
    }

    function startSiren() { const s = document.getElementById('alertSound'); s.play().catch(()=>{}); if(navigator.vibrate) navigator.vibrate([500,500]); }
    function stopSiren() { const s = document.getElementById('alertSound'); s.pause(); s.currentTime = 0; }

    const hBtn = document.getElementById('holdBtn');
    let hTimer, hCount = 0;
    const sH = (e) => { e.preventDefault(); hTimer = setInterval(() => { hCount++; if(hCount >= 30){ clearInterval(hTimer); fire(); hCount = 0; } }, 100); };
    const eH = () => { clearInterval(hTimer); hCount = 0; };
    hBtn.addEventListener('touchstart', sH); hBtn.addEventListener('touchend', eH);
    hBtn.addEventListener('mousedown', sH); hBtn.addEventListener('mouseup', eH);

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (p) => {
            await addDoc(collection(db, "police_spots"), { lat: p.coords.latitude, lng: p.coords.longitude, time: serverTimestamp() });
            alert("Report Sent!");
        });
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
