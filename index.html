<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v3.3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4757; --accent: #1e90ff; --dark: #121212; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #000; }

        /* Status Bar */
        .status-bar {
            position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .info-card {
            background: rgba(0,0,0,0.8); color: white; padding: 12px 18px;
            border-radius: 15px; border-left: 4px solid var(--primary);
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .count-badge { background: var(--primary); padding: 2px 10px; border-radius: 6px; margin-left: 5px; font-weight: bold; font-size: 18px; }

        /* Control Buttons */
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .btn-round {
            background: rgba(0,0,0,0.8); color: white; border: 1px solid rgba(255,255,255,0.1); 
            width: 50px; height: 50px; border-radius: 15px; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 18px;
        }

        /* Animated Marker */
        .police-marker {
            width: 26px; height: 26px; background: var(--primary);
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 20px var(--primary);
            animation: pulse-red 1.2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.8); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
        .user-loc { width: 20px; height: 20px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 20px var(--accent); }

        /* Report Button */
        .report-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--primary); color: white; border: none; 
            padding: 20px; border-radius: 25px; font-weight: bold; font-size: 18px;
            box-shadow: 0 10px 40px rgba(255, 71, 87, 0.6); width: 90%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div class="info-card">
        <i class="fas fa-bullseye"></i> လက်ရှိဖမ်းနေဆဲ: <span class="count-badge" id="count">0</span>
    </div>
    <div class="controls">
        <button class="btn-round" onclick="toggleMap()"><i class="fas fa-layer-group"></i></button>
        <button class="btn-round" onclick="toggleFollow()" id="followBtn" style="color: var(--accent)"><i class="fas fa-location-arrow"></i></button>
    </div>
</div>

<div id="map"></div>

<button class="report-btn" onclick="reportNow()">
    <i class="fas fa-shield-alt"></i> 🚨 အခု ဒီနေရာမှာ ဖမ်းနေတယ်
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    // Map Setup - အမည်းရောင်မဖြစ်အောင် Link တွေကို HTTPS သေချာပြန်ပြင်ထားတယ်
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    const googleStreet = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    });

    let isSatellite = true;
    let isFollow = true;
    let userMarker = null;

    // မြေပုံကို လက်နဲ့ထိရင် Follow ခဏပိတ်မယ်
    map.on('movestart', (e) => {
        if (!e.hard) {
            isFollow = false;
            document.getElementById('followBtn').style.color = '#fff';
        }
    });

    window.toggleMap = () => {
        if(isSatellite) { map.removeLayer(googleSat); googleStreet.addTo(map); }
        else { map.removeLayer(googleStreet); googleSat.addTo(map); }
        isSatellite = !isSatellite;
    };

    window.toggleFollow = () => {
        isFollow = true;
        document.getElementById('followBtn').style.color = '#1e90ff';
        if(userMarker) map.setView(userMarker.getLatLng(), 17, { animate: true });
    };

    // GPS
    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if (userMarker) {
            userMarker.setLatLng(e.latlng);
        } else {
            userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-loc' }) }).addTo(map);
            map.setView(e.latlng, 17);
        }
        if (isFollow) {
            map.setView(e.latlng, map.getZoom(), { animate: true });
        }
    });

    // Real-time Data Sync
    let markers = {};
    const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
    const q = query(spotsRef, where("time", ">", twoHoursAgo));

    onSnapshot(q, (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        snaps.docChanges().forEach(change => {
            const data = change.doc.data();
            const id = change.doc.id;
            if (change.type === "added") {
                const icon = L.divIcon({ className: 'police-marker', iconSize: [26, 26] });
                markers[id] = L.marker([data.lat, data.lng], { icon: icon }).addTo(map);
            }
            if (change.type === "removed") {
                if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
            }
        });
    });

    window.reportNow = () => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("🚨 အောင်မြင်စွာ တင်ပြီးပါပြီ!");
        });
    };
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
