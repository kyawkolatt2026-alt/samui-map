<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v10.5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 15px; flex: 1; text-align: center; font-size: 11px; backdrop-filter: blur(10px); font-weight: bold; }

        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 110px)); transition: 0.4s; padding: 20px; border-top: 1px solid var(--border); backdrop-filter: blur(25px); max-height: 85vh; display: flex; flex-direction: column; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; cursor: pointer; }

        /* Status & Mute Button */
        #status-box { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
        .safe { background: rgba(46, 213, 115, 0.1); color: #2ed573; border: 1px solid #2ed573; }
        .danger { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; }
        .mute-btn { background: var(--main); border: none; color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; display: none; }

        /* Report List */
        .list-container { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); max-height: 200px; }
        .list-title { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .report-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
        .report-item span { color: var(--accent); font-weight: bold; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .set-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .set-card label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }
        
        .report-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 24px; margin: 5px auto; display: block; box-shadow: 0 8px 20px rgba(255,71,87,0.3); }
        .u-marker { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; }
        .p-marker { width: 22px; height: 22px; background: var(--main); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--main); }
    </style>
</head>
<body onclick="readyAudio()">

<div class="header">
    <div class="chip">NEARBY: <span id="near-count" style="color:var(--main)">0</span></div>
    <div class="chip">RADIUS: <span id="radius-val" style="color:var(--accent)">5</span>km</div>
    <div class="chip" onclick="document.getElementById('sheet').classList.toggle('active')">DASHBOARD</div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="document.getElementById('sheet').classList.toggle('active')"></div>
    
    <div id="logged-in-ui" style="display:none; flex-direction: column;">
        <div id="status-box" class="safe">
            <span id="status-text">MONITORING: ALL CLEAR</span>
            <button class="mute-btn" id="muteBtn" onclick="muteAlert()">STOP ALARM</button>
        </div>

        <div class="list-container">
            <div class="list-title">Active Police Spots (Last 20m)</div>
            <div id="report-list"></div>
        </div>

        <div class="settings-grid">
            <div class="set-card">
                <label>Radius: <span id="range-ui">5</span> km</label>
                <input type="range" min="1" max="20" value="5" oninput="updateRadius(this.value)">
            </div>
            <div class="set-card">
                <label>Map View</label>
                <select onchange="changeMap(this.value)" style="width:100%; background:transparent; color:white; border:none;">
                    <option value="m">Roadmap</option>
                    <option value="s">Satellite</option>
                    <option value="y">Hybrid</option>
                </select>
            </div>
        </div>

        <button class="report-btn" id="holdBtn"><i class="fas fa-bullhorn"></i></button>
        <button onclick="auth.signOut().then(()=>location.reload())" style="background:none; color:#444; border:none; margin-top:10px; font-size:10px; align-self:center;">LOGOUT</button>
    </div>

    <div id="login-prompter" style="display: flex; flex-direction: column; gap: 10px;">
        <h2 style="text-align:center;">Samui Rider Pro</h2>
        <input type="email" id="email" style="padding:14px; border-radius:15px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white;" placeholder="Email">
        <input type="password" id="pass" style="padding:14px; border-radius:15px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white;" placeholder="Password">
        <button onclick="handleAuth()" style="padding:14px; border-radius:15px; background:var(--accent); border:none; color:white; font-weight:bold;">ENTER SYSTEM</button>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk", 
        authDomain: "samui-alert.firebaseapp.com", 
        projectId: "samui-alert", 
        storageBucket: "samui-alert.firebasestorage.app", 
        messagingSenderId: "713193724813", 
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let soundState = { ready: false, muted: false, lastTriggerId: null };
    window.readyAudio = () => { if(!soundState.ready) { document.getElementById('alertSound').play().then(()=>document.getElementById('alertSound').pause()); soundState.ready = true; } };

    window.handleAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('login-prompter').style.display = user ? 'none' : 'flex';
        document.getElementById('logged-in-ui').style.display = user ? 'flex' : 'none';
        if(user) init();
    });

    let map, uMark, pMarkers = {}, scanRadius = 5, polData = [];

    function init() {
        if(map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.512, 100.013], 15);
        L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

        map.locate({ watch: true, enableHighAccuracy: true });
        map.on('locationfound', (e) => {
            if(!uMark) { uMark = L.marker(e.latlng, {icon: L.divIcon({className:'u-marker'})}).addTo(map); map.setView(e.latlng, 17); }
            else uMark.setLatLng(e.latlng);
            checkProximity();
        });

        loadData();
    }

    window.changeMap = (t) => { L.tileLayer(`https://{s}.google.com/vt/lyrs=${t}&x={x}&y={y}&z={z}`, { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map); };
    window.updateRadius = (v) => { scanRadius = v; document.getElementById('range-ui').innerText = v; document.getElementById('radius-val').innerText = v; checkProximity(); };

    function loadData() {
        const cutoff = new Date(Date.now() - 20 * 60 * 1000);
        onSnapshot(query(collection(db, "police_spots"), where("time", ">", cutoff), orderBy("time", "desc")), (sn) => {
            polData = [];
            const listEl = document.getElementById('report-list');
            listEl.innerHTML = "";
            
            // Sync Markers
            Object.keys(pMarkers).forEach(id => { if(!sn.docs.find(d => d.id === id)) { map.removeLayer(pMarkers[id]); delete pMarkers[id]; } });

            sn.forEach(doc => {
                const d = doc.data();
                const timeStr = d.time ? d.time.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                polData.push({id: doc.id, lat: d.lat, lng: d.lng});

                // Add to List
                listEl.innerHTML += `<div class="report-item">Police Spot <span>${timeStr}</span></div>`;

                if(!pMarkers[doc.id]) {
                    pMarkers[doc.id] = L.marker([d.lat, d.lng], {icon: L.divIcon({className:'p-marker'})}).addTo(map);
                }
            });
            checkProximity();
        });
    }

    function checkProximity() {
        if(!uMark) return;
        let count = 0;
        polData.forEach(p => {
            if(map.distance(uMark.getLatLng(), [p.lat, p.lng]) / 1000 <= scanRadius) count++;
        });

        document.getElementById('near-count').innerText = count;
        const box = document.getElementById('status-box');
        const txt = document.getElementById('status-text');
        const mute = document.getElementById('muteBtn');
        const sound = document.getElementById('alertSound');

        if(count > 0) {
            box.className = "danger";
            txt.innerText = `WARNING: ${count} SPOTS NEARBY!`;
            mute.style.display = "block";
            if(!soundState.muted) sound.play().catch(() => {});
        } else {
            box.className = "safe";
            txt.innerText = "MONITORING: ALL CLEAR";
            mute.style.display = "none";
            sound.pause(); sound.currentTime = 0;
            soundState.muted = false; // Reset mute when safe
        }
    }

    window.muteAlert = () => {
        document.getElementById('alertSound').pause();
        soundState.muted = true;
        document.getElementById('muteBtn').style.display = "none";
    };

    const hBtn = document.getElementById('holdBtn');
    let hTimer, hCount = 0;
    const sH = (e) => { e.preventDefault(); hTimer = setInterval(() => { hCount++; if(hCount >= 30){ clearInterval(hTimer); fire(); hCount = 0; } }, 100); };
    const eH = () => { clearInterval(hTimer); hCount = 0; };
    hBtn.addEventListener('touchstart', sH); hBtn.addEventListener('touchend', eH);
    hBtn.addEventListener('mousedown', sH); hBtn.addEventListener('mouseup', eH);

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (p) => {
            await addDoc(collection(db, "police_spots"), { lat: p.coords.latitude, lng: p.coords.longitude, time: serverTimestamp(), user: auth.currentUser.email });
            alert("Report Sent!");
        });
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
