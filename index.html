<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v5.5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.9); --border: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; filter: contrast(1.1); }

        /* Top Header */
        .dashboard { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .status-chip { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); padding: 12px 18px; border-radius: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
        .live-dot { width: 10px; height: 10px; background: #2ed573; border-radius: 50%; box-shadow: 0 0 12px #2ed573; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Map Controls */
        .controls { position: fixed; top: 85px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .btn-circle { width: 50px; height: 50px; border-radius: 15px; background: var(--glass); border: 1px solid var(--border); color: white; backdrop-filter: blur(20px); font-size: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }

        /* Modern Bottom Sheet */
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); backdrop-filter: blur(40px); border-radius: 30px 30px 0 0; border-top: 1px solid var(--border); transform: translateY(calc(100% - 110px)); transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); padding: 15px 25px 45px 25px; }
        .sheet.active { transform: translateY(0); }
        .sheet-handle { width: 45px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 10px; margin: 0 auto 20px auto; }

        /* Report Engine */
        .report-section { display: flex; justify-content: center; margin-top: 20px; }
        .hold-trigger { width: 85px; height: 85px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 32px; position: relative; box-shadow: 0 15px 45px rgba(255, 71, 87, 0.4); overflow: visible; }
        .ring-svg { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); pointer-events: none; }

        /* Logs & Settings */
        .log-box { max-height: 200px; overflow-y: auto; margin-top: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .p-marker { width: 30px; height: 30px; background: var(--main); border: 4px solid white; border-radius: 50%; box-shadow: 0 0 25px var(--main); animation: p-pulse 1s infinite; }
        @keyframes p-pulse { 0% { transform: scale(0.9); } 50% { transform: scale(1.1); } 100% { transform: scale(0.9); } }
        .u-marker { width: 20px; height: 20px; background: #0097e6; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 20px #0097e6; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="status-chip" style="flex:1">
        <div class="live-dot"></div>
        <span style="font-weight:700">24H ALERTS: <span id="count" style="color:var(--main)">0</span></span>
    </div>
    <div class="status-chip"><i class="fas fa-crosshairs"></i>&nbsp;<span id="acc">--</span></div>
</div>

<div class="controls">
    <button class="btn-circle" onclick="toggleMap()"><i class="fas fa-street-view"></i></button>
    <button class="btn-circle" id="locBtn" onclick="reLoc()"><i class="fas fa-location-arrow" style="color:#0097e6"></i></button>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="sheet-handle" onclick="toggleSheet()"></div>
    <h3 style="margin:0 0 15px 0; font-size:18px">Safety Logs</h3>
    
    <div class="log-box" id="logList">
        <div style="text-align:center; padding:20px; color:#555">Syncing data...</div>
    </div>

    <div class="report-section">
        <button class="hold-trigger" id="holdBtn">
            <svg width="95" height="95" class="ring-svg"><circle cx="47.5" cy="47.5" r="44" stroke="white" stroke-width="5" fill="transparent" stroke-dasharray="277" stroke-dashoffset="277" id="ring" /></svg>
            <i class="fas fa-shield-alt"></i>
        </button>
    </div>
    <p style="text-align:center; font-size:11px; color:#666; margin-top:15px">HOLD TO UPDATE POLICE LOCATION</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    const street = L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    let isStreet = true, isFollow = true, userMarker = null, markers = {};

    window.toggleSheet = () => document.getElementById('sheet').classList.toggle('active');
    window.toggleMap = () => { if(isStreet) { map.removeLayer(street); satellite.addTo(map); } else { map.removeLayer(satellite); street.addTo(map); } isStreet = !isStreet; };
    window.reLoc = () => { isFollow = true; document.getElementById('locBtn').style.color = '#0097e6'; if(userMarker) map.setView(userMarker.getLatLng(), 17); };

    map.on('movestart', (e) => { if(!e.hard) { isFollow = false; document.getElementById('locBtn').style.color = '#fff'; } });

    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        document.getElementById('acc').innerText = Math.round(e.accuracy) + 'm';
        if(!userMarker) { userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'u-marker' }) }).addTo(map); map.setView(e.latlng, 17); }
        else userMarker.setLatLng(e.latlng);
        if(isFollow) map.setView(e.latlng, map.getZoom(), { animate: true });
    });

    // 3s Hold Report
    const btn = document.getElementById('holdBtn'), ring = document.getElementById('ring');
    let timer, progress = 277;
    function start() { timer = setInterval(() => { progress -= 9.2; ring.style.strokeDashoffset = progress; if(progress <= 0) { clearInterval(timer); fire(); reset(); } }, 100); }
    function reset() { clearInterval(timer); progress = 277; ring.style.strokeDashoffset = 277; }
    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); start(); };
    btn.onmouseup = btn.ontouchend = reset;

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            if(window.navigator.vibrate) navigator.vibrate(200);
        });
    }

    // Load 24-Hour Alerts
    const dayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
    const q = query(spotsRef, where("time", ">", dayAgo), orderBy("time", "desc"));
    
    onSnapshot(q, (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        const list = document.getElementById('logList');
        list.innerHTML = snaps.empty ? '<div style="text-align:center; padding:20px; color:#555">No active alerts</div>' : "";
        
        snaps.forEach(doc => {
            const data = doc.data();
            const time = data.time ? new Date(data.time.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Just now";
            list.innerHTML += `<div class="log-item"><span>🚨 Police Alert</span><span style="color:#888">${time}</span></div>`;
            if(!markers[doc.id]) markers[doc.id] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map);
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
