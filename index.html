<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider GPS v3.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4757; --accent: #1e90ff; --dark: #121212; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Floating Settings Menu */
        .settings-panel {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-round {
            background: #333; color: white; border: none; width: 40px; height: 40px;
            border-radius: 10px; margin: 5px; cursor: pointer; display: block;
        }

        /* GPS Status & Speed */
        .speedometer {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 15px; border-left: 4px solid var(--accent);
        }

        /* Police Marker - Pulsing Red */
        .police-marker {
            width: 20px; height: 20px; background: var(--primary);
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse-red 1.2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* User Location Marker - Blue Pulse */
        .user-loc {
            width: 15px; height: 15px; background: var(--accent);
            border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Report Button */
        .report-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--primary); color: white; border: none; 
            padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 18px;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.5);
        }
    </style>
</head>
<body>

<div class="speedometer">
    <div style="font-size: 10px; color: #888;">GPS TRACKING</div>
    <div id="status" style="font-size: 14px; font-weight: bold;">ရှာဖွေနေသည်...</div>
</div>

<div class="settings-panel">
    <button class="btn-round" onclick="toggleMap()" title="မြေပုံပြောင်းရန်"><i class="fas fa-layer-group"></i></button>
    <button class="btn-round" onclick="toggleFollow()" id="followBtn" style="color: var(--accent)"><i class="fas fa-location-arrow"></i></button>
    <button class="btn-round" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i></button>
</div>

<div id="map"></div>

<button class="report-btn" onclick="reportNow()">
    🚨 အခု ဒီနေရာမှာ ဖမ်းနေတယ်
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    // Map Setup
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    let satellite = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    let street = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    let isSatellite = true;
    let isFollow = true;
    let userMarker = null;

    // Toggle Functions
    window.toggleMap = () => {
        if(isSatellite) { map.removeLayer(satellite); street.addTo(map); }
        else { map.removeLayer(street); satellite.addTo(map); }
        isSatellite = !isSatellite;
    };

    window.toggleFollow = () => {
        isFollow = !isFollow;
        document.getElementById('followBtn').style.color = isFollow ? '#1e90ff' : '#fff';
    };

    // Real-time GPS Tracking
    map.locate({ setView: true, watch: true, enableHighAccuracy: true });

    map.on('locationfound', (e) => {
        const radius = e.accuracy / 2;
        if (userMarker) {
            userMarker.setLatLng(e.latlng);
        } else {
            userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-loc' }) }).addTo(map);
        }
        
        if (isFollow) {
            map.panTo(e.latlng, { animate: true });
        }
        document.getElementById('status').innerText = "ချိတ်ဆက်ပြီးပြီ ✅";
    });

    map.on('locationerror', () => {
        document.getElementById('status').innerText = "GPS ဖွင့်ပေးပါ ⚠️";
    });

    // Load Police Spots
    const q = query(spotsRef, where("time", ">", new Date(Date.now() - 2 * 60 * 60 * 1000)));
    let markers = {};

    onSnapshot(q, (snaps) => {
        snaps.docChanges().forEach(change => {
            const data = change.doc.data();
            if (change.type === "added") {
                const icon = L.divIcon({ className: 'police-marker', iconSize: [20, 20] });
                markers[change.doc.id] = L.marker([data.lat, data.lng], { icon: icon }).addTo(map)
                    .bindPopup("🚨 ရဲဖမ်းနေသည်");
            }
            if (change.type === "removed") {
                map.removeLayer(markers[change.doc.id]);
            }
        });
    });

    window.reportNow = () => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("အောင်မြင်စွာ တင်ပြီးပါပြီ!");
        });
    };
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
