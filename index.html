<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samui Safe Route - ရဲဖမ်းနေရာပြမြေပုံ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Pyidaungsu', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .report-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: #ff4757; color: white; border: none; 
            padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); cursor: pointer;
        }
        .report-btn:active { background: #ff6b81; }
    </style>
</head>
<body>

<div id="map"></div>
<button class="report-btn" onclick="reportNow()">🚨 ဒီနေရာမှာ ဖမ်းနေတယ်</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // သင်ပေးထားသော Config Code
  const firebaseConfig = {
    apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
    authDomain: "samui-alert.firebaseapp.com",
    projectId: "samui-alert",
    storageBucket: "samui-alert.firebasestorage.app",
    messagingSenderId: "713193724813",
    appId: "1:713193724813:web:85831c39e3560eb310bbc4",
    measurementId: "G-DG7PRMKLN1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const spotsRef = collection(db, "police_spots");

  // မြေပုံကို Koh Samui ပေါ်မှာ စတင်ပြသခြင်း
  var map = L.map('map').setView([9.5120, 100.0137], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Database က နေရာများကို Real-time ဖတ်ပြီး Marker ချပြခြင်း
  onSnapshot(query(spotsRef), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === "added") {
        const d = change.doc.data();
        L.marker([d.lat, d.lng]).addTo(map)
          .bindPopup("🚨 ရဲဖမ်းနေသည် <br> အချိန်: " + new Date(d.time?.toDate()).toLocaleTimeString());
      }
    });
  });

  // လက်ရှိနေရာကို Database သို့ပို့ရန်
  window.reportNow = function() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(async (pos) => {
        await addDoc(spotsRef, {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          time: serverTimestamp()
        });
        alert("တင်ပြီးပါပြီ! အားလုံးကို အသိပေးလိုက်ပါတယ်။");
      }, (err) => {
        alert("တည်နေရာ (Location) ကို ခွင့်ပြုပေးဖို့ လိုအပ်ပါတယ်။");
      });
    }
  };

  // User ရဲ့ လက်ရှိနေရာကို ပြခြင်း
  map.locate({setView: true, maxZoom: 15});
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
