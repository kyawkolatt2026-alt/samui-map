<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v9.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 20px; flex: 1; text-align: center; font-size: 12px; backdrop-filter: blur(10px); font-weight: bold; }

        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 110px)); transition: 0.4s; padding: 20px; border-top: 1px solid var(--border); backdrop-filter: blur(20px); }
        .sheet.active { transform: translateY(0); }
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; }

        .login-box { display: flex; flex-direction: column; gap: 10px; padding: 10px 0; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; font-size: 14px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-sub { background: none; color: #aaa; font-size: 12px; margin-top: 10px; border: none; }

        .report-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 28px; margin: 20px auto; display: block; box-shadow: 0 8px 25px rgba(255,71,87,0.4); }
        .u-marker { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; }
        .p-marker { width: 22px; height: 22px; background: var(--main); border: 3px solid white; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header">
    <div class="chip">Active: <span id="count" style="color:var(--main)">0</span></div>
    <div class="chip" onclick="document.getElementById('sheet').classList.toggle('active')">MENU</div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="document.getElementById('sheet').classList.toggle('active')"></div>
    
    <div id="logged-in-ui" style="display:none; text-align:center;">
        <p style="color:var(--accent);">အကောင့်ဝင်ထားပြီးပါပြီ</p>
        <button class="report-btn" id="holdBtn"><i class="fas fa-bullhorn"></i></button>
        <p style="font-size:12px; color:#aaa;">သတင်းပို့ရန် ၃ စက္ကန့် ဖိထားပါ</p>
        <button class="btn-sub" onclick="auth.signOut()">Logout</button>
    </div>

    <div id="login-prompter">
        <div class="login-box" id="auth-form">
            <h3 id="form-title" style="margin:0 0 10px 0; text-align:center;">Login</h3>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" id="mainBtn" onclick="handleAuth()">Login</button>
            <button class="btn-sub" id="switchBtn" onclick="toggleMode()">အကောင့်မရှိသေးပါက Register လုပ်ပါ</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZfzf", 
        authDomain: "samui-alert.firebaseapp.com", 
        projectId: "samui-alert", 
        storageBucket: "samui-alert.firebasestorage.app", 
        messagingSenderId: "713193724813", 
        appId: "1:713193724813:web:85831c39e3560eb310bbc4" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.auth = getAuth(app);

    let isLoginMode = true;

    window.toggleMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('mainBtn').innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById('switchBtn').innerText = isLoginMode ? "အကောင့်မရှိသေးပါက Register လုပ်ပါ" : "အကောင့်ရှိလျှင် Login ဝင်ပါ";
    };

    window.handleAuth = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("ဖြည့်စွက်ပေးပါ");

        if(isLoginMode) {
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        } else {
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-prompter').style.display = 'none';
            document.getElementById('logged-in-ui').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-prompter').style.display = 'block';
            document.getElementById('logged-in-ui').style.display = 'none';
        }
    });

    // Map & Data Logic
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.512, 100.013], 15);
    L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let uMark = null, markers = {};
    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if(!uMark) { uMark = L.marker(e.latlng, {icon: L.divIcon({className:'u-marker'})}).addTo(map); map.setView(e.latlng, 17); }
        else uMark.setLatLng(e.latlng);
    });

    function loadData() {
        onSnapshot(query(collection(db, "police_spots"), where("time", ">", new Date(Date.now() - 20*60*1000))), (sn) => {
            document.getElementById('count').innerText = sn.size;
            sn.forEach(d => { if(!markers[d.id]) markers[d.id] = L.marker([d.data().lat, d.data().lng], {icon: L.divIcon({className:'p-marker'})}).addTo(map); });
        });
    }

    const hBtn = document.getElementById('holdBtn');
    let hTimer, hCount = 0;
    const startH = (e) => { e.preventDefault(); hTimer = setInterval(() => { hCount++; if(hCount>=30){ clearInterval(hTimer); fire(); hCount=0; } }, 100); };
    const stopH = () => { clearInterval(hTimer); hCount=0; };
    hBtn.addEventListener('touchstart', startH); hBtn.addEventListener('touchend', stopH);
    hBtn.addEventListener('mousedown', startH); hBtn.addEventListener('mouseup', stopH);

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(collection(db, "police_spots"), { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp(), user: auth.currentUser.email });
            alert("သတင်းပို့ပြီးပါပြီ။");
        });
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
