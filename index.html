<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v4.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --danger: #ff4757; --info: #2f3542; --glass: rgba(255, 255, 255, 0.15); --accent: #1e90ff; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Header UI */
        .top-ui {
            position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .status-pill {
            background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(12px);
            color: white; padding: 10px 18px; border-radius: 20px;
            border: 1px solid var(--glass); display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .live-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Side Controls */
        .side-controls { display: flex; flex-direction: column; gap: 12px; }
        .ctrl-btn {
            width: 48px; height: 48px; border-radius: 14px; border: 1px solid var(--glass);
            background: rgba(18, 18, 18, 0.85); color: white; cursor: pointer;
            backdrop-filter: blur(12px); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Reporting System (Long Press) */
        .report-fab-container {
            position: fixed; bottom: 35px; right: 25px; z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }
        .report-label { font-size: 11px; color: white; margin-bottom: 8px; opacity: 0.8; letter-spacing: 1px; }
        .report-fab {
            width: 70px; height: 70px; border-radius: 50%; background: var(--danger);
            border: 4px solid rgba(255,255,255,0.2); color: white; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.5); position: relative;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .progress-circle {
            position: absolute; width: 78px; height: 78px; stroke-dasharray: 245;
            stroke-dashoffset: 245; transform: rotate(-90deg); transition: stroke-dashoffset 0.1s linear;
        }

        /* Marker UI */
        .p-marker {
            width: 28px; height: 28px; background: var(--danger); border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 20px var(--danger); animation: pulse 1s infinite;
        }
        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); }
        }
        .u-loc { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="status-pill">
        <div class="live-dot"></div>
        <span style="font-size: 13px; font-weight: 500;">LIVE ALERTS: <b id="count" style="color: var(--danger);">0</b></span>
    </div>
    <div class="side-controls">
        <button class="ctrl-btn" onclick="toggleMap()"><i class="fas fa-layer-group"></i></button>
        <button class="ctrl-btn" id="followBtn" onclick="toggleFollow()"><i class="fas fa-location-arrow"></i></button>
    </div>
</div>

<div id="map"></div>

<div class="report-fab-container">
    <div class="report-label">HOLD 3S TO REPORT</div>
    <button class="report-fab" id="reportBtn">
        <svg class="progress-circle"><circle cx="39" cy="39" r="38" stroke="white" stroke-width="4" fill="transparent" id="progRing" /></svg>
        <i class="fas fa-bullhorn"></i>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const street = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    let isSatellite = true, isFollow = true, userMarker = null;

    // Reporting Logic (Long Press)
    const reportBtn = document.getElementById('reportBtn');
    const progRing = document.getElementById('progRing');
    let timer, progress = 245;

    function startPress() {
        progress = 245;
        timer = setInterval(() => {
            progress -= 8;
            progRing.style.strokeDashoffset = progress;
            if (progress <= 0) {
                clearInterval(timer);
                confirmReport();
                resetPress();
            }
        }, 100);
    }

    function resetPress() {
        clearInterval(timer);
        progress = 245;
        progRing.style.strokeDashoffset = 245;
    }

    reportBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startPress(); });
    reportBtn.addEventListener('touchend', resetPress);
    reportBtn.addEventListener('mousedown', startPress);
    reportBtn.addEventListener('mouseup', resetPress);

    async function confirmReport() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("Police alert reported successfully.");
        });
    }

    // Map & GPS Logic
    map.on('movestart', () => { isFollow = false; document.getElementById('followBtn').style.color = '#fff'; });
    window.toggleFollow = () => { isFollow = true; document.getElementById('followBtn').style.color = '#1e90ff'; };
    window.toggleMap = () => { if(isSatellite) { map.removeLayer(sat); street.addTo(map); } else { map.removeLayer(street); sat.addTo(map); } isSatellite = !isSatellite; };

    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if (!userMarker) { userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'u-loc' }) }).addTo(map); map.setView(e.latlng, 17); }
        else userMarker.setLatLng(e.latlng);
        if (isFollow) map.setView(e.latlng, map.getZoom(), { animate: true });
    });

    let markers = {};
    onSnapshot(query(spotsRef, where("time", ">", new Date(Date.now() - 2 * 60 * 60 * 1000))), (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        snaps.docChanges().forEach(change => {
            if (change.type === "added") markers[change.doc.id] = L.marker([change.doc.data().lat, change.doc.data().lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map);
            if (change.type === "removed") { map.removeLayer(markers[change.doc.id]); delete markers[change.doc.id]; }
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
