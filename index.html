<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Full Auth Fix</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; -webkit-touch-callout: none !important; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        /* Auth Styles */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        .input-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; user-select: text !important; font-size: 16px; }
        .toggle-pw { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; cursor: pointer; z-index: 10; padding: 5px; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .auth-tab { flex: 1; padding: 10px; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .auth-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* UI Elements */
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        .top-left-bar { position: absolute; top: 45px; left: 15px; }
        .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 18px; }
        .active-follow { color: var(--primary); border: 2px solid var(--primary); }

        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(80%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; }

        /* Hold Button */
        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); transition: width 0.1s linear; }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }

        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .hidden { display: none !important; }
        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; }
        .user-dot { width: 16px; height: 16px; background: #00d2ff; border: 2.5px solid white; border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-section" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 15px;">SAMUI SAFE RIDE</h2>
            <div class="auth-tabs">
                <div id="login-tab" class="auth-tab active" onclick="switchAuth('login')">LOGIN</div>
                <div id="reg-tab" class="auth-tab" onclick="switchAuth('reg')">REGISTER</div>
            </div>
            
            <input type="email" id="email" class="input-box" placeholder="Email Address">
            
            <div class="input-group">
                <input type="password" id="password" class="input-box" placeholder="Password">
                <i class="fas fa-eye toggle-pw" onclick="toggleVisibility('password', this)"></i>
            </div>
            
            <div id="confirm-box" class="input-group hidden">
                <input type="password" id="confirm-pw" class="input-box" placeholder="Confirm Password">
                <i class="fas fa-eye toggle-pw" onclick="toggleVisibility('confirm-pw', this)"></i>
            </div>
            
            <button class="pointer-all btn-auth" onclick="handleAuth()" id="auth-submit-btn">ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-left-bar"><button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
            <div class="top-right-bar">
                <button class="pointer-all circle-btn" onclick="nextMap()"><i class="fas fa-layer-group"></i></button>
                <button id="follow-btn" class="pointer-all circle-btn active-follow" onclick="recenter()"><i class="fas fa-location-arrow"></i></button>
                <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
            </div>
            
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                
                <div class="hold-btn-wrapper">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="hold-btn" class="btn-main">👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)</button>
                </div>
                
                <div style="margin-bottom: 10px;"><label style="font-size:12px;">အကွာအဝေး: <span id="rad-txt">200</span>m</label><input type="range" min="100" max="1500" step="50" value="200" oninput="changeRadius(this.value)" style="width:100%;"></div>
                
                <div class="tab-nav">
                    <div class="tab-item active" id="tab-l" onclick="showTab('list')">စာရင်း</div>
                    <div class="tab-item" id="tab-c" onclick="showTab('chat')">Chat Box</div>
                </div>
                
                <div id="list-tab"><div id="pin-list" style="max-height:180px; overflow-y:auto;"></div></div>
                <div id="chat-tab" class="hidden">
                    <div id="chat-msgs" style="height:150px; overflow-y:auto; background:#151515; padding:10px; border-radius:10px; text-align:left;"></div>
                    <div style="display:flex; gap:8px; margin-top:10px;"><input type="text" id="chat-input" class="input-box" style="margin:0;"><button onclick="sendChat()" style="background:var(--primary); border:none; width:60px; color:white; border-radius:12px;"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, uMarker, uCircle, rad = 200, bell = true, markers = {}, isFollowing = true;
        let uLat, uLng, currentAuthMode = 'login', sIdx = 0;
        let alertActive = false, alertLoop = null;
        const styles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];

        // --- Auth Logic ---
        function switchAuth(mode) {
            currentAuthMode = mode;
            document.getElementById('login-tab').classList.toggle('active', mode === 'login');
            document.getElementById('reg-tab').classList.toggle('active', mode === 'reg');
            document.getElementById('confirm-box').classList.toggle('hidden', mode === 'login');
            document.getElementById('auth-submit-btn').innerText = mode === 'login' ? 'ဝင်ရောက်ရန်' : 'အကောင့်သစ်ဖွင့်ရန်';
        }

        function toggleVisibility(id, el) {
            const inp = document.getElementById(id);
            if (inp.type === "password") { inp.type = "text"; el.classList.replace("fa-eye", "fa-eye-slash"); }
            else { inp.type = "password"; el.classList.replace("fa-eye-slash", "fa-eye"); }
        }

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            if(!e || !p) return alert("Email နှင့် Password အားလုံးဖြည့်ပါ");
            
            try {
                if (currentAuthMode === 'login') {
                    await auth.signInWithEmailAndPassword(e, p);
                } else {
                    const cp = document.getElementById('confirm-pw').value;
                    if (p !== cp) return alert("Password များ မတူညီပါ");
                    await auth.createUserWithEmailAndPassword(e, p);
                    alert("အကောင့်ဖွင့်ခြင်း အောင်မြင်ပါသည်။");
                }
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); initApp(); }
            else { document.getElementById('auth-section').classList.remove('hidden'); }
        });

        // --- Map Logic ---
        function initApp() {
            if(map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false, tap: false }).setView([9.53, 99.93], 15);
            L.tileLayer(styles[0]).addTo(map);

            // ကြိုက်တဲ့နေရာထောက်ရင် Pin ချတဲ့စနစ် (၃ စက္ကန့်)
            let mapTimer;
            map.on('mousedown touchstart', (e) => {
                mapTimer = setTimeout(() => {
                    postPin(e.latlng.lat, e.latlng.lng);
                    if(navigator.vibrate) navigator.vibrate(100);
                    alert("📍 ထောက်ထားသောနေရာတွင် Pin ချပြီးပါပြီ");
                }, 3000);
            });
            map.on('mouseup touchend move', () => clearTimeout(mapTimer));

            navigator.geolocation.watchPosition(pos => {
                uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                if(isFollowing) map.setView([uLat, uLng]);
                if(!uMarker) {
                    uMarker = L.marker([uLat, uLng], {icon: L.divIcon({html:'<div class="user-dot"></div>', className:''})}).addTo(map);
                    uCircle = L.circle([uLat, uLng], {radius: rad, color:'#00d2ff', fillOpacity:0.1, weight:1}).addTo(map);
                } else { uMarker.setLatLng([uLat, uLng]); uCircle.setLatLng([uLat, uLng]); }
                checkDistance();
            }, null, {enableHighAccuracy:true});

            setupHoldButton();
            syncFirebase();
        }

        function setupHoldButton() {
            const btn = document.getElementById('hold-btn'), prog = document.getElementById('hold-progress');
            let t, int, st;
            btn.onmousedown = btn.ontouchstart = (e) => {
                e.preventDefault(); st = Date.now();
                int = setInterval(() => { prog.style.width = Math.min(100, ((Date.now()-st)/3000)*100)+'%'; }, 50);
                t = setTimeout(() => { postPin(uLat, uLng); clearInterval(int); prog.style.width = '0%'; alert("👮 လက်ရှိနေရာတွင် Pin ချပြီးပါပြီ"); }, 3000);
            };
            btn.onmouseup = btn.ontouchend = () => { clearInterval(int); clearTimeout(t); prog.style.width = '0%'; };
        }

        function postPin(lat, lng) {
            const id = Date.now();
            db.ref('pins/'+id).set({lat, lng, time: id, expires: id+(20*60*1000), user: auth.currentUser.email.split('@')[0]});
        }

        function syncFirebase() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(), list = document.getElementById('pin-list');
                list.innerHTML = ""; const now = Date.now();
                for(let k in markers) map.removeLayer(markers[k]); markers = {};
                for(let id in data) {
                    const p = data[id];
                    if(now > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], {icon: L.divIcon({html:'👮', className:'', iconSize:[30,30]})}).addTo(map);
                    list.innerHTML += `<div class="list-item" onclick="map.setView([${p.lat}, ${p.lng}], 17); isFollowing=false;"><span><b>${p.user}</b></span><span>${new Date(p.time).toLocaleTimeString()}</span></div>`;
                }
            });
            db.ref('chats').on('value', snap => {
                const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                snap.forEach(c => { box.innerHTML += `<div><b>${c.val().user}:</b> ${c.val().txt}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        function checkDistance() {
            if(!bell || !uLat) return;
            db.ref('pins').once('value', snap => {
                const pins = snap.val(); let near = false;
                for(let id in pins) { if(map.distance([uLat, uLng], [pins[id].lat, pins[id].lng]) < rad) { near = true; break; } }
                if(near) startAlarm(); else stopAlarm();
            });
        }

        function startAlarm() {
            if(alertActive) return; alertActive = true;
            const sound = document.getElementById('alarm-sound');
            const play = () => { sound.play().catch(()=>{}); if(navigator.vibrate) navigator.vibrate([500,200,500]); };
            play(); alertLoop = setInterval(play, 4000);
        }
        function stopAlarm() { alertActive = false; clearInterval(alertLoop); document.getElementById('alarm-sound').pause(); }

        function sendChat() {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            db.ref('chats').push({user: auth.currentUser.email.split('@')[0], txt: i.value}); i.value = "";
        }

        function showTab(t) {
            document.getElementById('list-tab').classList.toggle('hidden', t!=='list');
            document.getElementById('chat-tab').classList.toggle('hidden', t!=='chat');
            document.getElementById('tab-l').classList.toggle('active', t==='list');
            document.getElementById('tab-c').classList.toggle('active', t==='chat');
        }

        function changeRadius(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; if(uCircle) uCircle.setRadius(rad); }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell?'fas fa-bell':'fas fa-bell-slash'; if(!bell) stopAlarm(); }
        function nextMap() { sIdx = (sIdx+1)%styles.length; L.tileLayer(styles[sIdx]).addTo(map); }
        function recenter() { isFollowing = true; map.setView([uLat, uLng], 17); }
        function logout() { auth.signOut().then(()=>location.reload()); }
    </script>
</body>
</html>
