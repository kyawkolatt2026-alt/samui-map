<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Enhanced Auth</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        
        .top-left-bar { position: absolute; top: 45px; left: 15px; display: flex; flex-direction: column; gap: 15px; }
        .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 18px; }
        .active-follow { color: var(--primary); border: 2px solid var(--primary); }

        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .auth-card { background: var(--card); padding: 30px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        
        .pass-group { position: relative; width: 100%; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; user-select: text !important; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; cursor: pointer; }
        
        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 10px; }
        
        .user-loc-container { position: relative; width: 24px; height: 24px; }
        .user-dot { width: 16px; height: 16px; background: #00d2ff; border: 2.5px solid white; border-radius: 50%; position: absolute; top: 4px; left: 4px; z-index: 2; }
        .user-arrow { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 15px solid #00d2ff; z-index: 1; }

        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(85%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; }

        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }
        
        #chat-msgs { height: 180px; overflow-y: auto; background: #151515; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; text-align: left; }
        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="initAudioContext()">

    <div id="auth-section" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 5px;">SAMUI SAFE RIDE</h2>
            
            <div class="tab-nav">
                <div class="tab-item active" id="btn-login-tab" onclick="toggleAuthTab('login')">အကောင့်ဝင်ရန်</div>
                <div class="tab-item" id="btn-reg-tab" onclick="toggleAuthTab('reg')">အကောင့်သစ်ဖွင့်ရန်</div>
            </div>

            <div id="login-form">
                <input type="email" id="email" class="input-box" placeholder="Email Address">
                <div class="pass-group">
                    <input type="password" id="password" class="input-box" placeholder="Password">
                    <i class="fas fa-eye toggle-pass" onclick="togglePassView('password', this)"></i>
                </div>
                <button class="pointer-all btn-auth" onclick="handleAuth('login')">LOG IN</button>
            </div>

            <div id="reg-form" class="hidden">
                <input type="email" id="reg-email" class="input-box" placeholder="New Email">
                <div class="pass-group">
                    <input type="password" id="reg-password" class="input-box" placeholder="New Password">
                    <i class="fas fa-eye toggle-pass" onclick="togglePassView('reg-password', this)"></i>
                </div>
                <div class="pass-group">
                    <input type="password" id="reg-confirm" class="input-box" placeholder="Confirm Password">
                    <i class="fas fa-eye toggle-pass" onclick="togglePassView('reg-confirm', this)"></i>
                </div>
                <button class="pointer-all btn-auth" style="background: var(--success);" onclick="handleAuth('reg')">REGISTER</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-left-bar">
                <button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="top-right-bar">
                <button class="pointer-all circle-btn" onclick="nextMap()"><i class="fas fa-layer-group"></i></button>
                <button id="follow-btn" class="pointer-all circle-btn active-follow" onclick="recenter()"><i class="fas fa-location-arrow"></i></button>
                <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
            </div>
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                <div class="hold-btn-wrapper" id="hold-trigger">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="main-btn-text" class="btn-main">👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)</button>
                </div>
                <div style="margin-bottom: 15px;"><label style="font-size:12px;">အချက်ပေးအကွာအဝေး: <span id="rad-txt">200</span>m</label><input type="range" min="100" max="2000" step="50" value="200" oninput="changeRadius(this.value)" style="width:100%;"></div>
                <div class="tab-nav">
                    <div class="tab-item active" id="tab-l" onclick="showTab('list')">စာရင်း</div>
                    <div class="tab-item" id="tab-c" onclick="showTab('chat')">Chat Box</div>
                </div>
                <div id="list-tab"><div id="pin-list" style="max-height:180px; overflow-y:auto;"></div></div>
                <div id="chat-tab" class="hidden">
                    <div id="chat-msgs"></div>
                    <div style="display:flex; gap:8px;"><input type="text" id="chat-input" class="input-box" style="margin:0;"><button onclick="sendChat()" style="background:var(--primary); border:none; width:60px; color:white; border-radius:12px;"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, uMarker, uCircle, rad = 200, bell = true;
        let markers = {}, pressTimer, progInterval, alertLoop = null;
        let sIdx = 0, isFollowing = true, uLat, uLng;
        let audioReady = false;

        function initAudioContext() {
            if (!audioReady) {
                const sound = document.getElementById('alarm-sound');
                sound.play().then(() => { sound.pause(); audioReady = true; }).catch(e => {});
            }
        }

        function toggleAuthTab(type) {
            document.getElementById('login-form').classList.toggle('hidden', type === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', type === 'login');
            document.getElementById('btn-login-tab').classList.toggle('active', type === 'login');
            document.getElementById('btn-reg-tab').classList.toggle('active', type === 'reg');
        }

        function togglePassView(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                el.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) { initApp(); } 
            else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        });

        async function handleAuth(mode) {
            if(mode === 'login') {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                if(!email || !pass) return alert("Email နှင့် Password ထည့်ပါ");
                try { await auth.signInWithEmailAndPassword(email, pass); } catch (err) { alert(err.message); }
            } else {
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-password').value;
                const confirm = document.getElementById('reg-confirm').value;
                if(!email || !pass) return alert("အချက်အလက်များ ပြည့်စုံစွာထည့်ပါ");
                if(pass !== confirm) return alert("Password မတူညီပါ!");
                try { await auth.createUserWithEmailAndPassword(email, pass); alert("အကောင့်ဖွင့်ပြီးပါပြီ"); } catch (err) { alert(err.message); }
            }
        }

        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            if (!map) {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5334, 99.9352], 16);
                L.tileLayer(styles[0]).addTo(map);
                const userIcon = L.divIcon({ html: `<div class="user-loc-container"><div class="user-dot"></div><div class="user-arrow"></div></div>`, className: '', iconSize: [24, 24], iconAnchor: [12, 12] });
                
                let hold;
                map.on('mousedown touchstart', (e) => { hold = setTimeout(() => { postPin(e.latlng.lat, e.latlng.lng); alert("Pin တင်ပြီးပါပြီ"); }, 2500); });
                map.on('mouseup touchend mousemove touchmove', () => clearTimeout(hold));

                navigator.geolocation.watchPosition(pos => {
                    uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                    if(isFollowing) map.setView([uLat, uLng], map.getZoom());
                    if(!uMarker) {
                        uMarker = L.marker([uLat, uLng], { icon: userIcon }).addTo(map);
                        uCircle = L.circle([uLat, uLng], { radius: rad, color: '#00d2ff', weight: 1.5, fillOpacity: 0.1 }).addTo(map);
                    } else { uMarker.setLatLng([uLat, uLng]); uCircle.setLatLng([uLat, uLng]); }
                    checkDist(uLat, uLng);
                }, null, { enableHighAccuracy: true });
                setupHoldButton(); syncAll();
            }
        }

        function setupHoldButton() {
            const btnWrapper = document.getElementById('hold-trigger');
            const prog = document.getElementById('hold-progress');
            const start = (e) => { e.preventDefault(); let startT = Date.now(); progInterval = setInterval(() => { prog.style.width = Math.min(100, ((Date.now() - startT) / 3000) * 100) + '%'; }, 50); pressTimer = setTimeout(() => { postPin(uLat, uLng); stop(); }, 3000); };
            const stop = () => { clearInterval(progInterval); clearTimeout(pressTimer); prog.style.width = '0%'; };
            btnWrapper.onmousedown = btnWrapper.ontouchstart = start;
            btnWrapper.onmouseup = btnWrapper.ontouchend = stop;
        }

        function postPin(lat, lng) {
            const id = Date.now();
            db.ref('pins/' + id).set({ lat, lng, time: id, expires: id + (20 * 60 * 1000), user: auth.currentUser.email.split('@')[0] });
        }

        function checkDist(lt, lg) {
            if(!bell) { stopAlert(); return; }
            db.ref('pins').once('value', snap => {
                const pins = snap.val(); let nearby = false;
                for(let id in pins) { if(map.distance([lt, lg], [pins[id].lat, pins[id].lng]) < rad) { nearby = true; break; } }
                if(nearby) startAlert(); else stopAlert();
            });
        }

        function startAlert() {
            if(alertLoop) return;
            const sound = document.getElementById('alarm-sound');
            sound.play().catch(() => {});
            alertLoop = setInterval(() => { sound.play().catch(() => {}); if(navigator.vibrate) navigator.vibrate([500, 200, 500]); }, 3000);
        }

        function stopAlert() { clearInterval(alertLoop); alertLoop = null; document.getElementById('alarm-sound').pause(); }

        function syncAll() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(); const list = document.getElementById('pin-list'); list.innerHTML = "";
                for(let id in data) {
                    const p = data[id];
                    if(Date.now() > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], { icon: L.divIcon({ html: '👮', className: 'p-icon', iconSize: [30, 30] }) }).addTo(map);
                    list.innerHTML += `<div class="list-item"><span><b>${p.user}</b></span><span>${new Date(p.time).toLocaleTimeString()}</span></div>`;
                }
            });
            db.ref('chats').on('value', snap => {
                const c = snap.val(); const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                for(let id in c) box.innerHTML += `<div><b>${c[id].user}:</b> ${c[id].txt}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }

        const styles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];
        function recenter() { isFollowing = true; map.setView([uLat, uLng], 17); }
        function changeRadius(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; uCircle.setRadius(rad); }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell ? 'fas fa-bell' : 'fas fa-bell-slash'; if(!bell) stopAlert(); }
        function sendChat() {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            db.ref('chats').push({ user: auth.currentUser.email.split('@')[0], txt: i.value }); i.value = "";
        }
        function showTab(t) {
            document.getElementById('list-tab').classList.toggle('hidden', t !== 'list');
            document.getElementById('chat-tab').classList.toggle('hidden', t !== 'chat');
            document.getElementById('tab-l').classList.toggle('active', t === 'list');
            document.getElementById('tab-c').classList.toggle('active', t === 'chat');
        }
        function nextMap() { sIdx = (sIdx + 1) % styles.length; L.tileLayer(styles[sIdx]).addTo(map); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
