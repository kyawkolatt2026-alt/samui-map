<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Auth UI */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        
        /* Layout UI */
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        
        /* Bottom Panel */
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 20px 20px 0 0; transform: translateY(75%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; cursor: pointer; }

        /* Vibrate/Progress Circle Button */
        .btn-hold-container { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 10px; }
        .btn-hold-base { position: absolute; inset: 0; background: rgba(255, 71, 87, 0.2); border-radius: 12px; }
        .btn-hold-progress { position: absolute; inset: 0; background: var(--danger); border-radius: 12px; width: 0%; transition: width 0.1s linear; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; background: transparent; z-index: 10; position: relative; }
        
        /* Tabs & Lists */
        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 10px; color: #888; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        .list-item { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--danger); }
        .time-badge { color: var(--danger); font-weight: bold; font-size: 14px; }
        
        /* Chat */
        #chat-msgs { height: 180px; overflow-y: auto; background: #151515; padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 5px; }
        .msg { margin-bottom: 5px; } .msg b { color: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <h2 style="color:var(--primary);">SAMUI SAFE RIDE</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <div id="register-only" class="hidden">
                <input type="password" id="confirm-password" placeholder="Confirm Password">
            </div>
            <button class="btn-main" style="background:var(--primary); width:100%;" id="auth-btn" onclick="handleAuth()">အကောင့်ဝင်ရန်</button>
            <p style="text-align:center; font-size:12px; margin-top:10px;" onclick="toggleAuthMode()">အကောင့်မရှိရင် <span style="color:var(--primary)">Register လုပ်ပါ</span></p>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-bar">
                <div class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
                <div style="display:flex; gap:10px;">
                    <div class="pointer-all circle-btn" onclick="changeMapStyle()"><i class="fas fa-layer-group"></i></div>
                    <div class="pointer-all circle-btn" onclick="toggleAlarm()"><i id="alarm-icon" class="fas fa-bell"></i></div>
                </div>
            </div>

            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                
                <div class="btn-hold-container">
                    <div class="btn-hold-base"></div>
                    <div id="btn-hold-progress" class="btn-hold-progress"></div>
                    <button class="btn-main" id="hold-btn">👮 ၃ စက္ကန့်ဖိထားပြီး သတိပေးမည်</button>
                </div>
                
                <div style="margin: 10px 0;">
                    <label style="font-size:12px;">အကွာအဝေးချိန်ရန်: <span id="radius-val">500</span>m</label>
                    <input type="range" min="200" max="2000" step="100" value="500" oninput="updateRadius(this.value)" style="width:100%;">
                </div>

                <div class="tab-nav">
                    <div class="tab-item active" onclick="showTab('list')">စာရင်း</div>
                    <div class="tab-item" onclick="showTab('chat')">Chat Box</div>
                </div>

                <div id="list-tab">
                    <div id="pin-list" style="max-height:220px; overflow-y:auto;"></div>
                </div>

                <div id="chat-tab" class="hidden">
                    <div id="chat-msgs"></div>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="chat-input" placeholder="သတင်းပေးရန်..." style="margin:0;">
                        <button class="btn-main" style="background:var(--primary); width:70px; padding:10px;" onclick="sendMsg()">ပို့</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/", // သေချာစစ်ပါ
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, userMarker, userCircle, alertRadius = 500, isAlarmOn = true;
        let markers = {}, pressTimer, startTime, holdInterval;
        let mapStyles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];
        let currentStyle = 0, isRegister = false;

        // --- Auth Logic ---
        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('register-only').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isRegister ? 'Register' : 'အကောင့်ဝင်ရန်';
        }
        async function handleAuth() {
            const email = document.getElementById('email').value, pass = document.getElementById('password').value;
            try {
                if (isRegister) {
                    if (pass !== document.getElementById('confirm-password').value) throw new Error("Password မတူပါ");
                    await auth.createUserWithEmailAndPassword(email, pass);
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                initApp();
            } catch (e) { alert(e.message); }
        }
        function logout() { auth.signOut().then(() => location.reload()); }

        // --- Map & GPS Logic ---
        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');

            map = L.map('map', { zoomControl: false }).setView([9.5334, 99.9352], 13);
            L.tileLayer(mapStyles[0]).addTo(map);

            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (!userMarker) {
                    userMarker = L.circleMarker([latitude, longitude], { radius: 8, color: '#fff', fillColor: '#00d2ff', fillOpacity: 1 }).addTo(map);
                    userCircle = L.circle([latitude, longitude], { radius: alertRadius, color: '#00d2ff', weight: 1, fillOpacity: 0.1 }).addTo(map);
                    map.setView([latitude, longitude], 15);
                } else { userMarker.setLatLng([latitude, longitude]); userCircle.setLatLng([latitude, longitude]); }
                checkProximity(latitude, longitude);
            }, null, { enableHighAccuracy: true });

            initHoldEvents(document.getElementById('hold-btn'));
            syncData();
        }

        // --- ၃ စက္ကန့်ဖိထားမှ Pin ကျမည့် Logic ---
        function initHoldEvents(element) {
            startTime = 0;
            const onStart = (e) => {
                startTime = Date.now();
                const prog = document.getElementById('btn-hold-progress');
                holdInterval = window.setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const percent = (elapsed / 3000) * 100;
                    prog.style.width = Math.min(100, percent) + '%';
                }, 100);
                pressTimer = window.setTimeout(() => {
                    navigator.geolocation.getCurrentPosition(pos => {
                        savePin(pos.coords.latitude, pos.coords.longitude);
                    });
                    resetProgress();
                }, 3000);
            };
            const onEnd = () => { resetProgress(); };
            element.addEventListener('touchstart', onStart);
            element.addEventListener('touchend', onEnd);
        }

        function resetProgress() {
            window.clearTimeout(pressTimer);
            window.clearInterval(holdInterval);
            document.getElementById('btn-hold-progress').style.width = '0%';
        }

        function changeMapStyle() {
            currentStyle = (currentStyle + 1) % mapStyles.length;
            L.tileLayer(mapStyles[currentStyle]).addTo(map);
        }

        // --- Data Logic ---
        function savePin(lat, lng) {
            const id = Date.now();
            db.ref('pins/' + id).set({
                lat, lng, time: id, expires: id + (20 * 60 * 1000), user: auth.currentUser.email.split('@')[0]
            }).then(() => alert("သတိပေးချက် တင်ပြီးပါပြီ"));
        }

        function syncData() {
            db.ref('pins').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('pin-list'); list.innerHTML = "";
                for (let k in markers) map.removeLayer(markers[k]); markers = {};
                for (let id in data) {
                    const p = data[id];
                    if (Date.now() > p.expires) { db.ref('pins/' + id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], { icon: L.divIcon({ html: '👮', className: 'p-icon' }) }).addTo(map);
                    const timeStr = new Date(p.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    list.innerHTML += `<div class="list-item" onclick="map.setView([${p.lat}, ${p.lng}], 17)"><span><b>${p.user}</b></span><span class="time-badge">${timeStr}</span></div>`;
                }
            });
            db.ref('chats').limitToLast(20).on('value', snap => {
                const msgs = snap.val(); const container = document.getElementById('chat-msgs'); container.innerHTML = "";
                for (let id in msgs) container.innerHTML += `<div class="msg"><b>${msgs[id].user}:</b> ${msgs[id].text}
