<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v5.6</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.95); --border: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Header */
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .chip { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); padding: 12px 18px; border-radius: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

        /* Bottom Sheet & Settings */
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); backdrop-filter: blur(40px); border-radius: 30px 30px 0 0; border-top: 1px solid var(--border); transform: translateY(calc(100% - 110px)); transition: 0.5s cubic-bezier(0.1, 0.9, 0.2, 1); padding: 20px 25px 40px 25px; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 45px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px auto; }

        .setting-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input[type="range"] { width: 100%; accent-color: var(--main); margin-top: 10px; }

        /* Report Button */
        .report-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 30px; position: relative; box-shadow: 0 15px 40px rgba(255, 71, 87, 0.4); margin: 20px auto; display: block; }
        .ring { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); }

        .p-marker { width: 28px; height: 28px; background: var(--main); border: 4px solid white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(0.9); } }
    </style>
</head>
<body>

<div class="header">
    <div class="chip" style="flex:1"><span style="font-weight:700">ACTIVE ALERTS: <span id="count" style="color:var(--main)">0</span></span></div>
    <div class="chip" onclick="toggleSheet()"><i class="fas fa-cog"></i></div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="toggleSheet()"></div>
    
    <div class="setting-card">
        <div class="row">
            <span>Distance Alert</span>
            <input type="checkbox" id="alertOn" checked>
        </div>
        <div style="font-size: 13px; color: #888;">Alert Radius: <span id="distVal">500</span>m</div>
        <input type="range" id="distRange" min="200" max="2000" step="100" value="500" oninput="updateDist(this.value)">
    </div>

    <div style="font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Recent Logs</div>
    <div id="logList" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px; font-size: 14px;"></div>

    <button class="report-btn" id="holdBtn">
        <svg width="90" height="90" class="ring"><circle cx="45" cy="45" r="42" stroke="white" stroke-width="5" fill="transparent" stroke-dasharray="264" stroke-dashoffset="264" id="ringOffset" /></svg>
        <i class="fas fa-bullhorn"></i>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let markers = {}, userLoc = null;
    window.toggleSheet = () => document.getElementById('sheet').classList.toggle('active');
    window.updateDist = (v) => document.getElementById('distVal').innerText = v;

    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        userLoc = e.latlng;
        if (document.getElementById('alertOn').checked) {
            const radius = document.getElementById('distRange').value;
            Object.values(markers).forEach(m => {
                if(e.latlng.distanceTo(m.getLatLng()) < radius) {
                    if(window.navigator.vibrate) navigator.vibrate([300, 100, 300]);
                }
            });
        }
    });

    // Hold to Report
    const btn = document.getElementById('holdBtn'), ring = document.getElementById('ringOffset');
    let timer, progress = 264;
    function start() { timer = setInterval(() => { progress -= 8.8; ring.style.strokeDashoffset = progress; if(progress <= 0) { clearInterval(timer); fire(); reset(); } }, 100); }
    function reset() { clearInterval(timer); progress = 264; ring.style.strokeDashoffset = 264; }
    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); start(); };
    btn.onmouseup = btn.ontouchend = reset;

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("Police Alert Shared!");
        });
    }

    onSnapshot(query(spotsRef, where("time", ">", new Date(Date.now() - 24 * 60 * 60 * 1000)), orderBy("time", "desc")), (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        const list = document.getElementById('logList');
        list.innerHTML = "";
        snaps.forEach(doc => {
            const data = doc.data();
            const time = data.time ? new Date(data.time.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Just now";
            list.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid var(--border)">🚨 Police Alert at ${time}</div>`;
            if(!markers[doc.id]) markers[doc.id] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map);
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
