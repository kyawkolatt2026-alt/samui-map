<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Advanced Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        /* Auth Styles */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 35px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; user-select: text !important; font-size: 15px; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; cursor: pointer; }
        
        /* UI Overlay */
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; }
        
        /* Bottom Panel */
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 20px 20px 0 0; transform: translateY(75%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; }

        /* User Direction Arrow Styling */
        .user-loc-container { position: relative; width: 24px; height: 24px; }
        .user-dot { width: 16px; height: 16px; background: #00d2ff; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,210,255,0.8); position: absolute; top: 4px; left: 4px; z-index: 2; }
        .user-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 12px solid #00d2ff; z-index: 1; }

        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 12px; overflow: hidden; background: rgba(255, 71, 87, 0.2); transition: background 0.4s ease; }
        .hold-btn-wrapper.success-bg { background: var(--success) !important; }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); transition: width 0.1s linear; }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }
        
        .list-item { background: #252525; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 5px solid var(--danger); }
        #chat-msgs { height: 180px; overflow-y: auto; background: #151515; padding: 10px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 20px;">SAMUI SAFE RIDE</h2>
            <input type="email" id="email" class="input-box" placeholder="Email Address">
            <input type="password" id="password" class="input-box" placeholder="Password">
            <div id="reg-box" class="hidden"><input type="password" id="confirm-password" class="input-box" placeholder="Confirm Password"></div>
            <button class="pointer-all btn-auth" onclick="handleAuth()" id="auth-btn">အကောင့်ဝင်ရန်</button>
            <p style="margin-top:20px; font-size:14px; color:#aaa;" id="toggle-text">အကောင့်မရှိသေးပါက <span style="color:var(--primary); cursor:pointer; font-weight:bold;" onclick="toggleMode()">Register လုပ်ရန်</span></p>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-bar">
                <button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                <div style="display:flex; gap:10px;">
                    <button class="pointer-all circle-btn" onclick="nextMap()"><i class="fas fa-layer-group"></i></button>
                    <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
                </div>
            </div>
            
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                
                <div class="hold-btn-wrapper" id="hold-trigger">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="main-btn-text" class="btn-main">👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)</button>
                </div>

                <div style="margin-bottom: 10px;"><label style="font-size:12px;">အကွာအဝေး: <span id="rad-txt">200</span>m</label><input type="range" min="100" max="2000" step="100" value="200" oninput="changeRadius(this.value)" style="width:100%;"></div>
                
                <div class="tab-nav">
                    <div class="tab-item active" id="tab-l" onclick="showTab('list')">စာရင်း</div>
                    <div class="tab-item" id="tab-c" onclick="showTab('chat')">Chat Box</div>
                </div>
                <div id="list-tab"><div id="pin-list" style="max-height:180px; overflow-y:auto;"></div></div>
                <div id="chat-tab" class="hidden">
                    <div id="chat-msgs"></div>
                    <div style="display:flex; gap:5px;"><input type="text" id="chat-input" class="input-box" style="margin:0;"><button onclick="sendChat()" style="background:var(--primary); border:none; width:60px; color:white; border-radius:10px;"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, uMarker, uCircle, rad = 200, bell = true, isReg = false;
        let markers = {}, pressTimer, progInterval, alertLoop = null;
        let sIdx = 0;
        const styles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];

        function toggleMode() {
            isReg = !isReg;
            document.getElementById('reg-box').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isReg ? "Register လုပ်ရန်" : "အကောင့်ဝင်ရန်";
        }

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try {
                if(isReg) await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
                initApp();
            } catch (err) { alert(err.message); }
        }

        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            
            // မြေပုံလှည့်လို့ရအောင် (rotate) နဲ့ Performance အတွက် (preferCanvas) ထည့်ထားပါတယ်
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                preferCanvas: true,
                tap: false,
                touchZoom: true
            }).setView([9.5334, 99.9352], 15);
            
            L.tileLayer(styles[0]).addTo(map);

            // User Marker with Direction Arrow
            const userIcon = L.divIcon({
                html: `<div id="user-icon-rotate" class="user-loc-container"><div class="user-arrow"></div><div class="user-dot"></div></div>`,
                className: '',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, heading } = pos.coords;
                
                // မြေပုံကို ကိုယ့်နောက်ကလိုက်အောင်လုပ်ခြင်း
                map.panTo([latitude, longitude]);

                if(!uMarker) {
                    uMarker = L.marker([latitude, longitude], { icon: userIcon }).addTo(map);
                    uCircle = L.circle([latitude, longitude], { radius: rad, color: '#00d2ff', weight: 1, fillOpacity: 0.1 }).addTo(map);
                } else {
                    uMarker.setLatLng([latitude, longitude]);
                    uCircle.setLatLng([latitude, longitude]);
                }

                // မြှားလှည့်ပေးခြင်း (Direction)
                if(heading !== null) {
                    const iconEl = document.getElementById('user-icon-rotate');
                    if(iconEl) iconEl.style.transform = `rotate(${heading}deg)`;
                }

                checkDist(latitude, longitude);
            }, err => {}, { enableHighAccuracy: true });

            setupActions();
            syncAll();
        }

        function setupActions() {
            const btnWrapper = document.getElementById('hold-trigger');
            const prog = document.getElementById('hold-progress');
            const btnTxt = document.getElementById('main-btn-text');

            btnWrapper.addEventListener('touchstart', (e) => {
                e.preventDefault();
                let startT = Date.now();
                progInterval = setInterval(() => {
                    let p = ((Date.now() - startT) / 3000) * 100;
                    prog.style.width = Math.min(100, p) + '%';
                }, 50);

                pressTimer = setTimeout(() => {
                    navigator.geolocation.getCurrentPosition(pos => {
                        postPin(pos.coords.latitude, pos.coords.longitude);
                        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        btnWrapper.classList.add('success-bg');
                        btnTxt.innerText = "✅ သတိပေးချက် တင်ပြီးပါပြီ";
                        setTimeout(() => {
                            btnWrapper.classList.remove('success-bg');
                            btnTxt.innerText = "👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)";
                        }, 2000);
                    });
                    clearInterval(progInterval); prog.style.width = '0%';
                }, 3000);
            });

            btnWrapper.addEventListener('touchend', () => { clearInterval(progInterval); clearTimeout(pressTimer); prog.style.width = '0%'; });
        }

        function postPin(lat, lng) {
            const id = Date.now();
            db.ref('pins/' + id).set({ lat, lng, time: id, expires: id + (20 * 60 * 1000), user: auth.currentUser.email.split('@')[0] });
        }

        function syncAll() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(); const list = document.getElementById('pin-list'); list.innerHTML = "";
                const now = Date.now();
                for(let k in markers) map.removeLayer(markers[k]); markers = {};
                for(let id in data) {
                    const p = data[id];
                    if(now > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], { icon: L.divIcon({ html: '👮', className: 'p-icon', iconSize: [30, 30] }) }).addTo(map);
                    const t = new Date(p.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    list.innerHTML += `<div class="list-item" onclick="map.setView([${p.lat}, ${p.lng}], 17)"><span><b>${p.user}</b></span><span style="color:var(--danger); font-weight:bold;">${t}</span></div>`;
                }
            });

            db.ref('chats').on('value', snap => {
                const c = snap.val(); const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                const now = Date.now();
                for(let id in c) {
                    if(now > c[id].expires) { db.ref('chats/'+id).remove(); continue; }
                    box.innerHTML += `<div><b>${c[id].user}:</b> ${c[id].txt}</div>`;
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        function checkDist(lt, lg) {
            if(!bell) { stopAlert(); return; }
            db.ref('pins').once('value', snap => {
                const pins = snap.val(); let nearby = false;
                for(let id in pins) { if(map.distance([lt, lg], [pins[id].lat, pins[id].lng]) < rad) { nearby = true; break; } }
                if(nearby) startAlert(); else stopAlert();
            });
        }

        function startAlert() {
            if(alertLoop) return;
            const sound = document.getElementById('alarm-sound'); sound.play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate([500, 300, 500]);
            alertLoop = setInterval(() => {
                sound.play().catch(()=>{});
                if(navigator.vibrate) navigator.vibrate([500, 300, 500]);
            }, 3000);
        }

        function stopAlert() { clearInterval(alertLoop); alertLoop = null; document.getElementById('alarm-sound').pause(); }
        function sendChat() {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            db.ref('chats').push({ user: auth.currentUser.email.split('@')[0], txt: i.value, expires: Date.now() + (24 * 60 * 60 * 1000) });
            i.value = "";
        }
        function showTab(t) {
            document.getElementById('list-tab').classList.toggle('hidden', t !== 'list');
            document.getElementById('chat-tab').classList.toggle('hidden', t !== 'chat');
            document.getElementById('tab-l').classList.toggle('active', t === 'list');
            document.getElementById('tab-c').classList.toggle('active', t === 'chat');
        }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell ? 'fas fa-bell' : 'fas fa-bell-slash'; if(!bell) stopAlert(); }
        function changeRadius(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; if(uCircle) uCircle.setRadius(rad); }
        function nextMap() { sIdx = (sIdx + 1) % styles.length; L.tileLayer(styles[sIdx]).addTo(map); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
