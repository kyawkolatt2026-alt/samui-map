<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v5.7</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.95); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Floating Top Dashboard */
        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .chip { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); padding: 12px 18px; border-radius: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

        /* Bottom Sheet UI */
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); backdrop-filter: blur(40px); border-radius: 30px 30px 0 0; border-top: 1px solid var(--border); transform: translateY(calc(100% - 110px)); transition: 0.5s cubic-bezier(0.1, 0.9, 0.2, 1); padding: 20px 25px 40px 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .sheet.active { transform: translateY(0); }
        .handle { width: 45px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px auto; cursor: pointer; }

        /* Settings Design */
        .setting-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .mode-btn.active { background: var(--accent); border-color: var(--accent); }

        input[type="range"] { width: 100%; accent-color: var(--main); margin-top: 10px; }

        /* Main Action Button */
        .report-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 30px; position: relative; box-shadow: 0 15px 40px rgba(255, 71, 87, 0.4); margin: 25px auto 10px auto; display: block; }
        .ring { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); pointer-events: none; }

        /* Markers */
        .p-marker { width: 28px; height: 28px; background: var(--main); border: 4px solid white; border-radius: 50%; animation: pulse 1s infinite; box-shadow: 0 0 20px var(--main); }
        @keyframes pulse { 0% { transform: scale(0.9); } 50% { transform: scale(1.1); } 100% { transform: scale(0.9); } }
        .u-marker { width: 20px; height: 20px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <div class="chip" style="flex:1"><span style="font-weight:700; font-size: 13px;">ACTIVE ALERTS: <span id="count" style="color:var(--main)">0</span></span></div>
    <div class="chip" onclick="toggleSheet()" id="cogBtn"><i class="fas fa-cog"></i></div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="toggleSheet()"></div>
    
    <div class="setting-card">
        <label style="font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block;">Map View</label>
        <div style="display: flex; gap: 10px;">
            <button class="mode-btn active" id="streetBtn" onclick="setMapView('street')"><i class="fas fa-road"></i> Street</button>
            <button class="mode-btn" id="satBtn" onclick="setMapView('sat')"><i class="fas fa-satellite"></i> Satellite</button>
        </div>
    </div>

    <div class="setting-card">
        <div class="row">
            <span style="font-size: 14px;">Proximity Alert</span>
            <input type="checkbox" id="alertOn" checked>
        </div>
        <div style="font-size: 13px; color: #aaa;">Radius: <span id="distVal" style="color: white; font-weight: bold;">500</span>m</div>
        <input type="range" id="distRange" min="200" max="2000" step="100" value="500" oninput="updateDist(this.value)">
    </div>

    <div style="text-align: center;">
        <button class="report-btn" id="holdBtn">
            <svg width="90" height="90" class="ring"><circle cx="45" cy="45" r="42" stroke="white" stroke-width="5" fill="transparent" stroke-dasharray="264" stroke-dashoffset="264" id="ringOffset" /></svg>
            <i class="fas fa-bullhorn"></i>
        </button>
        <p style="font-size: 10px; color: #555; margin-top: 5px;">HOLD 3S TO REPORT POLICE</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    // Map Setup
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    const streetLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    let markers = {}, userMarker = null;

    window.toggleSheet = () => document.getElementById('sheet').classList.toggle('active');
    window.updateDist = (v) => document.getElementById('distVal').innerText = v;

    window.setMapView = (type) => {
        if(type === 'sat') {
            map.removeLayer(streetLayer); satLayer.addTo(map);
            document.getElementById('satBtn').classList.add('active');
            document.getElementById('streetBtn').classList.remove('active');
        } else {
            map.removeLayer(satLayer); streetLayer.addTo(map);
            document.getElementById('streetBtn').classList.add('active');
            document.getElementById('satBtn').classList.remove('active');
        }
    };

    // GPS & Alerts
    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if (!userMarker) {
            userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'u-marker' }) }).addTo(map);
            map.setView(e.latlng, 17);
        } else { userMarker.setLatLng(e.latlng); }

        if (document.getElementById('alertOn').checked) {
            const radius = document.getElementById('distRange').value;
            Object.values(markers).forEach(m => {
                if(e.latlng.distanceTo(m.getLatLng()) < radius) {
                    if(window.navigator.vibrate) navigator.vibrate([400, 100, 400]);
                }
            });
        }
    });

    // Hold Logic
    const btn = document.getElementById('holdBtn'), ring = document.getElementById('ringOffset');
    let timer, progress = 264;
    function start() { timer = setInterval(() => { progress -= 8.8; ring.style.strokeDashoffset = progress; if(progress <= 0) { clearInterval(timer); fire(); reset(); } }, 100); }
    function reset() { clearInterval(timer); progress = 264; ring.style.strokeDashoffset = 264; }
    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); start(); };
    btn.onmouseup = btn.ontouchend = reset;

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            if(window.navigator.vibrate) navigator.vibrate(200);
        });
    }

    // Live Data (24H Window)
    onSnapshot(query(spotsRef, where("time", ">", new Date(Date.now() - 24 * 60 * 60 * 1000)), orderBy("time", "desc")), (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        snaps.forEach(doc => {
            const data = doc.data();
            if(!markers[doc.id]) markers[doc.id] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map);
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
