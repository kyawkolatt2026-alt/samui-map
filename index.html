<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Fixed Alarm & Follow</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; touch-action: none; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        /* Auth UI */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .input-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; outline: none; font-size: 16px; user-select: text !important; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; pointer-events: all; }

        /* Overlay UI */
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        .top-left-bar { position: absolute; top: 45px; left: 15px; display: flex; flex-direction: column; gap: 15px; }
        .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 18px; cursor: pointer; }
        .active-follow { color: var(--primary); border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* User Marker */
        .user-loc-container { position: relative; width: 24px; height: 24px; }
        .user-dot { width: 16px; height: 16px; background: #00d2ff; border: 2.5px solid white; border-radius: 50%; position: absolute; top: 4px; left: 4px; z-index: 2; box-shadow: 0 0 10px var(--primary); }
        .user-arrow { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 15px solid #00d2ff; z-index: 1; }

        /* Bottom Panel */
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(80%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; cursor: pointer; }
        
        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }
        
        #chat-msgs { height: 180px; overflow-y: auto; background: #151515; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; }
        .tab-nav { display: flex; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .hidden { display: none !important; }
        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }

        /* Custom Pin Confirmation Modal */
        .custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10001; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .custom-modal-card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #333; }
        .custom-modal-text { font-size: 16px; color: white; margin-bottom: 25px; }
        .custom-modal-btns { display: flex; justify-content: space-between; gap: 15px; }
        .custom-modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-cancel { background: #333; color: #aaa; }
        .btn-confirm { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="pin-modal" class="custom-modal-overlay hidden">
        <div class="custom-modal-card">
            <div class="custom-modal-text">ဤနေရာတွင် Pin ထောက်မည်လား?</div>
            <div class="custom-modal-btns">
                <button class="custom-modal-btn btn-cancel" onclick="closePinModal()">Cancel</button>
                <button class="custom-modal-btn btn-confirm" id="modal-confirm-btn">OK</button>
            </div>
        </div>
    </div>

    <div id="auth-section" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 20px;">SAMUI SAFE RIDE</h2>
            <input type="email" id="email" class="input-box" placeholder="Email Address" style="margin-bottom:10px;">
            <input type="password" id="password" class="input-box" placeholder="Password">
            <button class="pointer-all btn-auth" onclick="handleAuth()">အကောင့်ဝင်ရန်</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-left-bar"><button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
            <div class="top-right-bar">
                <button class="pointer-all circle-btn" onclick="nextMap()"><i class="fas fa-layer-group"></i></button>
                <button id="follow-btn" class="pointer-all circle-btn active-follow" onclick="recenter()"><i class="fas fa-location-arrow"></i></button>
                <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
            </div>
            
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                <div class="hold-btn-wrapper" id="hold-trigger">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="main-btn-text" class="btn-main">👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)</button>
                </div>
                <div style="margin-bottom: 10px;"><label style="font-size:12px; color: #aaa;">အကွာအဝေး: <span id="rad-txt" style="color:var(--primary);">200</span>m</label><input type="range" min="100" max="2000" step="100" value="200" oninput="changeRadius(this.value)" style="width:100%;"></div>
                
                <div class="tab-nav">
                    <div class="tab-item active" id="tab-l" onclick="showTab('list')">စာရင်း</div>
                    <div class="tab-item" id="tab-c" onclick="showTab('chat')">Chat</div>
                </div>
                <div id="list-tab"><div id="pin-list" style="max-height:180px; overflow-y:auto;"></div></div>
                <div id="chat-tab" class="hidden">
                    <div id="chat-msgs"></div>
                    <div style="display:flex; gap:8px;"><input type="text" id="chat-input" class="input-box" style="margin:0; height:45px;" placeholder="စာရေးရန်..."><button onclick="sendChat()" style="background:var(--primary); border:none; width:60px; color:white; border-radius:12px;"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, uMarker, uCircle, rad = 200, bell = true, markers = {}, alertLoop = null;
        let sIdx = 0, isFollowing = true, uLat, uLng, currentHeading = 0;
        let pendingLat, pendingLng; // Pin တည်နေရာယာယီသိမ်းရန် Variable များ
        const styles = ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];

        auth.onAuthStateChanged((user) => { if (user) initApp(); else document.getElementById('auth-section').classList.remove('hidden'); });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert(err.message); }
        }

        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            if(map) return;

            map = L.map('map', { zoomControl: false, attributionControl: false, rotate: true, touchRotate: true }).setView([9.5334, 99.9352], 15);
            L.tileLayer(styles[0]).addTo(map);

            map.on('dragstart', () => {
                isFollowing = false;
                document.getElementById('follow-btn').classList.remove('active-follow');
            });

            // Browser confirm နေရာတွင် Custom Modal ပွင့်ရန် ပြောင်းလဲထားပါသည်
            map.on('contextmenu', (e) => {
                pendingLat = e.latlng.lat;
                pendingLng = e.latlng.lng;
                document.getElementById('pin-modal').classList.remove('hidden');
            });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (e) => { if (e.alpha !== null) currentHeading = 360 - e.alpha; updateRot(); }, true);
            }

            navigator.geolocation.watchPosition(pos => {
                uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                
                if(isFollowing) map.setView([uLat, uLng], map.getZoom(), {animate: false});
                
                const icon = L.divIcon({ html: `<div id="user-icon-rotate" class="user-loc-container"><div class="user-arrow"></div><div class="user-dot"></div></div>`, className: '', iconSize: [24, 24], iconAnchor: [12, 12] });
                if(!uMarker) {
                    uMarker = L.marker([uLat, uLng], { icon: icon }).addTo(map);
                    uCircle = L.circle([uLat, uLng], { radius: rad, color: '#00d2ff', weight: 1.5, fillOpacity: 0.1 }).addTo(map);
                } else { uMarker.setLatLng([uLat, uLng]); uCircle.setLatLng([uLat, uLng]); }
                updateRot(); checkDist(uLat, uLng);
            }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });

            setupActions(); syncAll(); setupModalEvents();
        }

        function updateRot() {
            const el = document.getElementById('user-icon-rotate');
            if(el) el.style.transform = `rotate(${currentHeading - (map.getBearing ? map.getBearing() : 0)}deg)`;
        }

        function recenter() { 
            isFollowing = true; 
            document.getElementById('follow-btn').classList.add('active-follow'); 
            if(uLat) map.setView([uLat, uLng], 17, {animate: true}); 
            if(map.setBearing) map.setBearing(0);
        }

        function setupActions() {
            const btn = document.getElementById('hold-trigger'), prog = document.getElementById('hold-progress'), txt = document.getElementById('main-btn-text');
            let pressTimer, progInterval;
            const start = (e) => {
                e.preventDefault(); let startT = Date.now();
                progInterval = setInterval(() => prog.style.width = Math.min(100, ((Date.now() - startT) / 3000) * 100) + '%', 50);
                pressTimer = setTimeout(() => {
                    postPin(uLat, uLng); if(navigator.vibrate) navigator.vibrate(100);
                    btn.style.background = "var(--success)"; txt.innerText = "✅ တင်ပြီးပါပြီ";
                    setTimeout(() => { btn.style.background = "rgba(255, 71, 87, 0.2)"; txt.innerText = "👮 လက်ရှိနေရာမှာ ဖမ်းနေသည် (၃ စက္ကန့်ဖိပါ)"; }, 2000);
                    clearInterval(progInterval); prog.style.width = '0%';
                }, 3000);
            };
            btn.addEventListener('touchstart', start); btn.addEventListener('touchend', () => { clearInterval(progInterval); clearTimeout(pressTimer); prog.style.width = '0%'; });
        }

        // Custom Modal ပိတ်ရန် Function
        function closePinModal() {
            document.getElementById('pin-modal').classList.add('hidden');
        }

        // Modal ရဲ့ OK ခလုတ်နှိပ်ခြင်းအား ဖမ်းယူရန်
        function setupModalEvents() {
            document.getElementById('modal-confirm-btn').addEventListener('click', () => {
                if (pendingLat && pendingLng) {
                    postPin(pendingLat, pendingLng);
                }
                closePinModal();
            });
        }

        function postPin(lat, lng) {
            const id = Date.now();
            const user = auth.currentUser ? auth.currentUser.email.split('@')[0] : "User";
            db.ref('pins/' + id).set({ lat, lng, time: id, expires: id + (20 * 60 * 1000), user: user })
            .then(() => { if(uLat) checkDist(uLat, uLng); });
        }

        function syncAll() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(), list = document.getElementById('pin-list'), now = Date.now();
                list.innerHTML = ""; for(let k in markers) map.removeLayer(markers[k]); markers = {};
                for(let id in data) {
                    const p = data[id]; if(now > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], { icon: L.divIcon({ html: '👮', className: 'p-icon', iconSize: [30, 30] }) }).addTo(map);
                    list.innerHTML += `<div class="list-item" onclick="map.setView([${p.lat}, ${p.lng}], 17); isFollowing=false; document.getElementById('follow-btn').classList.remove('active-follow');"><span><b>${p.user}</b></span><span style="color:var(--danger)">${new Date(p.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false})}</span></div>`;
                }
            });

            db.ref('chats').on('value', snap => {
                const c = snap.val(), box = document.getElementById('chat-msgs'), now = Date.now();
                box.innerHTML = ""; let lastDate = "";
                for(let id in c) {
                    const chat = c[id]; if(chat.expires && now > chat.expires) { db.ref('chats/'+id).remove(); continue; }
                    const d = new Date(chat.time), dStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' }), tStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    if (dStr !== lastDate) {
                        const label = (dStr === new Date().toLocaleDateString([], { month: 'short', day: 'numeric' })) ? "Today" : dStr;
                        box.innerHTML += `<div style="text-align:center; font-size:10px; color:#555; margin:10px 0;">--- ${label} ---</div>`;
                        lastDate = dStr;
                    }
                    box.innerHTML += `<div style="margin-bottom:10px;"><b style="color:var(--primary); font-size:13px;">${chat.user}</b> <span style="font-size:10px; color:#555; margin-left:5px;">${tStr}</span><div style="color:#ccc; font-size:14px; margin-top:2px;">${chat.txt}</div></div>`;
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        function checkDist(lt, lg) {
            if(!bell) { stopAlert(); return; }
            db.ref('pins').once('value', snap => {
                let nearby = false; const data = snap.val();
                for(let id in data) { if(map.distance([lt, lg], [data[id].lat, data[id].lng]) < rad) { nearby = true; break; } }
                if(nearby) startAlert(); else stopAlert();
            });
        }

        function startAlert() { if(alertLoop) return; document.getElementById('alarm-sound').play(); alertLoop = setInterval(() => { document.getElementById('alarm-sound').play(); if(navigator.vibrate) navigator.vibrate([500, 300, 500]); }, 3000); }
        function stopAlert() { clearInterval(alertLoop); alertLoop = null; document.getElementById('alarm-sound').pause(); }
        
        function sendChat() { 
            const i = document.getElementById('chat-input'); if(!i.value.trim()) return; 
            const now = Date.now();
            db.ref('chats').push({ user: auth.currentUser.email.split('@')[0], txt: i.value, time: now, expires: now + (24 * 60 * 60 * 1000) }); 
            i.value = ""; 
        }

        function showTab(t) { document.getElementById('list-tab').classList.toggle('hidden', t!=='list'); document.getElementById('chat-tab').classList.toggle('hidden', t!=='chat'); document.getElementById('tab-l').classList.toggle('active', t==='list'); document.getElementById('tab-c').classList.toggle('active', t==='chat'); }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell ? 'fas fa-bell' : 'fas fa-bell-slash'; if(!bell) stopAlert(); }
        function changeRadius(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; if(uCircle) uCircle.setRadius(rad); }
        function nextMap() { sIdx = (sIdx + 1) % styles.length; L.tileLayer(styles[sIdx]).addTo(map); }
        function logout() { if(confirm("Logout လုပ်မည်လား?")) auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
