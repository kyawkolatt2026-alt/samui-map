<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride - Tablet Fix</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --danger: #ff4757; --success: #2ed573; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; -webkit-touch-callout: none !important; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; user-select: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #121212; }
        
        .overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }
        
        .top-left-bar { position: absolute; top: 45px; left: 15px; }
        .top-right-bar { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; font-size: 20px; }
        .active-follow { color: var(--primary); border: 2px solid var(--primary); }

        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; color: white; font-weight: bold; margin-top: 10px; }

        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.95); padding: 15px; border-radius: 25px 25px 0 0; transform: translateY(85%); transition: 0.3s; }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 5px; background: #555; margin: 0 auto 15px; border-radius: 10px; }

        .hold-btn-wrapper { position: relative; width: 100%; height: 55px; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: rgba(255, 71, 87, 0.2); }
        .hold-progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--danger); transition: width 0.1s linear; }
        .btn-main { position: relative; width: 100%; height: 100%; background: transparent; border: none; color: white; font-weight: bold; z-index: 5; }

        .tab-nav { display: flex; border-bottom: 1px solid #333; margin: 10px 0; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #888; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="auth-section" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 style="color:var(--primary);">SAMUI SAFE RIDE</h2>
            <div class="tab-nav">
                <div class="tab-item active" id="l-tab" onclick="setMode('login')">LOGIN</div>
                <div class="tab-item" id="r-tab" onclick="setMode('reg')">REGISTER</div>
            </div>
            <input type="email" id="email" class="input-box" placeholder="Email Address">
            <input type="password" id="password" class="input-box" placeholder="Password">
            <button class="pointer-all btn-auth" onclick="doAuth()" id="auth-btn">ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="map"></div>
        <div class="overlay-ui">
            <div class="top-left-bar"><button class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
            <div class="top-right-bar">
                <button id="follow-btn" class="pointer-all circle-btn active-follow" onclick="recenter()"><i class="fas fa-location-arrow"></i></button>
                <button class="pointer-all circle-btn" onclick="toggleBell()"><i id="bell-icon" class="fas fa-bell"></i></button>
            </div>
            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="document.getElementById('main-panel').classList.toggle('active')"></div>
                <div class="hold-btn-wrapper">
                    <div id="hold-progress" class="hold-progress-bar"></div>
                    <button id="main-btn" class="btn-main">လက်ရှိနေရာတွင် Pin ချရန် (၃ စက္ကန့်ဖိပါ)</button>
                </div>
                <div style="margin-bottom: 10px;"><label style="font-size:12px;">အကွာအဝေး: <span id="rad-txt">200</span>m</label><input type="range" min="100" max="1000" step="50" value="200" oninput="updateRad(this.value)" style="width:100%;"></div>
                <div id="pin-list" style="max-height:150px; overflow-y:auto; border-top:1px solid #333; padding-top:10px;"></div>
            </div>
        </div>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            databaseURL: "https://samui-alert-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, uMarker, uCircle, rad = 200, bell = true, markers = {};
        let isFollowing = true, uLat, uLng, authMode = 'login', alertActive = false;

        function setMode(m) {
            authMode = m;
            document.getElementById('l-tab').classList.toggle('active', m==='login');
            document.getElementById('r-tab').classList.toggle('active', m==='reg');
            document.getElementById('auth-btn').innerText = m==='login'?'ဝင်ရောက်ရန်':'အကောင့်သစ်ဖွင့်ရန်';
        }

        async function doAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            if(!e || !p) return alert("ဖြည့်စွက်ပါ");
            try {
                if(authMode==='login') await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
                document.getElementById('alarm-sound').play().then(()=>document.getElementById('alarm-sound').pause());
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); initApp(); }
            else { document.getElementById('auth-section').classList.remove('hidden'); }
        });

        function initApp() {
            if(map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false, tap: false }).setView([9.53, 99.93], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // --- FIXED LONG PRESS FOR TABLET ---
            let holdStart;
            map.on('mousedown touchstart', (e) => {
                holdStart = setTimeout(() => {
                    postPin(e.latlng.lat, e.latlng.lng);
                    if(navigator.vibrate) navigator.vibrate(100);
                    alert("📍 နေရာသစ်တွင် Pin ချပြီးပါပြီ");
                }, 2000); // ၂ စက္ကန့်ဖိလျှင် Pin ကျမည်
            });
            map.on('mouseup touchend move', () => clearTimeout(holdStart));

            navigator.geolocation.watchPosition(pos => {
                uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                if(isFollowing) map.setView([uLat, uLng]);
                if(!uMarker) {
                    uMarker = L.marker([uLat, uLng], {icon: L.divIcon({html:'<div style="background:#00d2ff;width:16px;height:16px;border:2px solid white;border-radius:50%;box-shadow:0 0 10px #00d2ff;"></div>', className:''})}).addTo(map);
                    uCircle = L.circle([uLat, uLng], {radius: rad, color:'#00d2ff', fillOpacity:0.1}).addTo(map);
                } else {
                    uMarker.setLatLng([uLat, uLng]);
                    uCircle.setLatLng([uLat, uLng]);
                }
                checkDist();
            }, null, {enableHighAccuracy:true});

            setupBtnHold();
            syncData();
        }

        function setupBtnHold() {
            const btn = document.getElementById('main-btn'), prog = document.getElementById('hold-progress');
            let timer, interval, st;
            const start = (e) => {
                e.preventDefault(); st = Date.now();
                interval = setInterval(() => { prog.style.width = Math.min(100, ((Date.now()-st)/2500)*100)+'%'; }, 50);
                timer = setTimeout(() => { postPin(uLat, uLng); stop(); alert("လက်ရှိနေရာတွင် Pin ချပြီးပါပြီ"); }, 2500);
            };
            const stop = () => { clearInterval(interval); clearTimeout(timer); prog.style.width = '0%'; };
            btn.onmousedown = btn.ontouchstart = start;
            btn.onmouseup = btn.ontouchend = stop;
        }

        function postPin(lat, lng) {
            const id = Date.now();
            db.ref('pins/'+id).set({lat, lng, time: id, expires: id+(20*60*1000), user: auth.currentUser.email.split('@')[0]});
        }

        function syncData() {
            db.ref('pins').on('value', snap => {
                const data = snap.val(), list = document.getElementById('pin-list');
                list.innerHTML = ""; const now = Date.now();
                for(let k in markers) map.removeLayer(markers[k]); markers = {};
                for(let id in data) {
                    const p = data[id];
                    if(now > p.expires) { db.ref('pins/'+id).remove(); continue; }
                    markers[id] = L.marker([p.lat, p.lng], {icon: L.divIcon({html:'👮', className:'', iconSize:[25,25]})}).addTo(map);
                    list.innerHTML += `<div style="padding:8px; border-bottom:1px solid #222;"><b>${p.user}</b> - ${new Date(p.time).toLocaleTimeString()}</div>`;
                }
            });
        }

        function checkDist() {
            if(!bell || !uLat) return;
            db.ref('pins').once('value', snap => {
                const pins = snap.val(); let near = false;
                for(let id in pins) { if(map.distance([uLat, uLng], [pins[id].lat, pins[id].lng]) < rad) { near = true; break; } }
                if(near) startAlarm(); else stopAlarm();
            });
        }

        function startAlarm() {
            if(alertActive) return;
            alertActive = true;
            const sound = document.getElementById('alarm-sound');
            sound.currentTime = 0;
            const playFunc = () => {
                sound.play().catch(() => {
                    // Tablet အချို့တွင် interaction လိုအပ်ပါက console မှာပြမည်
                    console.log("Audio Play Blocked. Click screen once.");
                });
            };
            playFunc();
            window.alertInterval = setInterval(playFunc, 4000);
        }

        function stopAlarm() { alertActive = false; clearInterval(window.alertInterval); document.getElementById('alarm-sound').pause(); }

        function updateRad(v) { rad = parseInt(v); document.getElementById('rad-txt').innerText = v; if(uCircle) uCircle.setRadius(rad); }
        function toggleBell() { bell = !bell; document.getElementById('bell-icon').className = bell ? 'fas fa-bell' : 'fas fa-bell-slash'; if(!bell) stopAlarm(); }
        function recenter() { isFollowing = true; map.setView([uLat, uLng], 17); }
        function logout() { auth.signOut().then(()=>location.reload()); }
    </script>
</body>
</html>
