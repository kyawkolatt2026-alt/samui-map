<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samui Safe Ride Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00d2ff; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: var(--text); overflow: hidden; touch-action: none; }
        
        /* Authentication Overlay */
        .auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .pass-toggle { position: absolute; right: 10px; top: 12px; color: #888; cursor: pointer; }
        
        /* Map UI */
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .overlay-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .pointer-all { pointer-events: all; }

        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; }
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(30,30,30,0.98); padding: 15px; border-radius: 20px 20px 0 0; transform: translateY(75%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .bottom-panel.active { transform: translateY(0); }
        .panel-handle { width: 50px; height: 6px; background: #444; margin: 0 auto 15px; border-radius: 10px; cursor: pointer; }

        /* Buttons & Icons */
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; width: 100%; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Chat & List */
        #chat-section { height: 250px; display: flex; flex-direction: column; margin-top: 10px; }
        #chat-msgs { flex: 1; overflow-y: auto; background: #151515; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 8px; }
        .msg { margin-bottom: 6px; line-height: 1.4; } .msg b { color: var(--primary); }
        .pin-list-item { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ff4757; }
        
        .tab-btn { padding: 10px; cursor: pointer; flex: 1; text-align: center; font-size: 14px; color: #888; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <h2 style="text-align:center; color:var(--primary); margin-top:0;">SAMUI SAFE RIDE</h2>
            <div id="auth-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password">
                    <i class="fas fa-eye pass-toggle" onclick="togglePass('password')"></i>
                </div>
                <div id="register-fields" class="hidden">
                    <div class="input-group">
                        <input type="password" id="confirm-password" placeholder="Confirm Password">
                        <i class="fas fa-eye pass-toggle" onclick="togglePass('confirm-password')"></i>
                    </div>
                </div>
                <button class="btn btn-main" id="auth-btn" onclick="handleAuth()">အကောင့်ဝင်ရန်</button>
                <p style="text-align:center; font-size:13px; margin-top:15px;" onclick="toggleAuthMode()" id="toggle-text">
                    အကောင့်မရှိသေးပါက <span style="color:var(--primary); cursor:pointer;">Register လုပ်ရန်</span>
                </p>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div class="overlay-ui">
            <div class="top-bar">
                <div class="pointer-all circle-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
                <div style="display:flex; gap:12px;">
                    <div class="pointer-all circle-btn" onclick="changeMapStyle()"><i class="fas fa-layer-group"></i></div>
                    <div class="pointer-all circle-btn" onclick="toggleAlarm()"><i id="alarm-icon" class="fas fa-bell"></i></div>
                </div>
            </div>

            <div class="bottom-panel pointer-all" id="main-panel">
                <div class="panel-handle" onclick="togglePanel()"></div>
                
                <button class="btn btn-main" style="background:#ff4757;" onclick="dropPinAtCurrent()">👮 လက်ရှိနေရာကို Pin ထောက်မည်</button>
                <p style="font-size: 11px; text-align: center; color: #888; margin: 8px 0;">*မြေပုံပေါ်ရှိ ကြိုက်သည့်နေရာကို ၃ စက္ကန့်ဖိထားပြီးလည်း Pin ထောက်နိုင်သည်*</p>

                <div style="margin: 10px 0;">
                    <label style="font-size:12px;">သတိပေးအကွာအဝေး: <span id="radius-val">500</span>m</label>
                    <input type="range" min="200" max="2000" step="100" value="500" oninput="updateRadius(this.value)" style="accent-color: var(--primary);">
                </div>

                <div style="display:flex; margin-bottom:10px;">
                    <div id="tab-list" class="tab-btn active" onclick="showTab('list')">ပင်စာရင်း</div>
                    <div id="tab-chat" class="tab-btn" onclick="showTab('chat')">စကားပြောခန်း</div>
                </div>

                <div id="list-tab">
                    <div id="pin-list" style="max-height:200px; overflow-y:auto;"></div>
                </div>

                <div id="chat-tab" class="hidden">
                    <div id="chat-section">
                        <div id="chat-msgs"></div>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="chat-input" placeholder="သတင်းပေးပို့ရန်..." style="margin:0;">
                            <button class="btn btn-main" style="width:80px;" onclick="sendMsg()">ပို့မည်</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzk",
            authDomain: "samui-alert.firebaseapp.com",
            projectId: "samui-alert",
            storageBucket: "samui-alert.firebasestorage.app",
            messagingSenderId: "713193724813",
            appId: "1:713193724813:web:85831c39e3560eb310bbc4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let map, userMarker, userCircle, alertRadius = 500, isAlarmOn = true;
        let isRegister = false, activeMarkers = {}, pressTimer;
        let mapStyles = [
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
        ];
        let currentStyle = 0;

        // --- Auth Functions ---
        function togglePass(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isRegister ? 'အကောင့်သစ်ဖွင့်မည်' : 'အကောင့်ဝင်ရန်';
            document.getElementById('toggle-text').innerHTML = isRegister ? 'အကောင့်ရှိပြီးသားလား? <span style="color:var(--primary)">Login ဝင်ရန်</span>' : 'အကောင့်မရှိသေးပါက <span style="color:var(--primary)">Register လုပ်ရန်</span>';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isRegister) {
                    const cp = document.getElementById('confirm-password').value;
                    if (pass !== cp) throw new Error("Password မတူညီပါ");
                    await auth.createUserWithEmailAndPassword(email, pass);
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                initApp();
            } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // --- Map Logic ---
        function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');

            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5334, 99.9352], 13);
            L.tileLayer(mapStyles[0]).addTo(map);

            // Long Press (3 Seconds) Logic
            map.on('mousedown touchstart', (e) => {
                pressTimer = window.setTimeout(() => {
                    if (confirm("ဤနေရာတွင် ဖမ်းဆီးနေသည်မှာ သေချာပါသလား?")) {
                        savePin(e.latlng.lat, e.latlng.lng);
                    }
                }, 3000);
            });

            map.on('mouseup touchend mousemove touchmove', () => clearTimeout(pressTimer));

            // GPS Tracking
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (!userMarker) {
                    userMarker = L.circleMarker([latitude, longitude], { radius: 8, color: '#fff', fillColor: '#00d2ff', fillOpacity: 1 }).addTo(map);
                    userCircle = L.circle([latitude, longitude], { radius: alertRadius, color: '#00d2ff', weight: 1, fillOpacity: 0.1 }).addTo(map);
                    map.setView([latitude, longitude], 15);
                } else {
                    userMarker.setLatLng([latitude, longitude]);
                    userCircle.setLatLng([latitude, longitude]);
                }
                checkAlarm(latitude, longitude);
            }, null, { enableHighAccuracy: true });

            loadRealtimeData();
        }

        function changeMapStyle() {
            currentStyle = (currentStyle + 1) % mapStyles.length;
            L.tileLayer(mapStyles[currentStyle]).addTo(map);
        }

        // --- Database Logic ---
        function savePin(lat, lng) {
            const id = Date.now();
            db.ref('pins/' + id).set({
                lat, lng, 
                time: id, 
                expires: id + (20 * 60 * 1000), 
                user: auth.currentUser.email.split('@')[0]
            });
        }

        function dropPinAtCurrent() {
            navigator.geolocation.getCurrentPosition(pos => {
                savePin(pos.coords.latitude, pos.coords.longitude);
                alert("လက်ရှိနေရာတွင် Pin ထောက်ပြီးပါပြီ");
            });
        }

        function loadRealtimeData() {
            // Pins Listener
            db.ref('pins').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('pin-list');
                list.innerHTML = "";
                for (let k in activeMarkers) map.removeLayer(activeMarkers[k]);

                for (let id in data) {
                    const p = data[id];
                    if (Date.now() > p.expires) { db.ref('pins/' + id).remove(); continue; }

                    activeMarkers[id] = L.marker([p.lat, p.lng], {
                        icon: L.divIcon({ html: '<div style="font-size:24px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));">👮</div>', className: 'custom-pin' })
                    }).addTo(map);

                    const timeStr = new Date(p.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    list.innerHTML += `<div class="pin-list-item">
                        <span><b>${p.user}</b> <br><small>${timeStr}</small></span>
                        <button class="btn" style="background:var(--primary); color:white; font-size:12px;" onclick="focusPin(${p.lat}, ${p.lng})">ကြည့်ရန်</button>
                    </div>`;
                }
            });

            // Chat Listener
            db.ref('chats').limitToLast(30).on('value', snap => {
                const msgs = snap.val();
                const container = document.getElementById('chat-msgs');
                container.innerHTML = "";
                for (let id in msgs) {
                    container.innerHTML += `<div class="msg"><b>${msgs[id].user}:</b> ${msgs[id].text}</div>`;
                }
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            db.ref('chats').push({ user: auth.currentUser.email.split('@')[0], text: input.value, time: Date.now() });
            input.value = "";
        }

        // --- Helper Functions ---
        function checkAlarm(uLat, uLng) {
            if (!isAlarmOn) return;
            db.ref('pins').once('value', snap => {
                const pins = snap.val();
                for (let id in pins) {
                    const dist = map.distance([uLat, uLng], [pins[id].lat, pins[id].lng]);
                    if (dist < alertRadius) {
                        new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});
                        break;
                    }
                }
            });
        }

        function toggleAlarm() {
            isAlarmOn = !isAlarmOn;
            document.getElementById('alarm-icon').className = isAlarmOn ? 'fas fa-bell' : 'fas fa-bell-slash';
        }

        function updateRadius(val) {
            alertRadius = parseInt(val);
            document.getElementById('radius-val').innerText = val;
            if (userCircle) userCircle.setRadius(alertRadius);
        }

        function togglePanel() { document.getElementById('main-panel').classList.toggle('active'); }
        function focusPin(lat, lng) { map.setView([lat, lng], 17); togglePanel(); }

        function showTab(tab) {
            document.getElementById('list-tab').classList.toggle('hidden', tab !== 'list');
            document.getElementById('chat-tab').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('tab-list').classList.toggle('active', tab === 'list');
            document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
        }
    </script>
</body>
</html>
