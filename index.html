<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v6.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0b0d; --glass: rgba(20, 20, 22, 0.98); --border: rgba(255, 255, 255, 0.1); --accent: #1e90ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .header { position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .chip { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); padding: 12px 18px; border-radius: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); backdrop-filter: blur(40px); border-radius: 30px 30px 0 0; border-top: 1px solid var(--border); transform: translateY(calc(100% - 110px)); transition: 0.5s cubic-bezier(0.1, 0.9, 0.2, 1); padding: 20px 25px 40px 25px; }
        .sheet.active { transform: translateY(0); }
        .handle { width: 45px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px auto; cursor: pointer; }

        /* Animated Marker Style */
        .p-marker {
            width: 25px; height: 25px; background: var(--main);
            border: 3px solid white; border-radius: 50%;
            position: relative; box-shadow: 0 0 15px var(--main);
        }
        .p-marker::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 3px solid var(--main); border-radius: 50%;
            animation: ripple 1.2s infinite; opacity: 0;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .u-marker { width: 18px; height: 18px; background: var(--accent); border: 4px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        .report-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--main); border: none; color: white; font-size: 26px; position: relative; box-shadow: 0 15px 40px rgba(255, 71, 87, 0.4); margin: 15px auto; display: block; }
        .ring { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="chip" style="flex:1"><span style="font-weight:700; font-size:12px;">POLICE SPOTS (20M): <span id="count" style="color:var(--main)">0</span></span></div>
    <div class="chip" onclick="toggleSheet()"><i class="fas fa-bars"></i></div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
    <div class="handle" onclick="toggleSheet()"></div>
    
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
        <button style="flex:1; padding:10px; border-radius:12px; background:var(--accent); border:none; color:white; font-size:12px;" onclick="setMapView('street')">Street</button>
        <button style="flex:1; padding:10px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; font-size:12px;" onclick="setMapView('sat')">Satellite</button>
    </div>

    <div id="logList" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px; border-radius: 15px; background: rgba(255,255,255,0.02);"></div>

    <button class="report-btn" id="holdBtn">
        <svg width="85" height="85" class="ring"><circle cx="42.5" cy="42.5" r="40" stroke="white" stroke-width="4" fill="transparent" stroke-dasharray="251" stroke-dashoffset="251" id="ringOffset" /></svg>
        <i class="fas fa-shield-alt"></i>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf", authDomain: "samui-alert.firebaseapp.com", projectId: "samui-alert", storageBucket: "samui-alert.firebasestorage.app", messagingSenderId: "713193724813", appId: "1:713193724813:web:85831c39e3560eb310bbc4" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    const street = L.tileLayer('https://{s}.google.com/vt/lyrs=m,h&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });

    let markers = {}, userMarker = null;
    window.toggleSheet = () => document.getElementById('sheet').classList.toggle('active');
    window.setMapView = (t) => { if(t==='sat'){ map.removeLayer(street); sat.addTo(map); } else { map.removeLayer(sat); street.addTo(map); } };

    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if (!userMarker) { userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'u-marker' }) }).addTo(map); map.setView(e.latlng, 17); }
        else userMarker.setLatLng(e.latlng);
    });

    const btn = document.getElementById('holdBtn'), ring = document.getElementById('ringOffset');
    let timer, prog = 251;
    const start = (e) => { e.preventDefault(); timer = setInterval(() => { prog -= 8.3; ring.style.strokeDashoffset = prog; if(prog<=0){ clearInterval(timer); fire(); reset(); } }, 100); };
    const reset = () => { clearInterval(timer); prog = 251; ring.style.strokeDashoffset = 251; };
    btn.addEventListener('touchstart', start); btn.addEventListener('touchend', reset);
    btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', reset);

    async function fire() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
        });
    }

    onSnapshot(query(spotsRef, where("time", ">", new Date(Date.now() - 20 * 60 * 1000)), orderBy("time", "desc")), (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        const list = document.getElementById('logList');
        list.innerHTML = "";
        
        const currentIds = snaps.docs.map(doc => doc.id);
        Object.keys(markers).forEach(id => { if (!currentIds.includes(id)) { map.removeLayer(markers[id]); delete markers[id]; } });

        snaps.forEach(doc => {
            const d = doc.data();
            const t = d.time ? new Date(d.time.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "Just now";
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid var(--border); font-size:12px;">🚨 Reported at ${t}</div>`;
            if(!markers[doc.id]) {
                markers[doc.id] = L.marker([d.lat, d.lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map).bindPopup(`Reported: ${t}`);
            }
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
