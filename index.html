<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samui Rider Pro v4.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --danger: #ff4757; --accent: #1e90ff; --glass: rgba(18, 18, 18, 0.85); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Header */
        .header {
            position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-pill {
            background: var(--glass); backdrop-filter: blur(15px); color: white;
            padding: 12px 20px; border-radius: 20px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Sidebar - Alerts & Settings */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--glass); backdrop-filter: blur(20px); z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border);
            color: white; padding: 25px; display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .sidebar-toggle {
            width: 45px; height: 45px; border-radius: 12px; background: var(--glass);
            color: white; border: 1px solid var(--border); cursor: pointer;
        }

        /* Alert List Item */
        .alert-list { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .alert-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;
            margin-bottom: 10px; border-left: 3px solid var(--danger);
        }
        .alert-time { font-size: 11px; color: #aaa; margin-top: 5px; display: block; }

        /* Long Press Report FAB */
        .report-fab-wrap { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center; }
        .report-fab {
            width: 75px; height: 75px; border-radius: 50%; background: var(--danger);
            border: 5px solid rgba(255,255,255,0.1); color: white; font-size: 26px;
            box-shadow: 0 15px 40px rgba(255, 71, 87, 0.4); cursor: pointer;
            position: relative; overflow: hidden;
        }
        .prog-svg { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); }

        /* Markers */
        .p-marker { width: 25px; height: 25px; background: var(--danger); border: 3px solid white; border-radius: 50%; animation: pulse 1s infinite; box-shadow: 0 0 15px var(--danger); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); } }
        .u-loc { width: 18px; height: 18px; background: var(--accent); border: 3px solid white; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header">
    <div class="status-pill">
        <div style="width:8px; height:8px; background:#2ecc71; border-radius:50%"></div>
        <span style="font-weight:600">LIVE: <span id="count" style="color:var(--danger)">0</span></span>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
</div>

<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h3 style="margin:0">Settings & Logs</h3>
        <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer"></i>
    </div>
    
    <div style="margin-top:25px">
        <label style="font-size:12px; color:#888">MAP STYLE</label>
        <button class="alert-item" style="width:100%; border:none; color:white; text-align:left" onclick="switchMap()">
            <i class="fas fa-layer-group"></i> Switch Map View
        </button>
    </div>

    <div style="margin-top:20px; flex-grow:1">
        <label style="font-size:12px; color:#888">RECENT ALERTS</label>
        <div class="alert-list" id="alertList">
            </div>
    </div>
</div>

<div id="map"></div>

<div class="report-fab-wrap">
    <div style="color:white; font-size:10px; margin-bottom:8px; letter-spacing:1px">HOLD TO REPORT</div>
    <button class="report-fab" id="reportBtn">
        <svg width="85" height="85" class="prog-svg"><circle cx="42" cy="42" r="38" stroke="white" stroke-width="4" fill="transparent" stroke-dasharray="240" stroke-dashoffset="240" id="progRing"/></svg>
        <i class="fas fa-shield-alt"></i>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBL8zFUvLBK0BoiuKbX4K_waYflCZzfzf",
        authDomain: "samui-alert.firebaseapp.com",
        projectId: "samui-alert",
        storageBucket: "samui-alert.firebasestorage.app",
        messagingSenderId: "713193724813",
        appId: "1:713193724813:web:85831c39e3560eb310bbc4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const spotsRef = collection(db, "police_spots");

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.5120, 100.0137], 15);
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const street = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });

    let isSat = true, isFollow = true, userMarker = null;

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
    window.switchMap = () => { if(isSat) { map.removeLayer(sat); street.addTo(map); } else { map.removeLayer(street); sat.addTo(map); } isSat = !isSat; toggleSidebar(); };

    // GPS
    map.locate({ watch: true, enableHighAccuracy: true });
    map.on('locationfound', (e) => {
        if (!userMarker) { userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'u-loc' }) }).addTo(map); map.setView(e.latlng, 17); }
        else userMarker.setLatLng(e.latlng);
        if (isFollow) map.setView(e.latlng, map.getZoom(), { animate: true });
    });

    // Long Press Reporting
    const btn = document.getElementById('reportBtn'), ring = document.getElementById('progRing');
    let timer, offset = 240;
    function start() { timer = setInterval(() => { offset -= 8; ring.style.strokeDashoffset = offset; if(offset<=0) { clearInterval(timer); doReport(); reset(); } }, 100); }
    function reset() { clearInterval(timer); offset = 240; ring.style.strokeDashoffset = 240; }
    btn.onmousedown = btn.ontouchstart = start; btn.onmouseup = btn.ontouchend = reset;

    async function doReport() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(spotsRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, time: serverTimestamp() });
            alert("Reported Successfully!");
        });
    }

    // Alerts Sync & Sidebar List
    let markers = {};
    const q = query(spotsRef, where("time", ">", new Date(Date.now() - 2 * 60 * 60 * 1000)), orderBy("time", "desc"));
    
    onSnapshot(q, (snaps) => {
        document.getElementById('count').innerText = snaps.size;
        const list = document.getElementById('alertList');
        list.innerHTML = "";
        
        snaps.forEach(doc => {
            const data = doc.data();
            const timeStr = data.time ? new Date(data.time.toDate()).toLocaleTimeString() : "Just now";
            
            // Add to Sidebar List
            list.innerHTML += `<div class="alert-item"><b>Police Alert</b><span class="alert-time"><i class="far fa-clock"></i> ${timeStr}</span></div>`;
            
            // Add to Map
            if(!markers[doc.id]) markers[doc.id] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: 'p-marker' }) }).addTo(map);
        });
    });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
